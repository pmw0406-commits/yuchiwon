<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>우리집 유치원</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root{
    --bg:#F6F4EE; --surface:#FFFFFF; --surface-2:#FBFAF6;
    --ink:#1A1E27; --ink-2:#4B5162; --ink-3:#8B8F9B;
    --line:#E9E5DB; --line-2:#F1EEE5;
    --korean:#D6455D; --math:#2E63E7; --english:#E08A00; --think:#189A72; --quiz:#7A5AF8; --tamgu:#0E8A9E;
    --book:#A2673F; --sticker:#E7A400; --parent:#48607C;
    --ok:#189A72; --no:#D6455D;
    --sh-s:0 1px 2px rgba(26,30,39,.04), 0 4px 14px rgba(26,30,39,.05);
    --sh-m:0 2px 4px rgba(26,30,39,.05), 0 12px 32px rgba(26,30,39,.09);
    --font:"Pretendard Variable","Pretendard","Apple SD Gothic Neo","Malgun Gothic","맑은 고딕","Segoe UI",system-ui,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#141519; --surface:#1E2026; --surface-2:#181A1F; --ink:#F2F0EA; --ink-2:#B9BCC6; --ink-3:#7E828E;
      --line:#2C2E36; --line-2:#24262D; --sh-s:0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
      --sh-m:0 2px 4px rgba(0,0,0,.35), 0 12px 32px rgba(0,0,0,.4); }
  }
  :root[data-theme="light"]{ --bg:#F6F4EE; --surface:#FFFFFF; --surface-2:#FBFAF6; --ink:#1A1E27; --ink-2:#4B5162;
    --ink-3:#8B8F9B; --line:#E9E5DB; --line-2:#F1EEE5;
    --sh-s:0 1px 2px rgba(26,30,39,.04), 0 4px 14px rgba(26,30,39,.05);
    --sh-m:0 2px 4px rgba(26,30,39,.05), 0 12px 32px rgba(26,30,39,.09); }
  :root[data-theme="dark"]{ --bg:#141519; --surface:#1E2026; --surface-2:#181A1F; --ink:#F2F0EA; --ink-2:#B9BCC6;
    --ink-3:#7E828E; --line:#2C2E36; --line-2:#24262D;
    --sh-s:0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
    --sh-m:0 2px 4px rgba(0,0,0,.35), 0 12px 32px rgba(0,0,0,.4); }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:var(--font); color:var(--ink);
    background:
      radial-gradient(900px 420px at 88% -120px, color-mix(in srgb, var(--sticker) 7%, transparent), transparent 70%),
      radial-gradient(760px 400px at -80px 34%, color-mix(in srgb, var(--korean) 4%, transparent), transparent 70%),
      var(--bg);
    min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden;
    font-size:16px; line-height:1.55; letter-spacing:-.01em;
    overscroll-behavior-y:none;
  }
  /* 터치 기기: 호버 애니메이션이 탭에 눌러붙어 화면이 움직이는 현상 방지 */
  @media (hover:none){
    .tile:hover,.opt:hover,.pill:hover,.card:hover,.iconbtn:hover,.mode-btn:hover,.daychip:hover{
      transform:none !important; box-shadow:var(--sh-s) !important; }
  }
  .wrap{ max-width:1120px; margin:0 auto; padding:22px 22px 80px; }
  button{ font-family:inherit; }

  /* ---------- top bar ---------- */
  .topbar{ display:flex; align-items:center; gap:12px; margin:2px 0 30px; }
  .brand{ display:flex; align-items:center; gap:11px; font-weight:800; font-size:19px; letter-spacing:-.5px; cursor:pointer; }
  .brand .logo{ width:40px; height:40px; border-radius:13px; background:linear-gradient(135deg,#D6455D,#E08A00);
    display:grid; place-items:center; color:#fff; box-shadow:var(--sh-s); }
  .brand .logo svg{ width:22px; height:22px; }
  .brand small{ display:block; font-size:10.5px; font-weight:700; color:var(--ink-3); letter-spacing:1.5px; margin-top:1px; }
  .spacer{ flex:1; }
  .iconbtn{ border:1px solid var(--line); cursor:pointer; width:44px; height:44px; border-radius:13px;
    font-size:19px; background:var(--surface); color:var(--ink); box-shadow:var(--sh-s); transition:.16s; }
  .iconbtn:hover{ transform:translateY(-1px); box-shadow:var(--sh-m); }

  .pill{ display:inline-flex; align-items:center; gap:8px; border:1px solid var(--line); cursor:pointer;
    font-weight:700; font-size:15px; color:var(--ink); background:var(--surface); padding:10px 18px; border-radius:999px;
    box-shadow:var(--sh-s); transition:.16s; }
  .pill:hover{ transform:translateY(-1px); box-shadow:var(--sh-m); }
  .pill:active{ transform:translateY(1px); }
  .pill.accent{ background:var(--ac,var(--ink)); color:#fff; border-color:transparent; }
  .pill.on{ background:var(--ink); color:var(--bg); border-color:transparent; }

  /* ---------- hero ---------- */
  .hero{ display:flex; gap:22px; align-items:stretch; margin-bottom:30px; flex-wrap:wrap; }
  .hero-l{ flex:1; min-width:260px; display:flex; flex-direction:column; justify-content:center; }
  .eyebrow{ font-size:13px; font-weight:700; color:var(--ink-3); letter-spacing:.4px; margin-bottom:8px; }
  .hero h1{ font-size:clamp(27px,5.4vw,42px); font-weight:800; letter-spacing:-1.5px; margin:0 0 10px; line-height:1.22; text-wrap:balance; }
  .hero h1 mark{ background:linear-gradient(transparent 62%, color-mix(in srgb, var(--sticker) 42%, transparent) 62%);
    color:inherit; padding:0 2px; }
  .hero p{ color:var(--ink-2); font-size:clamp(14px,3vw,16.5px); font-weight:600; margin:0; }
  .today-card{ background:var(--surface); border:1px solid var(--line); border-radius:24px; padding:20px 24px;
    display:flex; align-items:center; gap:20px; box-shadow:var(--sh-m); min-width:300px; }
  .ring{ position:relative; width:92px; height:92px; }
  .ring svg{ width:92px; height:92px; transform:rotate(-90deg); }
  .ring .rv{ position:absolute; inset:0; display:grid; place-items:center; text-align:center; }
  .ring .rv b{ font-size:24px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; }
  .ring .rv span{ font-size:10.5px; font-weight:700; color:var(--ink-3); }
  .tc-stats{ display:grid; gap:9px; }
  .tc-row{ display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:700; color:var(--ink-2); }
  .tc-row b{ color:var(--ink); font-variant-numeric:tabular-nums; }
  .tc-row .ic{ width:26px; height:26px; border-radius:8px; display:grid; place-items:center; font-size:13px; }

  .setup{ background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:15px 18px; margin-bottom:22px;
    display:flex; gap:10px; flex-wrap:wrap; align-items:center; box-shadow:var(--sh-s); }
  .setup label{ font-weight:700; font-size:15px; }
  .setup input{ font-family:inherit; font-size:16px; font-weight:700; padding:10px 14px; border:1.5px solid var(--line);
    border-radius:12px; background:var(--bg); color:var(--ink); width:150px; }

  /* ---------- 오늘의 학습 CTA ---------- */
  .task-card{ display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    background:linear-gradient(120deg, color-mix(in srgb,var(--korean) 6%, var(--surface)), var(--surface) 55%);
    border:1.5px solid color-mix(in srgb,var(--korean) 30%, var(--line));
    border-radius:22px; padding:20px 24px; margin-bottom:26px; box-shadow:var(--sh-m); }
  .tk-l{ flex:1; min-width:230px; }
  .tk-eyebrow{ font-size:11.5px; font-weight:800; letter-spacing:2px; color:var(--korean); margin-bottom:5px; }
  .tk-title{ font-size:clamp(17px,3.6vw,21px); font-weight:800; letter-spacing:-.4px; margin-bottom:10px; }
  .tk-prog{ display:flex; align-items:center; gap:10px; }
  .tk-bar{ flex:1; max-width:260px; height:9px; background:var(--line-2); border-radius:999px; overflow:hidden; display:block; }
  .tk-bar i{ display:block; height:100%; border-radius:999px;
    background:linear-gradient(90deg,var(--korean),var(--english)); }
  .tk-pct{ font-size:12px; font-weight:700; color:var(--ink-3); font-variant-numeric:tabular-nums; }
  .tk-go{ font-size:17px; padding:14px 26px; }
  .daychip.done{ background:color-mix(in srgb,var(--ok) 10%, var(--surface)); border-color:color-mix(in srgb,var(--ok) 40%, var(--line));
    color:var(--ok); font-size:12.5px; }
  .daychip.locked{ opacity:.45; cursor:not-allowed; background:var(--line-2); box-shadow:none; }
  .daychip.current{ border-color:var(--korean); color:var(--korean);
    box-shadow:0 0 0 3px color-mix(in srgb,var(--korean) 22%, transparent); animation:pulse 2s ease infinite; }
  .lock-toast{ position:fixed; left:50%; bottom:34px; transform:translateX(-50%); z-index:99;
    background:var(--ink); color:var(--bg); font-weight:800; font-size:15px; padding:12px 22px;
    border-radius:999px; box-shadow:var(--sh-m); animation:fade .25s ease; }

  /* 🖐 만지며 배우기 */
  .touch-grid{ display:flex; flex-wrap:wrap; gap:12px; justify-content:center; max-width:480px; margin:10px auto; }
  .touch-item{ font-size:46px; width:78px; height:78px; border-radius:20px; border:2px solid var(--line);
    background:var(--surface); cursor:pointer; box-shadow:var(--sh-s); transition:.15s; }
  .touch-item.pop{ background:color-mix(in srgb,var(--ok) 14%, var(--surface)); border-color:var(--ok);
    transform:scale(.92); position:relative; }
  .touch-item.pop::after{ content:"✓"; position:absolute; top:2px; right:6px; font-size:16px; font-weight:800; color:var(--ok); }
  .touch-count{ font-size:44px !important; font-weight:800; color:var(--math); font-variant-numeric:tabular-nums; }
  .tf-touch{ display:grid; grid-template-columns:repeat(5,58px); grid-auto-rows:58px; gap:0;
    border:3px solid var(--math); border-radius:10px; overflow:hidden; width:max-content; margin:14px auto; }
  .tf-cell{ border:1px solid var(--line); background:var(--surface); cursor:pointer; position:relative; }
  .tf-cell.fill::after{ content:""; position:absolute; inset:12px; border-radius:50%; background:var(--math); }
  .tf-cell.new::after{ background:var(--english); animation:pulse .4s ease; }
  .touch-item.touch-num{ font-size:30px; font-weight:800; color:var(--math); }
  .touch-item.touch-char{ font-size:34px; font-weight:800; }
  .touch-item.eaten{ opacity:.25; filter:grayscale(1); transform:scale(.85); }
  .touch-item.shake, .touch-pile.shake{ animation:shake .4s ease; }
  @keyframes shake{ 0%,100%{transform:none} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .touch-pile{ border:2px solid var(--line); background:var(--surface); border-radius:20px; cursor:pointer;
    padding:16px 18px; box-shadow:var(--sh-s); max-width:200px; }
  .touch-pile.pop{ border-color:var(--ok); background:color-mix(in srgb,var(--ok) 12%, var(--surface)); }

  /* ---------- 이야기 읽기 ---------- */
  .read-wrap{ max-width:660px; margin:0 auto; }
  .read-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
  .read-title{ font-size:20px; font-weight:800; letter-spacing:-.4px; }
  .read-body{ background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:22px 24px;
    font-size:19px; font-weight:600; line-height:2; box-shadow:var(--sh-s); letter-spacing:-.2px; }
  .read-q .q-choices{ grid-template-columns:1fr; max-width:520px; gap:10px; }
  .read-q .opt{ min-height:64px; padding:16px; }

  /* ---------- 학습 지도 ---------- */
  .map-hero{ display:flex; align-items:center; gap:22px; background:var(--surface); border:1px solid var(--line);
    border-radius:24px; padding:22px 26px; box-shadow:var(--sh-m); flex-wrap:wrap; margin-bottom:16px; }
  .map-hero-txt{ flex:1; min-width:240px; }
  .map-now{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:6px; }
  @media(max-width:640px){ .map-now{ grid-template-columns:1fr; } }
  .mn-box{ background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:15px 17px; box-shadow:var(--sh-s); }
  .mn-box.now{ border-color:color-mix(in srgb,var(--math) 45%, var(--line)); background:color-mix(in srgb,var(--math) 5%, var(--surface)); }
  .mn-label{ font-size:12px; font-weight:800; color:var(--ink-3); margin-bottom:6px; letter-spacing:.3px; }
  .mn-val{ font-size:17px; font-weight:800; letter-spacing:-.3px; }
  .mn-detail{ font-size:12px; font-weight:600; color:var(--ink-2); margin-top:4px; }
  .map-course{ background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:16px 18px;
    margin-bottom:12px; box-shadow:var(--sh-s); }
  .map-course.future{ opacity:.62; }
  .map-course.cur{ border-color:color-mix(in srgb,var(--math) 40%, var(--line)); box-shadow:var(--sh-m); }
  .mc-head{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
  .mc-badge{ color:#fff; font-weight:800; font-size:12px; padding:4px 11px; border-radius:999px; }
  .mc-name{ font-weight:800; font-size:17px; letter-spacing:-.4px; }
  .mc-grade{ font-size:12.5px; font-weight:700; color:var(--ink-3); }
  .mc-prog{ margin-left:auto; font-size:12.5px; font-weight:800; color:var(--math); }
  .map-units{ display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; }
  @media(max-width:640px){ .map-units{ grid-template-columns:1fr; } }
  .map-unit{ display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; padding:6px 0; border-bottom:1px dashed var(--line-2); }
  .map-unit .mu-dot{ width:20px; height:20px; border-radius:50%; display:inline-grid; place-items:center; font-size:12px;
    font-weight:800; flex:none; background:var(--line-2); color:var(--ink-3); }
  .map-unit.done .mu-dot{ background:var(--ok); color:#fff; }
  .map-unit.now .mu-dot{ background:var(--math); color:#fff; animation:pulse 2s ease infinite; }
  .map-unit .mu-n{ font-size:11.5px; font-weight:800; color:var(--ink-3); min-width:38px; }
  .map-unit .mu-title{ font-size:14.5px; font-weight:700; }
  .map-unit.now .mu-title{ color:var(--math); }
  .map-unit .mu-sub{ font-size:11.5px; font-weight:600; color:var(--ink-3); flex-basis:100%; padding-left:28px; }

  /* ---------- menu ---------- */
  .mgroup{ margin-bottom:28px; }
  .menu-label{ display:flex; align-items:center; gap:12px; font-size:11.5px; font-weight:800; color:var(--ink-3);
    letter-spacing:3px; margin:0 2px 13px; }
  .menu-label::after{ content:""; flex:1; height:1px; background:var(--line); }
  .menu{ display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:13px; }
  .tile{ border:1px solid var(--line); cursor:pointer; color:var(--ink); text-align:left;
    background:var(--surface); border-radius:20px; padding:17px 20px; display:flex; flex-direction:row;
    align-items:center; gap:16px; box-shadow:var(--sh-s); transition:transform .18s, box-shadow .18s, border-color .18s; }
  .tile:hover{ transform:translateY(-3px); box-shadow:var(--sh-m); border-color:color-mix(in srgb, var(--tc) 30%, var(--line)); }
  .tile:hover .t-arrow{ opacity:1; transform:none; }
  .tile .chip{ width:54px; height:54px; border-radius:17px; display:grid; place-items:center; flex:none;
    background:linear-gradient(140deg, color-mix(in srgb, var(--tc) 16%, var(--surface)), color-mix(in srgb, var(--tc) 7%, var(--surface)));
    color:var(--tc); box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--tc) 14%, transparent); }
  .tile .chip svg{ width:26px; height:26px; }
  .tile .tx{ min-width:0; }
  .tile .t-en{ font-size:10px; font-weight:800; letter-spacing:2.2px; text-transform:uppercase;
    color:var(--tc); margin-bottom:2px; line-height:1; }
  .tile .t-title{ font-size:18.5px; font-weight:800; letter-spacing:-.4px; line-height:1.25; }
  .tile .t-desc{ font-size:12.5px; font-weight:600; color:var(--ink-2); margin-top:3px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tile .t-arrow{ margin-left:auto; color:var(--tc); opacity:0; transform:translateX(-5px); transition:.18s; flex:none; }

  /* ---------- screens ---------- */
  .screen{ display:none; }
  .screen.active{ display:block; animation:fade .25s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
  .sec-head{ display:flex; align-items:center; gap:14px; margin:2px 0 24px; flex-wrap:wrap; }
  .sec-title{ font-size:clamp(21px,4.6vw,28px); font-weight:800; letter-spacing:-.6px; display:flex; align-items:center; gap:11px; }
  .sec-title .sic{ width:38px; height:38px; border-radius:12px; display:grid; place-items:center;
    background:color-mix(in srgb, var(--tc) 11%, var(--surface)); color:var(--tc); }
  .sec-title .sic svg{ width:20px; height:20px; }

  .modes{ display:flex; flex-wrap:wrap; gap:9px; margin-bottom:24px; }
  .mode-btn{ border:1px solid var(--line); cursor:pointer; font-weight:700; font-size:15px;
    padding:9px 17px; border-radius:999px; background:var(--surface); color:var(--ink-2); transition:.15s; box-shadow:var(--sh-s); }
  .mode-btn:hover{ transform:translateY(-1px); color:var(--ink); }

  /* ---------- flashcards ---------- */
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:13px; }
  .card{ border:1px solid var(--line); cursor:pointer; color:var(--ink); background:var(--surface);
    border-radius:20px; padding:20px 12px; display:flex; flex-direction:column; align-items:center; gap:8px;
    box-shadow:var(--sh-s); transition:.15s; }
  .card:hover{ transform:translateY(-3px); box-shadow:var(--sh-m); }
  .card .big-emoji{ font-size:44px; line-height:1; }
  .card .big-letter{ font-weight:800; line-height:1; letter-spacing:-1px; }
  .card .label{ font-size:15px; font-weight:700; color:var(--ink-2); }
  .card.playing{ animation:pulse .45s ease; border-color:var(--english); }
  @keyframes pulse{ 0%,100%{transform:none} 40%{transform:scale(1.05)} }

  /* ---------- quiz ---------- */
  .stage{ max-width:640px; margin:0 auto; text-align:center; }
  .stage .qb{ min-height:360px; }   /* 문제 전환 시 화면 높이 점프 방지 */
  .goalbar{ max-width:420px; margin:0 auto 6px; }
  .gb-top{ display:flex; justify-content:space-between; font-size:13px; font-weight:800; color:var(--ink-2); margin-bottom:5px; }
  .gb-n b{ color:var(--korean); font-variant-numeric:tabular-nums; }
  .gb-track{ height:12px; background:var(--surface); border:1px solid var(--line); border-radius:999px; overflow:hidden; }
  .gb-fill{ height:100%; background:linear-gradient(90deg,var(--korean),var(--sticker)); border-radius:999px; transition:width .35s; }
  .scorebar{ display:inline-flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line);
    padding:8px 18px; border-radius:999px; box-shadow:var(--sh-s); font-weight:800; font-size:17px; }
  .q-row{ display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:12px;
    font-size:clamp(36px,8vw,52px); margin:20px 0 4px; }
  .q-text{ font-size:clamp(25px,5.6vw,36px); font-weight:800; text-align:center; margin:20px 0 28px; letter-spacing:-.8px;
    text-wrap:balance; line-height:1.3; }
  .q-choices{ display:grid; grid-template-columns:repeat(3,1fr); gap:13px; max-width:560px; margin:0 auto; }
  .q-choices.two{ grid-template-columns:repeat(2,1fr); max-width:400px; }
  .opt{ border:1.5px solid var(--line); cursor:pointer; background:var(--surface); color:var(--ink);
    border-radius:20px; padding:22px 8px; box-shadow:var(--sh-s); transition:.14s; min-height:104px;
    display:flex; align-items:center; justify-content:center; }
  .opt:hover{ transform:translateY(-2px); box-shadow:var(--sh-m); }
  .opt:active{ transform:scale(.965); }   /* 탭 시 눌림 피드백 */
  .opt:disabled{ cursor:default; }
  .opt .oe{ font-size:50px; } .opt .ol{ font-size:36px; font-weight:800; font-variant-numeric:tabular-nums; }
  .opt.right{ border-color:var(--ok); background:color-mix(in srgb,var(--ok) 10%, var(--surface)); }
  .opt.wrong{ border-color:var(--no); opacity:.45; }
  .hint{ color:var(--ink-2); font-weight:600; font-size:15.5px; margin:14px 0 4px; }

  .progress{ height:12px; background:var(--surface); border:1px solid var(--line); border-radius:999px; overflow:hidden;
    max-width:560px; margin:2px auto 10px; }
  .progress .bar{ height:100%; width:0%; background:linear-gradient(90deg,var(--quiz),#9F8AFB); transition:width .35s; }
  .pmeta{ text-align:center; font-weight:700; font-size:16px; margin-bottom:18px; color:var(--ink-3); }
  .pmeta b{ color:var(--ink); font-variant-numeric:tabular-nums; }
  .finish .big{ font-size:68px; }

  /* ---------- sticker ---------- */

function streak(){
  let n=0; const d=new Date();

function callName(n){

/* ===== Cloud sync — Supabase 가족 코드 (기기 간 기록 동기화) ===== */
const SUPA_URL="https://bdkurlqmfsswgeiujyev.supabase.co";
const SUPA_KEY="sb_publishable_pOXTPRPFUESBxgXBAo9mBg_zaW5jID3"; /* publishable key (공개용) */
const supaOK=()=>!!(SUPA_URL&&SUPA_KEY);
async function supaFetch(path,opt={}){
  const r=await fetch(SUPA_URL+"/rest/v1/"+path,{...opt,headers:{
    "apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,
    "Content-Type":"application/json","Prefer":"resolution=merge-duplicates",...(opt.headers||{})}});
  if(!r.ok) throw new Error("supabase "+r.status);
  const t=await r.text(); return t?JSON.parse(t):null;
}
function mergeState(r){
  if(!r) return;
  if((r.ts||0)>(S.ts||0)) ["name","diff","sound","level","fam"].forEach(k=>{ if(r[k]!=null&&r[k]!=="") S[k]=r[k]; });
  S.stars=Math.max(S.stars||0,r.stars||0);
  const days=Object.assign({},r.days||{});
  Object.entries(S.days||{}).forEach(([k,v])=>{ days[k]=Math.max(days[k]||0,v); }); S.days=days;
  const stats=Object.assign({},r.stats||{});
  Object.entries(S.stats||{}).forEach(([k,v])=>{ const o=stats[k]||{o:0,x:0};
    stats[k]={o:Math.max(o.o||0,v.o||0),x:Math.max(o.x||0,v.x||0)}; }); S.stats=stats;
  if(!S.level&&r.level) S.level=r.level;
}
async function syncPull(){
  if(!supaOK()||!S.fam) return false;
  try{
    const rows=await supaFetch(`families?code=eq.${encodeURIComponent(S.fam)}&select=data`);
    if(rows&&rows[0]&&rows[0].data){ mergeState(rows[0].data); S.lastSync=Date.now(); save(false); return true; }
  }catch(e){}

}
let pushTimer=null;
function syncPush(){

function pickVoice(l){ const w=l.slice(0,2); return voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith(w))||null; }

/* ===== Utils ===== */
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(a){ return a[rnd(0,a.length-1)]; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sample(a,n){ return shuffle(a).slice(0,n); }
function pickWrong(c,cands,n=2){ const seen=new Set([c]),out=[];
  for(const x of shuffle(cands)){ if(x>=0&&!seen.has(x)){seen.add(x);out.push(x);} if(out.length>=n)break; }
  let d=1; while(out.length<n){ [c+d,c-d].forEach(x=>{ if(out.length<n&&x>=0&&!seen.has(x)){seen.add(x);out.push(x);} }); d++; } return out; }
function choiceSet(c,wrongs,emoji){ const a=[{show:String(c),ok:true,emoji:!!emoji}];

const EMOJI_POOL=["🍎","🍌","🍊","🍇","🍓","🐶","🐱","🐰","🦊","🐸","⭐","🌙","🚗","✈️","🎈","⚽","🌸","🐤"];

  ["F","🐟","Fish"],["G","🐐","Goat"],["H","🎩","Hat"],["I","🍦","Ice"],["J","🧃","Juice"],

  ["bus","🚌","버스"],["cup","☕","컵"],["box","📦","상자"],["hen","🐔","암탉"],["bed","🛏️","침대"],

/* ===== Generators (difficulty-aware) ===== */
function gAdd(){
  let a,b;
  if(S.diff==="easy"){ a=rnd(1,4); b=rnd(1,5); }
  else if(S.diff==="hard"){ a=rnd(5,9); b=rnd(5,9); }
  else { a=rnd(2,9); b=rnd(2,9); }
  const s=a+b;
  return {text:`${a} + ${b} = ?`,say:`${a} 더하기 ${b}는?`,choices:choiceSet(s,pickWrong(s,[s+1,s-1,s+2,s-2]))};
}
function gSub(){
  let a,b;
  if(S.diff==="easy"){ a=rnd(3,9); b=rnd(1,a-1); }
  else if(S.diff==="hard"){ a=rnd(11,18); b=rnd(2,9); }
  else { a=rnd(6,18); b=rnd(1,a-1); }
  const s=a-b;
  return {text:`${a} − ${b} = ?`,say:`${a} 빼기 ${b}는?`,choices:choiceSet(s,pickWrong(s,[s+1,s-1,s+2,s-2]))};
}
function gMake10(){ const a=rnd(1,9),ans=10-a; return {text:`${a} + ⬜ = 10`,say:`${a} 더하기 얼마가 10일까요?`,choices:choiceSet(ans,pickWrong(ans,[ans+1,ans-1,ans+2,a]))}; }
function gTwo(){
  let a,b;
  if(S.diff==="easy"){ const t=rnd(1,8),o=rnd(0,4); a=t*10+o; b=rnd(1,9-o); }
  else if(S.diff==="hard"){ a=rnd(15,69); b=rnd(15,99-a); }
  else { const t1=rnd(1,4),o1=rnd(0,4),t2=rnd(1,Math.min(4,9-t1)),o2=rnd(0,9-o1); a=t1*10+o1; b=t2*10+o2; }
  const s=a+b;
  return {text:`${a} + ${b} = ?`,say:`${a} 더하기 ${b}는?`,choices:choiceSet(s,pickWrong(s,[s+1,s-1,s+10,s-10]))};
}
function gAntonym(){ const p=pick(ANTONYMS); const [w1,w2]=Math.random()<.5?p:[p[1],p[0]];
  const pool=ANTONYMS.flat().filter(w=>w!==w1&&w!==w2);
  return {text:`"${w1}" 의 반대말은?`,say:`${w1}. 반대말은?`,choices:choiceSet(w2,sample(pool,2))}; }
function gRiddle(){ const r=pick(RIDDLES); return {text:r.q,say:r.q,choices:choiceSet(r.a,r.d)}; }
function gPattern(){ const u=pick(PATTERNS),seq=[]; for(let i=0;i<4;i++)seq.push(u[i%u.length]);
  const ans=u[4%u.length], wrongs=sample(EMOJI_POOL.filter(e=>!u.includes(e)),2);
  return {rowEmojis:seq.concat("❔"),text:"다음에는 무엇이 올까요?",say:"다음에는 무엇이 올까요?",choices:choiceSet(ans,wrongs,true)}; }
function gCompare(){ const hi=S.diff==="easy"?30:99, lo=S.diff==="easy"?3:11;
  let a=rnd(lo,hi),b=rnd(lo,hi); while(b===a)b=rnd(lo,hi);
  const big=Math.random()<.5, ans=big?Math.max(a,b):Math.min(a,b);
  return {text:`${a} 와 ${b} 중 ${big?"더 큰":"더 작은"} 수는?`,say:`${a}, ${b}. ${big?"더 큰":"더 작은"} 수는?`,
    choices:shuffle([{show:String(a),ok:a===ans},{show:String(b),ok:b===ans}])}; }
function gOrdinal(){ const row=sample(EMOJI_POOL,5),n=rnd(1,5),ans=row[n-1],wrongs=sample(row.filter(e=>e!==ans),2);
  const kor=["첫","두","세","네","다섯"][n-1];
  return {rowEmojis:row,text:`왼쪽에서 ${kor} 번째는?`,say:`왼쪽에서 ${n}번째는 무엇일까요?`,choices:choiceSet(ans,wrongs,true)}; }

/* 사고력 신규 유형 */
function gSame(){ const same=pick(EMOJI_POOL); const others=sample(EMOJI_POOL.filter(e=>e!==same),2);
  const arr=shuffle([same,same,...others]);
  return {rowEmojis:arr, text:"똑같은 것이 둘 있어요. 같은 것은?", say:"똑같은 그림을 찾아보세요",
    choices:choiceSet(same,others,true)}; }
function gOdd(){ const grp=pick([["🍎","🍌","🍇","🚗"],["🐶","🐱","🐰","✈️"],["⭐","🌙","☀️","🍔"],["🔴","🔵","🟢","🐸"],["🚕","🚌","🚲","🍎"]]);
  const odd=grp[3]; return {rowEmojis:grp.slice(0,3).concat(["❔"]), text:`${grp.slice(0,3).join(" ")} 과 어울리지 않는 것은?`, say:"종류가 다른 하나를 찾아보세요",
    choices:choiceSet(odd,sample(grp.slice(0,3),2),true)}; }
function gNext(){ const seq=pick([["🌱","🌿","🌳"],["🥚","🐣","🐔"],["🌑","🌓","🌕"],["😀","😐","😢"],["🔵","🔵🔵","🔵🔵🔵"]]);
  const ans=seq[2]; const wrongs=sample(EMOJI_POOL.filter(e=>!seq.includes(e)),2);
  return {rowEmojis:[seq[0],seq[1],"❔"], text:"다음에 올 것은?", say:"다음에 올 것을 찾아보세요",
    choices:choiceSet(ans,wrongs,true)}; }
/* 다현이 맞춤 신규 유형 (진단 데이터 기반) */
function gCount(){ const n=rnd(2,9), e=pick(EMOJI_POOL);
  return {rowEmojis:Array(n).fill(e), text:"모두 몇 개일까요?", say:"모두 몇 개인지 세어 보세요",
    choices:choiceSet(n,pickWrong(n,[n+1,n-1,n+2]))}; }
function gSpell(){ const [ok,no]=pick(SPELL);
  return {text:"바르게 쓴 낱말은 어느 것일까요?", say:"바르게 쓴 낱말을 골라 보세요",
    choices:shuffle([{show:ok,ok:true},{show:no,ok:false}])}; }
function gSentence(){ const ms=pick(LT_SENT); const scr=ms[0].split(" / ");
  const wrong=(scr[1]+" "+scr[2]+" "+scr[0]+".").replace("..",".");
  return {text:"바른 문장은 어느 것일까요?", say:"바른 문장을 골라 보세요",
    choices:shuffle([{show:ms[1],ok:true},{show:wrong,ok:false}])}; }
function gJosa(){ const j=pick(JOSA2);
  return {text:`"${j[0]}" ▢에 알맞은 말은?`, say:"빈칸에 알맞은 말을 골라 보세요",
    choices:choiceSet(j[1],sample(["은","는","이","가","을","를","와"].filter(x=>x!==j[1]),2))}; }

const GENS=[
  {k:"count",   label:"그림 세기",   subj:"수학",   g:gCount,   tip:"손가락으로 하나씩 짚으며 세게 해주세요."},

/* ===== Nav (hash routing: 새로고침 유지 + 브라우저 뒤로가기 지원) ===== */
const homeEl=document.getElementById("home"), secEl=document.getElementById("section");
const secTitle=document.getElementById("secTitle"), secBody=document.getElementById("secBody"), backBtn=document.getElementById("backBtn");
let ACCENT="#D6455D";
const SECTIONS={}; MENU.forEach(m=>SECTIONS[m.id]=m);
function show(el){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); el.classList.add("active"); scrollTo(0,0); }
backBtn.onclick=()=>{ location.hash="home"; };
function openSection(m){ if(location.hash==="#sec/"+m.id) route(); else location.hash="sec/"+m.id; }
function renderSection(m){
  ACCENT=m.ac;
  secTitle.innerHTML=`<span class="sic" style="--tc:${m.ac}">${IC[m.id]}</span>${m.title}`;
  secBody.innerHTML="";
  ({korean:renderKorean,math:renderMath,english:renderEnglish,think:renderThink,
    challenge:renderChallenge,level:renderLevel,sticker:renderSticker,map:renderMap,book:renderBook,parent:renderParent})[m.id]();
  show(secEl);
}
function route(){
  if(window.speechSynthesis) speechSynthesis.cancel();
  const h=location.hash.replace(/^#\/?/,"");
  if(!h||h==="home"){ refreshHero(); show(homeEl); return; }
  const [kind,arg]=h.split("/");
  if(kind==="sec"&&SECTIONS[arg]){ renderSection(SECTIONS[arg]); return; }
  if(kind==="day"){ const d=parseInt(arg,10);
    if(d>=0&&d<100){ renderSection(SECTIONS.book); openDayView(d); return; } }
  if(kind==="cday"){ const i=parseInt(arg,10);
    if(i>=0&&i<5){ renderSection(SECTIONS.book); openCustomDayView(i); return; } }
  refreshHero(); show(homeEl);
}
window.addEventListener("hashchange",route);
function tapCard(el){ el.classList.remove("playing"); void el.offsetWidth; el.classList.add("playing"); }

function modeTabs(modes){
  const bar=document.createElement("div"); bar.className="modes"; const area=document.createElement("div");
  modes.forEach(m=>{ const b=document.createElement("button"); b.className="mode-btn"; b.textContent=m.label;
    b.onclick=()=>{ [...bar.children].forEach(x=>{x.style.background="";x.style.color="";x.style.borderColor="";});
      b.style.background=ACCENT; b.style.color="#fff"; b.style.borderColor="transparent";
      if(window.speechSynthesis)speechSynthesis.cancel(); area.innerHTML=""; m.build(area); };
    bar.appendChild(b); });
  secBody.appendChild(bar); secBody.appendChild(area); bar.firstChild.click();
}

/* ===== Quiz area (records stats) ===== */
function optHTML(ch){ if(ch.emoji) return `<span class="oe">${ch.show}</span>`;
  const long=String(ch.show).length>6;
  return `<span class="ol"${long?' style="font-size:16px;line-height:1.45;font-weight:700"':''}>${ch.show}</span>`; }
function makeQuizArea(area,key,lang){
  const gen=GEN_BY_KEY[key].g; const GOAL=10; let solved=0;
  area.innerHTML=`<div class="stage">
    <div class="goalbar"><div class="gb-top"><span>오늘의 목표</span><span class="gb-n"><b>0</b> / ${GOAL}</span></div>
      <div class="gb-track"><div class="gb-fill" style="width:0%"></div></div></div>
    <div class="qb"></div></div>`;
  const gbn=area.querySelector(".gb-n b"), gbf=area.querySelector(".gb-fill"), qb=area.querySelector(".qb");
  function finish(){
    record("done_"+key,true); confetti(); bigConfetti(); speak("오늘 목표를 다 했어요! 정말 잘했어요!");
    qb.innerHTML=`<div class="finish"><div class="big">🎉</div>
      <div class="q-text">오늘 ${GOAL}문제 끝! 참 잘했어요!</div>
      <div class="hint">별 ${GOAL}개를 모았어요 ⭐</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">
        <button class="pill accent" id="qAgain" style="--ac:var(--korean)">🔁 한 번 더</button>
        <button class="pill" id="qHome">← 다른 공부 하기</button></div></div>`;
    document.getElementById("qAgain").onclick=()=>makeQuizArea(area,key,lang);
    document.getElementById("qHome").onclick=()=>{ location.hash="home"; };
  }
  function next(){
    if(solved>=GOAL) return finish();
    const p=gen(); let first=true;
    const row=p.rowEmojis?`<div class="q-row">${p.rowEmojis.map(e=>`<span>${e}</span>`).join("")}</div>`:"";
    qb.innerHTML=row+`<div class="q-text">${p.text}</div><div class="q-choices${p.choices.length===2?" two":""}"></div>`;
    speak(p.say,p.sayLang||lang||"ko-KR");
    const wrap=qb.querySelector(".q-choices");
    p.choices.forEach(ch=>{ const b=document.createElement("button"); b.className="opt";
      b.innerHTML=optHTML(ch);
      b.onclick=()=>{ if(ch.ok){ record(key,first); b.classList.add("right"); solved++;
          gbn.textContent=solved; gbf.style.width=(solved/GOAL*100)+"%";
          speak(solved>=GOAL?"":"잘했어요!"); confetti(); [...wrap.children].forEach(x=>x.disabled=true); setTimeout(next,1050); }
        else { if(first) record(key,false); first=false; b.classList.add("wrong"); b.disabled=true; speak("다시 해볼까?"); } };
      wrap.appendChild(b); });
    if(window.__LT_DEBUG) [...wrap.children].forEach((x,i)=>{ if(p.choices[i].ok) x.dataset.ok="1"; });
  } next();
}

/* 📖 이야기 읽기 — 지문을 화면에서 읽고(음성) 문제 풀기 (인쇄물의 지문을 태블릿에서도) */
let readIdx=0;
function renderReadingCards(area){
  const pool=PSG1.concat(PSG2).concat(PSG3);
  const titles=PSG_T1.concat(PSG_T2).concat(PSG_T3);
  function show(){
    const p=pool[readIdx%pool.length], title=titles[readIdx%titles.length]||"이야기";
    area.innerHTML=`<div class="read-wrap">
      <div class="read-head"><div class="read-title">📖 ${title}</div>
        <button class="pill" id="rdSpeak">🔊 읽어 주기</button></div>
      <div class="read-body">${p.t}</div>
      <div class="read-q" id="rdQ"></div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap">
        <button class="pill" id="rdPrev">← 이전 이야기</button>
        <span class="pill" style="cursor:default">${(readIdx%pool.length)+1} / ${pool.length}</span>
        <button class="pill accent" id="rdNext" style="--ac:var(--korean)">다음 이야기 →</button></div></div>`;
    speak(p.t);
    const qwrap=area.querySelector("#rdQ"); let qi=0;
    function askQ(){
      if(qi>=p.q.length){ qwrap.innerHTML=`<div class="hint" style="text-align:center;font-size:18px">🎉 다 읽고 잘 풀었어요!</div>`; return; }
      const [qq,aa]=p.q[qi];
      const others=sample(pool.filter(x=>x!==p).flatMap(x=>x.q.map(z=>z[1])).filter(x=>x!==aa),2);
      const opts=shuffle([{show:aa,ok:true}].concat(others.map(o=>({show:o,ok:false}))));
      qwrap.innerHTML=`<div class="q-text" style="font-size:19px;margin:14px 0 12px">${qi+1}. ${qq}</div>
        <div class="q-choices">${opts.map(o=>`<button class="opt" data-ok="${o.ok?1:0}"><span class="ol" style="font-size:19px">${o.show}</span></button>`).join("")}</div>`;
      speak(qq);
      qwrap.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
        if(b.dataset.ok==="1"){ b.classList.add("right"); confetti(); speak("딩동댕! 잘했어요!"); record("read",true);
          [...qwrap.querySelectorAll(".opt")].forEach(x=>x.disabled=true); qi++; setTimeout(askQ,1100); }
        else { b.classList.add("wrong"); b.disabled=true; speak("글을 다시 읽어 볼까요?"); } });
    }
    askQ();
    area.querySelector("#rdSpeak").onclick=()=>speak(p.t);
    area.querySelector("#rdNext").onclick=()=>{ readIdx++; show(); };
    area.querySelector("#rdPrev").onclick=()=>{ readIdx=(readIdx-1+pool.length)%pool.length; show(); };
  }
  show();
}

/* ===== Challenge (weakness-weighted) ===== */
function weightedGen(){
  const pool=GENS.filter(x=>!(CHILD_CFG.excludeKeys||[]).includes(x.k));
  const ws=pool.map(x=>{
    const st=S.stats[x.k]||{o:0,x:0}, n=st.o+st.x;
    const err=n>=3 ? st.x/n : .4;
    const boost=CHILD_CFG.weakKeys.includes(x.k)?2:0;   /* 맞춤 보강 유형 가중 */
    return {x, w:1+err*3+boost};
  });
  const total=ws.reduce((s,v)=>s+v.w,0); let r=Math.random()*total;
  for(const v of ws){ r-=v.w; if(r<=0) return v.x; }
  return ws[ws.length-1].x;
}

  return `<span class="ol"${long?' style="font-size:16px;line-height:1.45;font-weight:700"':''}>${ch.show}</span>`; }

function renderLevel(){
  const prev=S.level?`<p style="font-weight:700;color:var(--ink-2);font-size:13.5px;margin-top:16px">지난 결과 (${S.level.date}) · 수학 Lv${S.level.m} · 국어 Lv${S.level.k} · 영어 Lv${S.level.e} → <b>${S.level.rec}일차</b> 추천</p>`:"";
  secBody.innerHTML=`<div class="lvl-intro"><div class="big">🧭</div><h2>우리 아이 레벨 테스트</h2>
    <p>시력 검사처럼 <b>맞히면 어려워지고, 틀리면 쉬워지는</b> 적응형 검사예요.<br>
    <b>잘하는 과목(국어)부터, 맞힐 수 있는 쉬운 문제부터</b> 시작해요.<br>
    만 4세 기초부터 <b>초등 1학년 선행</b>(7단계)까지 측정하고,<br>
    또래 대비 수준 · 오답 리뷰 · <b>학습 로드맵 리포트</b>가 나와요.<br>
    <b>국어 → 수학 · 과목당 8문제 · 약 3~4분</b></p>
    <button class="pill accent" id="ltStart" style="--ac:#0F87A8">테스트 시작하기</button>${prev}</div>`;
  document.getElementById("ltStart").onclick=runLT;
}
function runLT(){
  /* 적응형 계단식 측정: 맞히면 +1 / 틀리면 -1, 과목당 8문제.
     과목 순서·시작 단계는 CHILD_CFG(맞춤 설정)를 따름 — 잘하는 과목 먼저, 성공 경험부터 */
  const DEFS={m:{k:"m",label:"수학",color:"var(--math)",g:ltMath},
              k:{k:"k",label:"국어",color:"var(--korean)",g:ltKor},
              e:{k:"e",label:"영어",color:"var(--english)",g:ltEng}};
  const order=((CHILD_CFG.testOrder&&CHILD_CFG.testOrder.length)?CHILD_CFG.testOrder:["m","k","e"]).map(x=>DEFS[x]);
  const startOf=k=>(CHILD_CFG.testStart&&CHILD_CFG.testStart[k])||3;
  const QN=8, MAXL=7;
  const res={m:0,k:0,e:0}; const missed=[]; const okSkills=[]; const review=[];
  const qlog=[]; const trajS={m:[],k:[],e:[]};
  const usedQ=new Set();   /* 한 테스트 안에서 같은 문제 반복 방지 */
  let si=0, lvl=startOf(order[0].k), asked=0, hist=[], qn=0;
  const TOTALQ=QN*order.length;
  secBody.innerHTML=`<div class="stage"><div class="progress"><div class="bar" style="background:#0F87A8"></div></div>
    <div class="pmeta"><span class="lvl-sub"><span class="dot" id="ltDot"></span><span id="ltSub"></span></span></div>
    <div class="qb"></div></div>`;
  const bar=secBody.querySelector(".bar"), qb=secBody.querySelector(".qb"),
        subEl=document.getElementById("ltSub"), dotEl=document.getElementById("ltDot");
  function estimate(){
    /* 판정: 그 단계 문제를 2번 이상 맞힌 최고 단계 (1번뿐이면 요행 가능성 → 미인정) */
    const c={}; hist.forEach(h=>{ if(h.ok) c[h.l]=(c[h.l]||0)+1; });
    for(let L=MAXL;L>=1;L--) if((c[L]||0)>=2) return L;
    for(let L=MAXL;L>=1;L--) if((c[L]||0)>=1) return L;
    return 1;
  }
  function nextSubject(){
    res[order[si].k]=estimate();
    trajS[order[si].k]=hist.slice();
    si++; asked=0; hist=[];
    if(si<order.length) lvl=startOf(order[si].k);
  }
  function ask(){
    if(si>=order.length) return finish();
    const sub=order[si]; qn++;
    bar.style.width=(Math.min(qn-1,TOTALQ)/TOTALQ*100)+"%";
    dotEl.style.background=sub.color;
    subEl.innerHTML=`${sub.label} · ${lvl}단계 &nbsp;<span style="letter-spacing:1px;color:var(--ink-3)">${"●".repeat(lvl)}${"○".repeat(MAXL-lvl)}</span>`;
    let p=null, last=null;
    for(let t=0;t<10&&!p;t++){ try{ const c=sub.g(lvl); last=c;
      if(c&&!usedQ.has(c.text)) p=c; }catch(e){ console.error("LT gen fail",sub.k,lvl,e); } }
    if(!p) p=last;                            /* 새 문제를 못 찾으면 마지막 것이라도 사용 */
    if(!p){ nextSubject(); return ask(); }    /* 생성 실패 시 과목 넘김 — 멈춤 방지 */
    usedQ.add(p.text);
    const row=p.rowEmojis?`<div class="q-row">${p.rowEmojis.map(e=>`<span>${e}</span>`).join("")}</div>`:"";
    const psg=p.passage?`<div class="passage" style="max-width:540px;margin:16px auto 0;text-align:left;font-size:15px;background:var(--surface);border:1px solid var(--line);color:var(--ink)">${p.passage}</div>`:"";
    qb.innerHTML=row+psg+`<div class="q-text"${p.passage?' style="font-size:24px;margin-top:14px"':''}>${p.text}</div><div class="q-choices${p.choices.length===2?" two":""}"></div>`;
    speak(p.say,p.sayLang||"ko-KR");
    const wrap=qb.querySelector(".q-choices");
    p.choices.forEach(ch=>{ const b=document.createElement("button"); b.className="opt"; b.innerHTML=ltOpt(ch);
      b.onclick=()=>{ [...wrap.children].forEach(x=>x.disabled=true);
        hist.push({l:lvl,ok:!!ch.ok}); asked++;
        const cAns=p.choices.find(c=>c.ok);
        qlog.push({s:sub.label,k:sub.k,sk:p.skill,l:lvl,ok:!!ch.ok,
          q:p.text.replace(/<[^>]*>/g,"").slice(0,44),a:cAns?String(cAns.show):""});
        if(ch.ok){ b.classList.add("right"); confetti(); speak("딩동댕!");
          okSkills.push(`${sub.label}·${p.skill}`);
          lvl=Math.min(MAXL,lvl+1); }
        else { b.classList.add("wrong"); speak("괜찮아요!");
          missed.push(`${sub.label}·${p.skill}`);
          review.push({s:sub.label,skill:p.skill,q:p.text.replace(/<[^>]*>/g,"").slice(0,50),a:cAns?cAns.show:""});
          [...wrap.children].forEach((x,i)=>{ if(p.choices[i].ok) x.classList.add("right"); });
          lvl=Math.max(1,lvl-1); }
        if(asked>=QN) nextSubject();
        setTimeout(ask,1000); };
      wrap.appendChild(b); });
    if(window.__LT_DEBUG) [...wrap.children].forEach((x,i)=>{ if(p.choices[i].ok) x.dataset.ok="1"; });
  }
  function finish(){
    bar.style.width="100%";
    const DAYMAP={m:[1,1,11,21,31,41,61,81], k:[1,1,1,11,41,51,71,101], e:[1,1,11,51,61,71,91,111]};
    const tested=order.map(o=>o.k);
    const per={}; tested.forEach(k=>{ per[k]=DAYMAP[k][res[k]]; });
    const rec=Math.min(...tested.map(k=>per[k]));
    const missU=[...new Set(missed)].slice(0,8);
    const okU=[...new Set(okSkills)];
    S.level={m:res.m,k:res.k,e:res.e,rec,per,tested,miss:missU,review:review.slice(0,8),
      traj:trajS,date:todayStr()};
    S.levelHist=(S.levelHist||[]).concat([{date:todayStr(),m:res.m,k:res.k,e:res.e}]).slice(-6);
    save();
    /* 결과를 클라우드에 기록 → 맞춤 커리큘럼 조정에 사용 */
    if(supaOK()){ supaFetch("test_results",{method:"POST",body:JSON.stringify(
      {fam:S.fam||null,name:S.name||null,m:res.m,k:res.k,e:res.e,rec,
       miss:missU,review:{wrong:review.slice(0,8),traj:trajS,qlog:qlog,tested}})}).catch(()=>{}); }
    bigConfetti(); speak(`테스트 끝! ${S.name?callName(S.name)+", ":""}정말 잘했어요!`);
    const recSub=order.find(o=>per[o.k]===rec);
    const rows=order.map(sub=>{ const v=res[sub.k];
      return `<div class="lvl-row"><span class="ln">${sub.label}</span>
        <span class="lb"><div style="width:${v/7*100}%;background:${sub.color}"></div></span>
        <span class="lv">Lv${v} · ${LVL_NAMES[v]}<br><small style="color:var(--ink-3);font-weight:700">${LVL_BAND[v]} · ${per[sub.k]}일차 수준</small></span></div>`; }).join("");
    const trajHTML=`<div class="panelbox" style="margin-top:16px"><h3>📈 측정 궤적 — 오르내리다 멈춘 곳이 우리 아이 레벨</h3>
      <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">${order.map(s=>
        `<div style="text-align:center"><div style="font-size:12px;font-weight:800;color:${s.color};margin-bottom:4px">${s.label} · Lv${res[s.k]}</div>${trajSVG(trajS[s.k],s.color)}</div>`).join("")}</div></div>`;
    const missHTML=missU.length?`<div style="margin-top:14px;text-align:center">
      <div style="font-size:12.5px;font-weight:800;color:var(--ink-3);letter-spacing:1px;margin-bottom:8px">보충이 필요한 유형</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center">${missU.map(m=>
        `<span style="font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:999px;border:1px solid color-mix(in srgb,var(--no) 35%, var(--line));color:var(--no);background:color-mix(in srgb,var(--no) 6%, var(--surface))">${m}</span>`).join("")}</div></div>`:"";
    const reviewHTML=review.length?`<div class="panelbox" style="margin-top:16px"><h3>📋 오답 리뷰</h3>
      ${review.slice(0,8).map(r=>`<div style="font-size:13.5px;font-weight:600;padding:7px 0;border-bottom:1px dashed var(--line)">
        <span style="font-weight:800;color:var(--no)">[${r.s}·${r.skill}]</span> ${r.q} → <b style="color:var(--ok)">${r.a}</b></div>`).join("")}</div>`:"";
    secBody.innerHTML=`<div class="lvl-res">
      <div class="lvl-intro" style="margin-bottom:16px"><div class="big">🎉</div><h2>${S.name?S.name+" 어린이의 ":""}진단 결과</h2></div>
      ${rows}${trajHTML}
      <div class="lvl-reco">문제집은 <b>${rec}일차</b>부터 시작하는 것을 추천해요!<br>
        <span style="font-size:13px;color:var(--ink-2)">하루 학습이 함께 가도록 가장 기초가 필요한 과목(${recSub?recSub.label:""})에 맞췄어요.</span></div>
      ${missHTML}${reviewHTML}
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px">
        <button class="pill accent" id="ltReport" style="--ac:var(--parent)">🖨 상세 진단 리포트 인쇄</button>
        <button class="pill accent" id="ltGo" style="--ac:var(--book)">📄 ${rec}일차 학습지 열기</button>
        <button class="pill" id="ltRetry">다시 테스트</button></div></div>`;
    document.getElementById("ltGo").onclick=()=>openDay(rec-1);
    document.getElementById("ltRetry").onclick=renderLevel;
    document.getElementById("ltReport").onclick=()=>doPrint(ltReportHTML(res,per,rec,missU,okU,review,trajS,qlog,tested));
  }
  ask();
}
function ltComment(v){
  if(v<=2) return "기초 개념을 다지는 시기예요. 매일 짧게, 구체물(손가락·바둑돌)로 재미있게 반복하면 금방 자랍니다.";
  if(v<=4) return "또래 평균 이상이에요. 현재 단계를 촘촘히 다지면 상위권 진입이 충분히 가능해요.";
  if(v===5) return "취학 준비가 완성 단계예요. 다양한 유형과 문장제로 폭을 넓혀 주세요.";
  return "초등 과정을 선행 중이에요. 진도 욕심보다 사고력·서술형 확장에 무게를 두는 것을 추천해요.";
}
function ltGrade(avg){
  if(avg>=6.5) return ["S","최상위권 — 초1 상위 과정 선행"];
  if(avg>=5.5) return ["A+","상위권 — 초1 과정 선행 중"];
  if(avg>=4.5) return ["A","우수 — 취학 준비 완성 단계"];
  if(avg>=3.5) return ["B+","양호 — 또래 상위 수준"];
  if(avg>=2.5) return ["B","보통 — 또래 평균 수준"];
  return ["C","기초 다지기 — 천천히 함께 시작"];
}

function trajSVG(arr,color){
  const n=arr.length||1;
  const px=i=>n>1?16+i*(208/(n-1)):120;
  const py=l=>104-(l-1)*(88/6);
  let grid=""; for(let L=1;L<=7;L++) grid+=`<line x1="12" y1="${py(L)}" x2="228" y2="${py(L)}" stroke="#EDE9DF" stroke-width="1"/>
    <text x="6" y="${py(L)+3}" font-size="7" fill="#B3AC9E" text-anchor="middle">${L}</text>`;
  const pts=arr.map((h,i)=>`${px(i)},${py(h.l)}`).join(" ");
  const dots=arr.map((h,i)=>`<circle cx="${px(i)}" cy="${py(h.l)}" r="4.2" fill="${h.ok?"#1F9E64":"#D6455D"}" stroke="#fff" stroke-width="1.4"/>`).join("");
  return `<svg viewBox="0 0 240 118" style="width:230px;max-width:100%;background:#FDFCFA;border:1px solid #EDE9DF;border-radius:10px">${grid}
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" opacity=".85"/>${dots}</svg>`;
}
function ltReportHTML(res,per,rec,missU,okU,review,trajS,qlog,tested){

  const [gl,gd]=ltGrade(avg);

  const th='padding:6px 9px;border:1px solid #E8E3D8;background:#F7F4EE;font-weight:800;';
  /* 1. 프로파일 + 궤적 */
  const bars=subs.map(([lab,k,c])=>{ const v=res[k];
    return `<div style="display:flex;align-items:center;gap:12px;margin:8px 0">

  /* 3. 유형별 정오 분석 */

  /* 4. 해석 + 처방 */

  const rxSkills=[...new Set(missU.map(m=>m.split("·")[1]))].filter(sk=>LT_RX[sk]);
  const rxRows=rxSkills.length?rxSkills.map(sk=>`<tr>
      <td style="${td}font-weight:800">${sk}</td><td style="${td}">${LT_RX[sk][0]}</td>

  /* 5. 로드맵 + 체크박스 */
  const cb=`<span style="display:inline-block;width:11px;height:11px;border:1.4px solid #B9B2A2;border-radius:3px;margin:0 2px;vertical-align:-1px"></span>`;
  const weeks=[0,1,2,3].map(i=>{ const d0=Math.min(116,rec+i*5), d1=Math.min(120,d0+4), u=Math.floor((d0-1)/10);

  const weak=missU.map(m=>`<span style="font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:99px;border:1.2px solid #EBC4CC;color:#B03A52;background:#FBF2F4;display:inline-block;margin:2px">${m}</span>`).join("");
  return `<div class="paper" style="--sc:var(--parent)">
    <div class="phead"><div class="pday" style="background:var(--parent)"><b>진단</b><span>리포트</span></div>
      <div class="pt"><div class="pk" style="color:var(--parent)">ADAPTIVE LEVEL TEST REPORT · ${todayStr()}</div>
        <div class="pu">${S.name||"우리 아이"} 학습 수준 정밀 진단</div></div>

        <div style="font-size:26px;font-weight:800;color:var(--parent);line-height:1.1">${gl}</div>

    <div class="ws-guide"><div class="gt">검사 개요</div>
      <ul><li>적응형 계단식 검사(CAT·시력검사와 동일 원리): 정답 시 상승·오답 시 하강하며 수렴 지점을 측정 — 같은 정밀도를 훨씬 적은 문항으로 얻는 검증된 방식입니다</li>
      <li>과목당 8문항 · 총 ${qlog.length}문항 · 같은 단계 2회 이상 정답 시에만 해당 단계 인정(요행 배제)</li>
      <li>측정 범위: 1단계(만 4세) ~ 7단계(초1 2학기+ 선행) · 참고: 국가 누리과정(만 5세)은 ‘20까지의 수 감각’까지만 다루므로 <b>3단계 이상은 이미 선행 영역</b>입니다</li></ul></div>
    <div class="ws-section"><div class="ws-st"><span class="sno" style="background:var(--parent)">1</span>수준 프로파일과 측정 궤적</div>${bars}${trajRow}</div>
    <div class="ws-section"><div class="ws-st"><span class="sno" style="background:var(--parent)">2</span>전체 문항 기록 (${qlog.length}문항)</div>
      <table style="border-collapse:collapse;width:100%;font-size:11.5px;margin-top:4px">
        <tr><th style="${th}">번호</th><th style="${th}">과목</th><th style="${th}">단계</th><th style="${th}">유형</th><th style="${th}">문항</th><th style="${th}">정오</th><th style="${th}">정답(오답 시)</th></tr>${logRows}</table></div>
    <div class="ws-section"><div class="ws-st"><span class="sno" style="background:var(--parent)">3</span>유형별 정오 분석</div>
      <table style="border-collapse:collapse;width:100%;font-size:12px;margin-top:4px">
        <tr><th style="${th}">과목</th><th style="${th}">유형</th><th style="${th}">기록(●정답 ○오답)</th><th style="${th}">정답률</th><th style="${th}">판정</th></tr>${tallyRows}</table>
      <div style="margin-top:9px"><span style="font-size:11.5px;font-weight:800;color:#1F7A4D">강점 유형</span><br>${strong||"—"}</div>
      <div style="margin-top:7px"><span style="font-size:11.5px;font-weight:800;color:#B03A52">보충 유형</span><br>${weak||"— 없음"}</div></div>
    <div class="ws-section"><div class="ws-st"><span class="sno" style="background:var(--parent)">4</span>과목별 해석과 가정 지도 처방</div>
      ${comments}
      <table style="border-collapse:collapse;width:100%;font-size:12px;margin-top:8px">
        <tr><th style="${th}">보충 유형</th><th style="${th}">가정 지도 포인트</th><th style="${th}">교재 연계</th></tr>${rxRows}</table></div>
    <div class="ws-section"><div class="ws-st"><span class="sno" style="background:var(--parent)">5</span>추천 4주 학습 로드맵 — ${rec}일차부터 (주 5일 · 하루 3장 15분)</div>
      <table style="border-collapse:collapse;width:100%;font-size:12px;margin-top:4px">
        <tr><th style="${th}">주차</th><th style="${th}">진도</th><th style="${th}">수학</th><th style="${th}">국어</th><th style="${th}">영어</th><th style="${th}">완료 체크</th></tr>${weeks}</table>
      <div style="font-size:11.5px;color:#726c62;font-weight:600;margin-top:7px">※ 4주 후 레벨 테스트를 다시 하면 성장 그래프를 비교할 수 있어요. 보충 유형은 도전 퀴즈에서 자동으로 더 자주 출제됩니다.</div></div>

      <span class="mark">우리집 유치원 · 120일 학습 · 적응형 레벨 테스트</span></div></div>`;
}

const STICKERS=["🦄","🐬","🦁","🚀","🌈","🐼","🦖","🎠","🐳","🦋","🍭","🎪","🐧","🌟","🦩","🎨","🐢","🎁","🦉","⚡","🧸","🎯","👑","🏆"];
function renderSticker(){
  const unlocked=Math.min(STICKERS.length, Math.floor(S.stars/10));
  const toNext=unlocked>=STICKERS.length?0:10-(S.stars%10);
  const pct=unlocked>=STICKERS.length?100:(S.stars%10)*10;
  const nm=S.name?S.name+"의 ":"";
  secBody.innerHTML=`<div class="stk-sum">
      <div><div class="bignum">⭐ ${S.stars}</div><div class="lbl">모은 별</div></div>
      <div><div class="bignum">${unlocked} / ${STICKERS.length}</div><div class="lbl">${nm}스티커</div></div>
      <div class="stk-next"><div class="lbl">${unlocked>=STICKERS.length?"스티커판 완성! 🎉":`다음 스티커까지 별 ${toNext}개`}</div>
        <div class="stk-nextbar"><div style="width:${pct}%"></div></div></div>
    </div><div class="stk-grid" id="stkGrid"></div>
    <p class="hint" style="text-align:center">문제를 맞히면 별이 모여요. 별 10개 = 스티커 1개!</p>`;
  const g=document.getElementById("stkGrid");
  STICKERS.forEach((s,i)=>{ const d=document.createElement("div");
    d.className="stk"+(i<unlocked?(i===unlocked-1?" new":""):" locked");
    d.textContent=i<unlocked?s:"❓"; g.appendChild(d); });
}

    : `<div class="weak" style="background:color-mix(in srgb,var(--ok) 8%, var(--panel));border-color:color-mix(in srgb,var(--ok) 30%, var(--line))">아직 뚜렷한 약점이 없어요. 골고루 잘하고 있습니다 👍</div>`;

  secBody.innerHTML=`<div class="dash">

        <div class="kpi"><div class="v">⭐ ${S.stars}</div><div class="l">누적 별</div></div>
        <div class="kpi"><div class="v">${accAll}%</div><div class="l">전체 정답률</div></div>
      </div>${S.level?`<div style="margin-top:13px;font-size:13.5px;font-weight:700;color:var(--ink-2)">🧭 레벨 테스트(${S.level.date}) — 수학 Lv${S.level.m} · 국어 Lv${S.level.k} · 영어 Lv${S.level.e} → <b style="color:var(--ink)">${S.level.rec}일차 추천</b></div>`:""}</div>

/* seeded RNG: 같은 일차는 같은 학습지, '새 문제'로 재생성 */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
let WR=Math.random;
const wrnd=(a,b)=>Math.floor(WR()*(b-a+1))+a;
const wpick=a=>a[wrnd(0,a.length-1)];
function wshuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(WR()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
const wsample=(a,n)=>wshuffle(a).slice(0,n);
function P(expr,a){ return {q:expr+" = ",a:String(a)}; }
function uniqN(n,fn,keyf){ const o=[],seen=new Set(); let g=0;
  while(o.length<n&&g++<500){ const it=fn(); const k=keyf?keyf(it):JSON.stringify(it); if(!seen.has(k)){seen.add(k);o.push(it);} }
  while(o.length<n)o.push(fn()); return o; }

function clockSVG(h,m,hands){

  let hh="";
  if(hands){ const ha=(((h%12)+m/60)*30-90)*Math.PI/180, ma=(m*6-90)*Math.PI/180;
    hh=`<line x1="50" y1="50" x2="${(50+19*Math.cos(ha)).toFixed(1)}" y2="${(50+19*Math.sin(ha)).toFixed(1)}" stroke="#222" stroke-width="4.5" stroke-linecap="round"/>
<line x1="50" y1="50" x2="${(50+29*Math.cos(ma)).toFixed(1)}" y2="${(50+29*Math.sin(ma)).toFixed(1)}" stroke="#C0703A" stroke-width="3" stroke-linecap="round"/>`; }
  return `<svg viewBox="0 0 100 100" class="clock"><circle cx="50" cy="50" r="47" fill="#fff" stroke="#333" stroke-width="2.5"/>${ticks}${hh}<circle cx="50" cy="50" r="2.6" fill="#222"/></svg>`;
}

function sX(t,i,b,a){ return {t,i,b,a}; }
function bCount(mx){ const it=uniqN(8,()=>{const c=wrnd(2,mx),e=wpick(EMOJI_POOL);return{q:`${e.repeat(c)} → `,a:c};},x=>x.q);

function bAddCap(cap,n){ const it=uniqN(n||12,()=>{let a=wrnd(1,Math.min(8,cap-1)),b=wrnd(1,cap-a);return P(`${a} + ${b}`,a+b);},x=>x.q);

  const tf=`<div class="tenframe">${Array.from({length:10},(_,i)=>`<span class="${i<6?"f":"h"}"></span>`).join("")}</div><div class="tfcap">보기 · 6개가 있어요. 4개를 더하면 10 → 6과 4는 짝꿍</div>`;
  return sX("10 만들기","10이 되려면 몇이 더 필요할까요?",tf+mrows(it),ansline(it)); }

  return sX("십몇 알기","11~19는 ‘10 하고 몇’이에요. ▢를 채워요.",mrows(it),ansline(it)); }

/* 빠른 복습(과정별 누적) */
function quickMix(u,n){
  const c=WCOURSE||1;
  return uniqN(n,()=>{
    if(c===1){ if(WR()<.6){const a=wrnd(1,6),b=wrnd(1,Math.min(6,10-a));return P(`${a} + ${b}`,a+b);} const a=wrnd(3,9),b=wrnd(1,a-1);return P(`${a} − ${b}`,a-b); }
    if(c===2){ const f=wrnd(0,2); if(f===0){const a=wrnd(5,9),b=wrnd(Math.max(2,11-a),9);return P(`${a} + ${b}`,a+b);} if(f===1){const a=wrnd(11,18),b=wrnd((a%10)+1,9);return P(`${a} − ${b}`,a-b);} const t=wrnd(1,8),o=wrnd(0,4),b=wrnd(1,9-o),nn=t*10+o;return P(`${nn} + ${b}`,nn+b); }
    const f=wrnd(0,2); if(f===0){const g=wpick([2,3,4,5]),h=wrnd(2,9);return P(`${g} × ${h}`,g*h);}
    if(f===1){const t1=wrnd(1,4),o1=wrnd(5,9),t2=wrnd(1,4),o2=wrnd(11-o1,9),a=t1*10+o1,b=t2*10+o2;return P(`${a} + ${b}`,a+b);}
    const t1=wrnd(3,8),o1=wrnd(0,4),t2=wrnd(1,t1-1),o2=wrnd(o1+1,9),a=t1*10+o1,b=t2*10+o2;return P(`${a} − ${b}`,a-b);
  },x=>x.q);
}

function mathPaper(d){
  const u=Math.floor(d/10), late=(d%10)>=5, c=WCOURSE||1;
  const secs=mathPlan(c,u,late);
  let inner="", ansParts=[];
  secs.forEach((s,i)=>{ inner+=wsec(String(i+1),s.t,s.i,s.b); ansParts.push(`<b>${["①","②","③"][i]}</b> ${s.a}`); });
  const rv=quickMix(u,6);
  inner+=wsec("4","오늘의 빠른 복습","앞에서 배운 것을 잊지 않게 한 번 더!",mrows(rv,true));
  ansParts.push(`<b>④</b> ${ansline(rv)}`);
  return paperShell(d,"math","var(--math)","수학",MU[u],mgOf(c,u),inner,ansParts.join("<br>"));
}

function vocabSection(d,u){

      const its=wsample(SPELL,5).map(([ok,no])=>({q:`${no} → `,a:ok})); body=fill(its); ans=ansline(its); }

}
function readingSection(d,u){
  const tier=Math.min(2,(u<4?0:(u<8?1:2))+(WCOURSE-1));   /* 새싹·열매 과정은 더 긴 지문 */
  const pool=[PSG1,PSG2,PSG3][tier], titles=[PSG_T1,PSG_T2,PSG_T3][tier];
  const idx=(d*7+u)%pool.length, p=pool[idx];
  const body=`<div class="passage"><div class="psg-t">${titles[idx]}</div>${p.t}</div>`+p.q.map((q,i)=>{
    const infer=(tier===2&&i===2);
    return `<div class="kitem"><span class="no">${i+1}</span><em class="qt${infer?" infer":""}">${infer?"추론":"사실"}</em>${q[0]} <span class="uline"></span><span class="ans"> ${q[1]}</span></div>`;
  }).join("");
  return {html:wsec("2","글을 읽고 답해요","소리 내어 읽고 물음에 답하세요.",body),
    ans:p.q.map((q,i)=>`${i+1}) ${q[1]}`).join("&nbsp;&nbsp; ")};
}

 "과학":{c:"과학 개념은 외우기보다 ‘신기하다!’는 경험이 먼저예요.",t:["개념을 읽고 ‘왜 그럴까?’ 한 번 물어봐 주세요.","가족 탐구 활동을 꼭 함께 해 보세요. 몸으로 배운 건 오래가요."]},

function tamguPaper(d){
  const idx=(d+(WCOURSE-1)*13)%TAMGU.length, tp=TAMGU[idx];
  const conHTML=`<div class="tg-hero"><span class="tg-emoji">${tp.e}</span>
      <div><div class="tg-cat">${tp.c==="과학"?"🔬 과학":tp.c==="인성"?"😊 인성·바른생활":"🏘️ 사회"} 탐구</div><div class="tg-title">${tp.t}</div></div></div>
    <div class="tg-con">${tp.con.map((c,i)=>`<div class="tg-line"><span class="tg-no">${i+1}</span>${c}</div>`).join("")}</div>`;
  const funHTML=tp.fun.map(f=>`<div class="tg-fun">💡 ${f}</div>`).join("");
  const quizHTML=tp.quiz.map((q,i)=>
    `<div class="kitem"><span class="no">${i+1}</span>${q[0]}<span class="ans"> → ${q[1]}</span></div>`).join("");
  const actHTML=`<div class="kitem" style="font-weight:700">👨‍👩‍👧 ${tp.act}</div>
    <div class="drawbox"></div>`;
  const inner=wsec("1","오늘의 개념 — 소리 내어 읽어요","한 줄씩 함께 읽고, 아이 말로 다시 말해 보게 해 주세요.",conHTML)
    +wsec("2","알아두면 좋아요","신기한 사실! 아이와 ‘우와’ 해 보세요.",funHTML)
    +wsec("3","확인 문제","알맞은 말에 ○ 하세요.",quizHTML)
    +wsec("4","가족 탐구 활동","오늘의 개념을 몸으로 경험해요. 그림으로 남겨도 좋아요.",actHTML)
    +wsec("5","오늘 알게 된 것","가장 기억에 남는 것을 한 줄로 말하거나 써 보세요.",
      `<div class="writeline"></div>
       <div class="kitem" style="text-align:right">엄마 아빠에게 설명해 주었나요? 별을 색칠해요 → <span class="selfstars" style="font-size:18px">☆ ☆ ☆</span></div>`);
  return paperShell(d,"tamgu","var(--tamgu)","탐구",`${tp.c} · ${tp.t}`,TAMGU_GUIDE[tp.c],inner,
    tp.quiz.map((q,i)=>`${i+1}) ${q[1]}`).join("&nbsp;&nbsp; "));
}

const COACH=[
 /* [키워드들, 말해주세요, 자주 하는 실수] — 앞에서부터 먼저 맞는 것 사용 */
 [["받아올림"],"“10을 먼저 만들어 볼까? 8에 2를 주면 10이 되지. 남은 3을 더하면 13!” 이렇게 10을 기준으로 쪼개 말해 주세요.","일의 자리 합이 10을 넘어도 그냥 옆에 이어 쓰는 실수(예: 8+5=13인데 ‘113’). 올림한 1을 십의 자리에 작게 적는 습관을 잡아 주세요."],
 [["받아내림"],"“일의 자리가 모자라네? 옆집(십의 자리)에서 10을 빌려오자. 그럼 13이 되니까 13−5=8!” 빌려오는 걸 이야기처럼 들려주세요.","10을 빌려온 뒤 십의 자리를 1 줄이는 걸 잊는 실수. ‘빌렸으면 갚아야지’로 십의 자리에 작대기 긋는 습관을 들여요."],
 [["곱셈구구","곱셈"],"“2씩 3묶음이면 2, 4, 6! 이걸 2 곱하기 3이라고 해.” 뛰어 세기와 곱셈을 꼭 연결해 말해 주세요.","곱셈을 무작정 외우게만 하면 금방 잊어요. ‘같은 수를 여러 번 더한 것’이라는 뜻을 손가락·블록으로 먼저 느끼게 해요."],
 [["세 자리"],"“345는 100이 3개, 10이 4개, 1이 5개야.” 100원·10원·1원 동전으로 직접 만들어 보여 주세요.","자릿값을 헷갈려 305를 ‘35’로 읽는 실수. 빈 자리(0)도 자리를 지킨다는 걸 동전 개수로 확인시켜요."],
 [["세 수"],"“앞에서부터 둘씩! 2 더하기 3은 5, 거기에 4를 더하면 9.” 한 번에 다 하려 하지 말고 순서를 짚어 주세요.","가운데 수를 빼먹거나 순서를 건너뛰는 실수. 계산한 두 수를 연필로 살짝 묶어 표시하게 해요."],
 [["10 만들","10 모으","가르"],"“6하고 몇이면 10이 될까? 손가락을 접어 보자!” 10 짝꿍(1·9, 2·8, 3·7…)을 노래처럼 반복해요.","손가락 없이 암산부터 시키면 막혀요. 처음엔 무조건 손가락·바둑돌로 ‘채우는’ 경험을 충분히 시켜요."],
 [["십몇"],"“11은 10하고 1이야. 10개 묶음 하나에 낱개 1개!” 십몇을 ‘10+몇’으로 늘 바꿔 말해 주세요.","13을 ‘3’이나 ‘30’으로 헷갈리는 실수. 10개 묶음과 낱개를 눈으로 구분해 보여줘요."],
 [["자릿값","자리"],"“47은 10이 4개, 1이 7개야. 4는 십의 자리, 7은 일의 자리!” 자리마다 색을 다르게 칠해 주세요.","십의 자리와 일의 자리를 바꿔 쓰는 실수. 세로로 자리를 맞춰 쓰는 연습을 함께 해요."],
 [["시"],"“짧은바늘은 시, 긴바늘은 분이야. 긴바늘이 12에 있으면 정각!” 집 시계로 매일 한 번씩 읽어요.","짧은바늘과 긴바늘을 헷갈리는 실수. ‘짧은 건 작은 시, 긴 건 긴 분’처럼 말로 묶어 기억시켜요."],
 [["길이"],"“어느 게 더 길까? 끝을 나란히 맞추고 재 보자.” 자로 직접 재며 cm를 읽어 주세요.","시작점을 안 맞추고 비교하는 실수. 항상 한쪽 끝을 0에 맞추고 재는 습관을 알려줘요."],
 [["돈"],"“100원이 몇 개? 10원이 몇 개? 다 더하면 얼마지?” 실제 동전으로 가게 놀이를 해요.","동전 종류를 섞어 세다 빠뜨리는 실수. 큰 동전부터 종류별로 모아 놓고 세게 해요."],
 [["규칙"],"“무엇이 반복되고 있어? 다음엔 뭐가 올까?” 블록·색으로 규칙을 직접 만들어 보게 해요.","규칙을 눈으로만 보고 넘어가는 실수. 소리 내어 ‘빨강-파랑-빨강-파랑…’ 읽으며 리듬으로 익혀요."],
 [["문장제"],"“무엇을 구하는 거야? 그 말에 밑줄 긋자. ‘모두’면 더하기, ‘남은’이면 빼기!” 신호어를 함께 찾아요.","문제를 안 읽고 숫자만 더하는 실수. 상황을 그림으로 그려 보게 하면 식이 저절로 나와요."],
 [["뺄셈"],"“5개 중에 2개를 먹으면 몇 개 남지?” 실제 물건을 덜어내며 ‘남은 것’을 세게 해요.","빼기를 더하기로 착각하는 실수. ‘덜어내기’라는 말과 손동작(치우는 시늉)을 함께 써요."],

/* 어제 복습 장 — 망각곡선 대응: 전날 배운 것을 다음 날 한 번 더 (새 숫자로) */
function reviewPaper(pd){
  WCOURSE=S.course||1;
  WR=mulberry32(pd*7919+888888+(REROLL["r"+pd]||0)*7717);
  const u=Math.floor(pd/10);
  const m=quickMix(u,10);
  const A=wsec("1","어제 수학 다시 풀기",`${pd+1}일차 「${MU[u]}」 — 숫자만 바뀐 복습이에요.`,mrows(m,true));
  const kb=wsample(ANTONYMS,3).map(([a,b])=>({q:`${a} ↔ `,a:b}))
    .concat(wsample(COUNTERS,2).map(([a,b])=>({q:`${a} `,a:b})));
  const B=wsec("2","어제 국어 낱말 복습","빈칸에 알맞은 말을 쓰세요.",
    kb.map((it,x)=>`<div class="kitem"><span class="no">${x+1}</span>${it.q}<span class="uline" style="min-width:80px"></span><span class="ans"> ${it.a}</span></div>`).join(""));
  const ew=wsample(CVC,2);
  const C=wsec("3","어제 영어 단어 쓰기","단어를 소리 내어 읽고 따라 쓰세요.",
    ew.map(w2=>`<div class="erow" style="border:none;padding:2px 0"><span class="eE" style="margin:0 8px 0 0">${w2[1]}</span></div>`+traceRow(w2[0])).join(""));
  const tp=TAMGU[(pd+(WCOURSE-1)*13)%TAMGU.length];
  const tq=wsample(tp.quiz,2);
  const D=wsec("4",`어제 탐구 「${tp.t}」 기억나요?`,"알맞은 말에 ○ 하세요.",
    tq.map((q,x)=>`<div class="kitem"><span class="no">${x+1}</span>${q[0]}<span class="ans"> → ${q[1]}</span></div>`).join(""));
  const out=paperShell(pd,"rev","var(--think)","복습",`어제(${pd+1}일차) 한 번 더!`,
    {c:"어제 배운 것을 오늘 한 번 더 만나면 오래 기억돼요(망각곡선).",
     t:["복습은 가볍게, 5분이면 충분해요.","다 기억하면 폭풍 칭찬! 잊었어도 괜찮아요, 그래서 복습하는 거예요."]},
    A+B+C+D,
    `<b>①</b> ${ansline(m)}<br><b>②</b> ${ansline(kb)}<br><b>③</b> 따라 쓰기<br><b>④</b> ${tq.map((q,x)=>`${x+1}) ${q[1]}`).join("&nbsp; ")}`);
  WR=Math.random;
  return out;
}
function dayPapers(d){
  WCOURSE=S.course||1;
  WR=mulberry32(d*7919+(REROLL[d]||0)*104729+(WCOURSE-1)*1000003+13);
  const out=[mathPaper(d),korPaper(d),engPaper(d),tamguPaper(d)];
  WR=Math.random;
  return out;
}

/* ---- 학습 완료·진도 (과정별로 기록 — 학습 지도의 기반) ---- */
function ckey(key){ return (S.course||1)+":"+key; }
function isDone(key){ return !!(S.done&&S.done[ckey(key)]); }
function markDone(key){ if(!S.done) S.done={}; const k=ckey(key); if(S.done[k]) return false;
  S.done[k]=todayStr(); S.stars+=5; save(); return true; }
function courseDoneDays(c){ return Object.keys(S.done||{}).filter(k=>k.startsWith(c+":d")).length; }
function taskSeq(){ const seq=[]; const c=S.course||1;
  if(c===1) for(let i=0;i<5;i++) seq.push({key:"c"+i,type:"c",i,label:`맞춤 C${i+1}`,title:CC_TITLE_M[i]});
  const start=(c===1?(CHILD_CFG.startDay||1):1)-1;
  for(let d=start;d<TOTAL_DAYS;d++) seq.push({key:"d"+d,type:"d",i:d,label:`${d+1}일차`,title:MU[Math.floor(d/10)]});
  return seq;
}
function nextTask(){
  /* 복습이 최우선 — 부족한 부분은 해결하고 넘어가요 (스몰스텝 반복 원칙) */
  if(S.reviewQueue&&S.reviewQueue.length){ const r=S.reviewQueue[0];
    const isC=r.key[0]==="c"; const i=Number(r.key.slice(1));
    return {key:r.key,type:isC?"c":"d",i,review:true,subs:r.subs,
      label:(isC?`맞춤 C${i+1}`:`${i+1}일차`)+" 복습",
      title:(isC?CC_TITLE_M[i]:MU[Math.floor(i/10)])+` · ${(r.subs||[]).join("·")} 다시 풀기`}; }
  return taskSeq().find(t=>!isDone(t.key))||null;
}
function doneCount(){ return taskSeq().filter(t=>isDone(t.key)).length; }
/* 단계 잠금: 순서대로 완료해야 다음이 열려요 (완료한 단계는 언제든 복습 가능) */
function lockInfo(){ const seq=taskSeq(); let fr=seq.findIndex(t=>!isDone(t.key));
  if(fr===-1) fr=seq.length;
  const idx={}; seq.forEach((t,i)=>idx[t.key]=i);
  return {frontier:fr, idx};
}
function isLocked(key){
  if(S.freeNav) return false;                    /* 부모 설정으로 잠금 해제 가능 */
  const li=lockInfo(); const i=li.idx[key];
  if(i===undefined) return false;                /* 순서에 없는 자유 학습(시작 전 일차) */
  return i>li.frontier;
}
function isCurrent(key){ const li=lockInfo(); return li.idx[key]===li.frontier; }
function lockToast(){
  speak("이전 단계를 먼저 완료하면 열려요!");
  const t=document.createElement("div"); t.className="lock-toast";
  t.textContent="🔒 이전 단계를 먼저 완료하면 열려요!";
  document.body.appendChild(t); setTimeout(()=>t.remove(),1800);
}
function doneFlow(key,subs){
  if(!S.reviewQueue) S.reviewQueue=[];
  const hi=S.reviewQueue.findIndex(r=>r.key===key);
  if(hi>-1) S.reviewQueue.splice(hi,1);               /* 복습 완료 → 큐에서 해제 */
  if(subs&&subs.length) S.reviewQueue.push({key,subs:subs.slice(),date:todayStr()});
  if(!isDone(key)) markDone(key); else { S.stars+=3; save(); }
  bigConfetti();
  speak(subs&&subs.length?"오늘도 수고했어요! 틀린 부분은 내일 다시 만나요!":"오늘 학습 끝! 정말 잘했어요!");
  refreshHero();
}

const fx=document.getElementById("fx"), ctx=fx.getContext("2d"); let parts=[], raf=null;
function sizeFx(){ fx.width=innerWidth; fx.height=innerHeight; } sizeFx(); addEventListener("resize",sizeFx);
function confetti(){ const cs=["#E0637A","#3E7CB1","#D3922E","#5E9E7E","#8B7BC0","#CE7C4E"];
  for(let i=0;i<80;i++)parts.push({x:innerWidth/2,y:innerHeight*.35,vx:(Math.random()-.5)*13,vy:Math.random()*-13-4,
    g:.5+Math.random()*.3,s:7+Math.random()*7,c:cs[i%cs.length],r:Math.random()*6,vr:(Math.random()-.5)*.5,life:0});
  if(!raf)raf=requestAnimationFrame(stepFx); }
function bigConfetti(){ confetti(); setTimeout(confetti,220); setTimeout(confetti,460); }
function stepFx(){ ctx.clearRect(0,0,fx.width,fx.height);
  parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; p.life++;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r); ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); ctx.restore(); });
  parts=parts.filter(p=>p.y<fx.height+40&&p.life<200);
  if(parts.length)raf=requestAnimationFrame(stepFx); else{ ctx.clearRect(0,0,fx.width,fx.height); raf=null; } }

/* ===== 인쇄 엔진: 깨끗한 인쇄 전용 창 (머리글·바닥글 없음, 삼성인터넷 등 호환) ===== */
function doPrint(html){
  try{
    const w=window.open("","_blank");
    if(w&&w.document){
      const css=document.querySelector("style").textContent;
      w.document.write('<!doctype html><html lang="ko"><head><meta charset="utf-8">'
        +'<title>우리집 유치원 · 인쇄</title><style>'+css
        +' body{background:#F2F0EA !important;margin:0;padding:14px;}'
        +' .paper{box-shadow:0 2px 10px rgba(0,0,0,.08);margin:0 auto 14px;}'
        +' .pbar{position:sticky;top:0;background:#fff;border-bottom:1px solid #e5e0d5;padding:10px 14px;'
        +'  display:flex;gap:10px;align-items:center;font-family:inherit;font-weight:700;z-index:9;margin:-14px -14px 14px;}'
        +' .pbar button{font-family:inherit;font-weight:800;font-size:15px;padding:9px 18px;border-radius:10px;'
        +'  border:none;background:#2E63E7;color:#fff;cursor:pointer;}'
        +' @media print{ .pbar{display:none} body{background:#fff !important;padding:0}'
        +'  .paper{box-shadow:none;border:none;max-width:none;margin:0;padding:12mm 13mm;border-radius:0}'
        +'  .paper+.paper{page-break-before:always} @page{size:A4;margin:0} }'
        +'</style></head><body>'
        +'<div class="pbar"><button onclick="window.print()">🖨 인쇄하기</button>'
        +'<span style="font-size:12.5px;color:#8a8578">인쇄 창이 자동으로 안 뜨면 이 버튼을 누르세요 · 머리글/바닥글 없이 나와요</span></div>'
        +html
        +'<scr'+'ipt>setTimeout(function(){try{window.print()}catch(e){}},500);</scr'+'ipt></body></html>');
      w.document.close();
      return;
    }
  }catch(e){}
  /* 팝업이 막힌 경우 예비 경로 */
  document.body.classList.add("print-ws");
  document.getElementById("printMount").innerHTML=html;
  try{ window.print(); }catch(e){ alert("브라우저 메뉴에서 '인쇄'를 선택해 주세요."); }
}

/* ===== 인쇄 안전장치: Ctrl+P로 직접 인쇄해도 학습지가 나오도록 ===== */
window.addEventListener("beforeprint",()=>{
  const pm=document.getElementById("printMount");
  if(!pm.innerHTML.trim()){
    const papers=document.querySelectorAll("#paperMount .paper");
    if(papers.length) pm.innerHTML=[...papers].map(p=>p.outerHTML).join("");
  }
  document.body.classList.toggle("print-ws", !!pm.innerHTML.trim());
});
window.addEventListener("afterprint",()=>{
  document.getElementById("printMount").innerHTML="";
  document.body.classList.remove("print-ws");
});

/* ===== 재교정 마이그레이션(한 번만): 과정 씨앗 고정 + 잠금 해제 ===== */
if((S.ver||0) < 4){
  if(CHILD_CFG.courseFixed) S.course=CHILD_CFG.courseFixed;
  S.freeNav = !CHILD_CFG.lockDefault ? true : false;
  S.ver=4;
}
if((S.ver||0) < 5){   /* 완료 기록을 과정별 키로 이전(1과정으로 귀속) */
  const nd={}; Object.entries(S.done||{}).forEach(([k,v])=>{ nd[k.indexOf(":")>-1?k:("1:"+k)]=v; });
  S.done=nd; S.ver=5;
}
applyCourse(S.course||1);   /* 현재 과정의 단원 배열(MU/KU/EU) 적용 */
if(CHILD_CFG.mathDiff&&!S.diffCustom){ S.diff=CHILD_CFG.mathDiff; }   /* 맞춤 기본 난이도 (부모가 직접 바꾸면 유지) */

/* ===== 시작: 현재 주소(#해시)의 화면 복원 + 클라우드 기록 불러오기 ===== */
route();
if(supaOK()&&!S.fam){ S.fam=genFamCode(); save(); } else save();   /* 첫 실행 시 가족 코드 자동 생성 → 자동 동기화 */
syncPull().then(ok=>{ if(ok){ refreshHero(); renderSetup(); } });
</script>
