<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>우리집 유치원</title>
<style>
  :root{
    --paper:#FBFAF7; --panel:#FFFFFF; --panel-2:#F5F2EC;
    --ink:#2A2925; --ink-soft:#8B857A; --line:#EAE5DB; --shadow:rgba(45,38,25,.07);
    --korean:#E0637A; --math:#3E7CB1; --english:#D3922E; --think:#5E9E7E; --quiz:#8B7BC0; --book:#CE7C4E;
    --ok:#3EA76A; --no:#E0637A;
    --r:20px;
    --font:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","맑은 고딕","Segoe UI",system-ui,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{ --paper:#17181C; --panel:#212228; --panel-2:#191A1E; --ink:#F1EEE8; --ink-soft:#A6A196;
      --line:#32333A; --shadow:rgba(0,0,0,.4); }
  }
  :root[data-theme="light"]{ --paper:#FBFAF7; --panel:#FFFFFF; --panel-2:#F5F2EC; --ink:#2A2925;
    --ink-soft:#8B857A; --line:#EAE5DB; --shadow:rgba(45,38,25,.07); }
  :root[data-theme="dark"]{ --paper:#17181C; --panel:#212228; --panel-2:#191A1E; --ink:#F1EEE8;
    --ink-soft:#A6A196; --line:#32333A; --shadow:rgba(0,0,0,.4); }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:var(--font); color:var(--ink); background:var(--paper);
    background-image:radial-gradient(var(--line) .8px, transparent .8px);
    background-size:22px 22px;
    min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden;
    font-size:16px; line-height:1.5;
  }
  .wrap{ max-width:1080px; margin:0 auto; padding:20px 18px 72px; }

  /* topbar */
  .topbar{ display:flex; align-items:center; gap:12px; margin:4px 2px 26px; }
  .brand{ display:flex; align-items:center; gap:11px; font-weight:800; font-size:clamp(20px,4vw,26px); letter-spacing:-.4px; }
  .brand .logo{ width:44px; height:44px; border-radius:13px; background:var(--korean); display:grid; place-items:center; font-size:24px; }
  .spacer{ flex:1; }
  .iconbtn{ border:1px solid var(--line); cursor:pointer; font-family:inherit; width:48px; height:48px; border-radius:14px;
    font-size:21px; background:var(--panel); color:var(--ink); box-shadow:0 2px 8px var(--shadow); transition:.15s; }
  .iconbtn:hover{ transform:translateY(-1px); }

  .pill{ display:inline-flex; align-items:center; gap:8px; border:1px solid var(--line); cursor:pointer; font-family:inherit;
    font-weight:700; font-size:16px; color:var(--ink); background:var(--panel); padding:11px 18px; border-radius:999px;
    box-shadow:0 2px 8px var(--shadow); transition:.15s; }
  .pill:hover{ transform:translateY(-1px); }
  .pill:active{ transform:translateY(1px); }
  .pill.accent{ background:var(--ac,var(--korean)); color:#fff; border-color:transparent; }

  /* home */
  .hero{ margin-bottom:26px; }
  .hero h1{ font-size:clamp(26px,6vw,40px); font-weight:800; letter-spacing:-1px; margin:0 0 6px; text-wrap:balance; }
  .hero p{ color:var(--ink-soft); font-size:clamp(15px,3.2vw,18px); font-weight:600; margin:0; }

  .menu{ display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
  .tile{ position:relative; border:1px solid var(--line); cursor:pointer; font-family:inherit; color:var(--ink);
    background:var(--panel); border-radius:22px; padding:20px; text-align:left; display:flex; flex-direction:column;
    gap:12px; box-shadow:0 3px 14px var(--shadow); transition:.16s; min-height:132px; }
  .tile:hover{ transform:translateY(-3px); box-shadow:0 10px 24px var(--shadow); }
  .tile:active{ transform:translateY(0); }
  .tile .chip{ width:52px; height:52px; border-radius:15px; display:grid; place-items:center; font-size:27px; color:#fff; }
  .tile .t-title{ font-size:21px; font-weight:800; letter-spacing:-.4px; }
  .tile .t-en{ font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-soft); margin-top:-6px; }
  .tile .t-desc{ font-size:13px; font-weight:600; color:var(--ink-soft); margin-top:auto; }

  /* screens */
  .screen{ display:none; }
  .screen.active{ display:block; animation:fade .25s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
  .sec-head{ display:flex; align-items:center; gap:14px; margin:2px 0 22px; flex-wrap:wrap; }
  .sec-title{ font-size:clamp(22px,5vw,30px); font-weight:800; letter-spacing:-.5px; display:flex; align-items:center; gap:10px; }
  .sec-title .dot{ width:16px; height:16px; border-radius:5px; }

  /* mode tabs */
  .modes{ display:flex; flex-wrap:wrap; gap:9px; margin-bottom:22px; }
  .mode-btn{ border:1px solid var(--line); cursor:pointer; font-family:inherit; font-weight:700; font-size:16px;
    padding:10px 18px; border-radius:999px; background:var(--panel); color:var(--ink); transition:.15s; }
  .mode-btn:hover{ transform:translateY(-1px); }

  /* flashcards */
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:13px; }
  .card{ border:1px solid var(--line); cursor:pointer; font-family:inherit; color:var(--ink); background:var(--panel);
    border-radius:20px; padding:18px 12px; display:flex; flex-direction:column; align-items:center; gap:7px;
    box-shadow:0 3px 12px var(--shadow); transition:.14s; }
  .card:hover{ transform:translateY(-3px); }
  .card .big-emoji{ font-size:46px; line-height:1; }
  .card .big-letter{ font-weight:800; line-height:1; letter-spacing:-1px; }
  .card .label{ font-size:16px; font-weight:700; color:var(--ink-soft); }
  .card.playing{ animation:pulse .45s ease; border-color:var(--ac,var(--english)); }
  @keyframes pulse{ 0%,100%{transform:none} 40%{transform:scale(1.06)} }

  /* problem area */
  .stage{ max-width:640px; margin:0 auto; text-align:center; }
  .scorebar{ display:inline-flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line);
    padding:9px 18px; border-radius:999px; box-shadow:0 2px 8px var(--shadow); font-weight:800; font-size:18px; }
  .q-row{ display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:12px;
    font-size:clamp(36px,8vw,52px); margin:20px 0 4px; }
  .q-text{ font-size:clamp(26px,6vw,38px); font-weight:800; text-align:center; margin:18px 0 26px; letter-spacing:-.5px;
    text-wrap:balance; line-height:1.3; }
  .q-choices{ display:grid; grid-template-columns:repeat(3,1fr); gap:13px; max-width:560px; margin:0 auto; }
  .q-choices.two{ grid-template-columns:repeat(2,1fr); max-width:400px; }
  .opt{ border:1.5px solid var(--line); cursor:pointer; font-family:inherit; background:var(--panel); color:var(--ink);
    border-radius:18px; padding:22px 8px; box-shadow:0 3px 12px var(--shadow); transition:.13s; min-height:100px;
    display:flex; align-items:center; justify-content:center; }
  .opt:hover{ transform:translateY(-2px); }
  .opt:disabled{ cursor:default; }
  .opt .oe{ font-size:52px; } .opt .ol{ font-size:38px; font-weight:800; }
  .opt.right{ border-color:var(--ok); background:color-mix(in srgb,var(--ok) 14%, var(--panel)); }
  .opt.wrong{ border-color:var(--no); opacity:.5; }
  .hint{ color:var(--ink-soft); font-weight:600; font-size:16px; margin:14px 0 4px; }

  /* challenge */
  .progress{ height:14px; background:var(--panel); border:1px solid var(--line); border-radius:999px; overflow:hidden;
    max-width:560px; margin:2px auto 10px; }
  .progress .bar{ height:100%; width:0%; background:var(--quiz); transition:width .35s; }
  .pmeta{ text-align:center; font-weight:700; font-size:17px; margin-bottom:18px; color:var(--ink-soft); }
  .pmeta b{ color:var(--ink); }
  .finish .big{ font-size:70px; }

  /* ===== 문제집 (worksheet) ===== */
  .book-intro{ background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:16px 18px; margin-bottom:20px;
    color:var(--ink-soft); font-weight:600; font-size:15px; box-shadow:0 2px 10px var(--shadow); }
  .book-intro b{ color:var(--ink); }
  .day-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:13px; }
  .day-card{ border:1px solid var(--line); cursor:pointer; font-family:inherit; text-align:left; background:var(--panel);
    border-radius:18px; padding:16px 17px; box-shadow:0 3px 12px var(--shadow); transition:.15s; color:var(--ink); }
  .day-card:hover{ transform:translateY(-3px); }
  .day-card .dn{ font-size:19px; font-weight:800; letter-spacing:-.4px; display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .day-card .dn .num{ width:34px; height:34px; border-radius:10px; background:var(--book); color:#fff; display:grid; place-items:center; font-size:15px; }
  .day-card .subj{ display:flex; flex-wrap:wrap; gap:6px; }
  .day-card .subj span{ font-size:12px; font-weight:700; padding:4px 9px; border-radius:999px; border:1px solid var(--line); color:var(--ink-soft); }

  .toolbar{ display:flex; flex-wrap:wrap; gap:9px; margin-bottom:18px; }

  .paper{ background:#fff; color:#242220; border:1px solid var(--line); border-radius:14px; max-width:760px; margin:0 auto;
    padding:34px 36px 40px; box-shadow:0 6px 26px var(--shadow); }
  :root[data-theme="dark"] .paper{ filter:none; }
  .ws-head{ display:flex; justify-content:space-between; align-items:flex-end; border-bottom:2.5px solid #242220; padding-bottom:10px; margin-bottom:6px; gap:12px; flex-wrap:wrap; }
  .ws-head .wl{ font-weight:800; font-size:20px; letter-spacing:-.5px; }
  .ws-head .wl small{ display:block; font-size:12px; font-weight:700; color:#8a8578; letter-spacing:1px; }
  .ws-head .wr{ font-size:14px; color:#555049; font-weight:700; }
  .ws-guide{ background:#FBF3E9; border:1px solid #EBD8C1; border-radius:12px; padding:13px 15px; margin:16px 0 22px; }
  .ws-guide .gt{ font-weight:800; font-size:14px; color:#C0703A; margin-bottom:5px; letter-spacing:-.2px; }
  .ws-guide .gc{ font-weight:700; font-size:15px; margin-bottom:8px; color:#33302b; }
  .ws-guide ul{ margin:0; padding-left:18px; }
  .ws-guide li{ font-size:13.5px; color:#4a463f; margin:3px 0; line-height:1.45; }
  .ws-section{ margin:22px 0; break-inside:avoid; }
  .ws-st{ display:flex; align-items:center; gap:9px; font-weight:800; font-size:17px; margin-bottom:4px; letter-spacing:-.3px; }
  .ws-st .badge{ font-size:12px; font-weight:800; color:#fff; padding:3px 10px; border-radius:999px; }
  .ws-instr{ font-size:13.5px; color:#726c62; font-weight:600; margin:2px 0 14px; }
  .mgrid{ display:grid; grid-template-columns:1fr 1fr; gap:12px 26px; }
  .mitem{ font-size:19px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .mitem .no{ color:#b0a99b; font-size:14px; min-width:20px; }
  .blank{ display:inline-block; min-width:44px; height:30px; border:1.5px solid #cfc7b8; border-radius:7px; vertical-align:middle; }
  .kitem{ font-size:16px; font-weight:600; margin:11px 0; line-height:1.7; }
  .kitem .no{ color:#b0a99b; font-size:13px; margin-right:6px; }
  .uline{ display:inline-block; min-width:120px; border-bottom:1.5px solid #cfc7b8; height:22px; vertical-align:bottom; margin:0 4px; }
  .writeline{ border-bottom:1.6px solid #ddd6c8; height:36px; margin:12px 0; }
  .bank{ display:flex; flex-wrap:wrap; gap:7px; margin:6px 0 14px; }
  .bank span{ font-size:13px; font-weight:700; padding:5px 12px; border:1.4px dashed #cfc7b8; border-radius:8px; color:#514c43; }
  .passage{ background:#f7f5f0; border-radius:10px; padding:13px 15px; font-size:15px; font-weight:600; line-height:1.7; margin-bottom:14px; }
  .erow{ display:flex; align-items:center; gap:16px; padding:9px 0; border-bottom:1px dashed #e6e0d2; }
  .erow .eL{ font-size:40px; font-weight:800; color:#cfc7b8; letter-spacing:8px; font-family:"Segoe UI",var(--font); }
  .erow .eW{ font-size:17px; font-weight:700; } .erow .eW small{ display:block; font-size:12px; color:#8a8578; font-weight:600; }
  .erow .eE{ font-size:30px; margin-left:auto; }
  .efill{ font-size:22px; font-weight:700; display:flex; align-items:center; gap:10px; padding:8px 0; }
  .ans{ display:none; color:var(--ok); font-weight:800; }
  .paper.show-ans .ans{ display:inline; }
  .paper.show-ans .blank, .paper.show-ans .uline{ border-color:transparent; }
  .ansbox{ display:none; margin-top:20px; background:#f4f6f4; border:1px solid #d9e3d9; border-radius:10px; padding:12px 15px; }
  .paper.show-ans .ansbox{ display:block; }
  .ansbox .at{ font-weight:800; font-size:13px; color:var(--ok); margin-bottom:5px; }
  .ansbox .al{ font-size:13px; color:#4a463f; line-height:1.7; }

  #printMount{ display:none; }
  #fx{ position:fixed; inset:0; pointer-events:none; z-index:50; }
  footer{ text-align:center; margin-top:44px; color:var(--ink-soft); font-weight:600; font-size:13px; }

  /* tablet */
  @media (min-width:700px){
    body{ font-size:17px; }
    .menu{ grid-template-columns:repeat(3,1fr); gap:16px; }
    .tile{ min-height:150px; }
    .opt{ min-height:120px; }
    .grid{ grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); }
  }
  @media (min-width:1000px){ .menu{ grid-template-columns:repeat(3,1fr); } }

  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important; } }

  /* print */
  @media print{
    html,body{ background:#fff !important; }
    .app-root, #fx{ display:none !important; }
    #printMount{ display:block !important; }
    #printMount .paper{ box-shadow:none; border:none; max-width:none; margin:0; padding:0; border-radius:0; }
    .ws-guide{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    @page{ size:A4; margin:14mm; }
  }
</style>
</head>
<body>
<div class="app-root">
<canvas id="fx"></canvas>
<div class="wrap">

  <div class="topbar">
    <div class="brand"><span class="logo">🏡</span><span>우리집 유치원</span></div>
    <div class="spacer"></div>
    <button class="iconbtn" id="themeBtn" aria-label="밝기 바꾸기">🌙</button>
  </div>

  <section class="screen active" id="home">
    <div class="hero">
      <h1>오늘도 재미있게 배워요</h1>
      <p>태블릿으로 문제를 풀고, 종이로 인쇄해서 공부해요 ✏️</p>
    </div>
    <div class="menu" id="menu"></div>
    <footer>강남 유치원 눈높이 · 만 4~5세 선행 · 하루 15분</footer>
  </section>

  <section class="screen" id="section">
    <div class="sec-head">
      <button class="pill" id="backBtn">← 집으로</button>
      <div class="sec-title" id="secTitle"></div>
    </div>
    <div id="secBody"></div>
  </section>

</div>
</div>
<div id="printMount"></div>

<script>
/* ===== Speech ===== */
let voices=[];
function loadVoices(){ voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if(window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function pickVoice(l){ const w=l.slice(0,2); return voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith(w))||null; }
function speak(t,l){ if(!window.speechSynthesis) return; l=l||"ko-KR"; speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t); u.lang=l; const v=pickVoice(l); if(v)u.voice=v;
  u.rate=l.startsWith("en")?.8:.95; u.pitch=1.08; speechSynthesis.speak(u); }

/* ===== Utils ===== */
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(a){ return a[rnd(0,a.length-1)]; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sample(a,n){ return shuffle(a).slice(0,n); }
function pickWrong(c,cands,n=2){ const seen=new Set([c]),out=[];
  for(const x of shuffle(cands)){ if(x>=0&&!seen.has(x)){seen.add(x);out.push(x);} if(out.length>=n)break; }
  let d=1; while(out.length<n){ [c+d,c-d].forEach(x=>{ if(out.length<n&&x>=0&&!seen.has(x)){seen.add(x);out.push(x);} }); d++; } return out; }
function choiceSet(c,wrongs,emoji){ const a=[{show:String(c),ok:true,emoji:!!emoji}];
  wrongs.forEach(w=>a.push({show:String(w),ok:false,emoji:!!emoji})); return shuffle(a); }
function esc(s){ return String(s); }

/* ===== Menu ===== */
const MENU=[
  {id:"korean",   title:"국어",     en:"Reading",  desc:"반대말·수수께끼",   emoji:"📖", ac:"var(--korean)"},
  {id:"math",     title:"수학",     en:"Math",     desc:"덧셈·뺄셈·두 자리", emoji:"➕", ac:"var(--math)"},
  {id:"english",  title:"영어",     en:"English",  desc:"알파벳·첫 단어",   emoji:"🔤", ac:"var(--english)"},
  {id:"think",    title:"사고력",   en:"Logic",    desc:"규칙·비교·순서",    emoji:"🧩", ac:"var(--think)"},
  {id:"challenge",title:"도전 퀴즈", en:"Challenge",desc:"10문제 실전!",     emoji:"🏆", ac:"var(--quiz)"},
  {id:"book",     title:"문제집",   en:"Worksheet",desc:"인쇄해서 종이로",  emoji:"📄", ac:"var(--book)"},
];
const menuEl=document.getElementById("menu");
MENU.forEach(m=>{ const b=document.createElement("button"); b.className="tile";
  b.innerHTML=`<div class="chip" style="background:${m.ac}">${m.emoji}</div>
    <div><div class="t-title">${m.title}</div><div class="t-en">${m.en}</div></div>
    <div class="t-desc">${m.desc}</div>`;
  b.onclick=()=>openSection(m); menuEl.appendChild(b); });

/* ===== Interactive data ===== */
const ANTONYMS=[["크다","작다"],["높다","낮다"],["길다","짧다"],["빠르다","느리다"],["뜨겁다","차갑다"],
  ["무겁다","가볍다"],["많다","적다"],["밝다","어둡다"],["넓다","좁다"],["두껍다","얇다"],["열다","닫다"],
  ["웃다","울다"],["앞","뒤"],["위","아래"],["낮","밤"],["여름","겨울"],["가득","텅"],["시작","끝"]];
const RIDDLES=[
  {q:"다리가 넷인데 걷지 못하는 것은?",a:"책상",d:["강아지","거미"]},
  {q:"낮에는 자고 밤에 일하는 새는?",a:"부엉이",d:["참새","닭"]},
  {q:"빨갛고 씨가 겉에 붙은 과일은?",a:"딸기",d:["사과","수박"]},
  {q:"코가 길고 몸집이 큰 동물은?",a:"코끼리",d:["기린","하마"]},
  {q:"하늘에서 내리는 하얗고 차가운 것은?",a:"눈",d:["비","구름"]},
  {q:"먹을수록 자꾸 많아지는 것은?",a:"나이",d:["사탕","용돈"]},
  {q:"목이 길어 높은 잎을 먹는 동물은?",a:"기린",d:["사슴","낙타"]},
  {q:"둥글고 밤하늘에 뜨는 것은?",a:"달",d:["해","별"]},
  {q:"물에 살고 아가미로 숨 쉬는 것은?",a:"물고기",d:["개구리","오리"]},
  {q:"불을 끄고 사람을 구하는 자동차는?",a:"소방차",d:["버스","택시"]}];
const EMOJI_POOL=["🍎","🍌","🍊","🍇","🍓","🐶","🐱","🐰","🦊","🐸","⭐","🌙","🚗","✈️","🎈","⚽","🌸","🐤"];
const PATTERNS=[["🍎","🍌"],["⭐","🌙"],["🔴","🔵"],["🐶","🐱"],["🚗","✈️"],["🔺","🟦"],["🍓","🍇","🍊"],["⚽","🎈","🌸"]];
const ALPHABET=[["A","🍎","Apple"],["B","⚽","Ball"],["C","🐱","Cat"],["D","🐶","Dog"],["E","🥚","Egg"],

/* ===== Interactive generators ===== */
function gAdd(){ const a=rnd(2,9),b=rnd(2,9),s=a+b; return {text:`${a} + ${b} = ?`,say:`${a} 더하기 ${b}는?`,choices:choiceSet(s,pickWrong(s,[s+1,s-1,s+2,s-2]))}; }
function gSub(){ const a=rnd(6,18),b=rnd(1,a-1),s=a-b; return {text:`${a} − ${b} = ?`,say:`${a} 빼기 ${b}는?`,choices:choiceSet(s,pickWrong(s,[s+1,s-1,s+2,s-2]))}; }
function gMake10(){ const a=rnd(1,9),ans=10-a; return {text:`${a} + ⬜ = 10`,say:`${a} 더하기 얼마가 10일까요?`,choices:choiceSet(ans,pickWrong(ans,[ans+1,ans-1,ans+2,a]))}; }
function gTwo(){ const t1=rnd(1,4),o1=rnd(0,4),t2=rnd(1,Math.min(4,9-t1)),o2=rnd(0,9-o1),a=t1*10+o1,b=t2*10+o2,s=a+b;
  return {text:`${a} + ${b} = ?`,say:`${a} 더하기 ${b}는?`,choices:choiceSet(s,pickWrong(s,[s+1,s-1,s+10,s-10]))}; }
function gAntonym(){ const p=pick(ANTONYMS); const [w1,w2]=Math.random()<.5?p:[p[1],p[0]];
  const pool=ANTONYMS.flat().filter(w=>w!==w1&&w!==w2);
  return {text:`"${w1}" 의 반대말은?`,say:`${w1}. 반대말은?`,choices:choiceSet(w2,sample(pool,2))}; }
function gRiddle(){ const r=pick(RIDDLES); return {text:r.q,say:r.q,choices:choiceSet(r.a,r.d)}; }
function gPattern(){ const u=pick(PATTERNS),seq=[]; for(let i=0;i<4;i++)seq.push(u[i%u.length]);
  const ans=u[4%u.length], wrongs=sample(EMOJI_POOL.filter(e=>!u.includes(e)),2);
  return {rowEmojis:seq.concat("❔"),text:"다음에는 무엇이 올까요?",say:"다음에는 무엇이 올까요?",choices:choiceSet(ans,wrongs,true)}; }
function gCompare(){ let a=rnd(11,99),b=rnd(11,99); while(b===a)b=rnd(11,99);
  const big=Math.random()<.5, ans=big?Math.max(a,b):Math.min(a,b);
  return {text:`${a} 와 ${b} 중 ${big?"더 큰":"더 작은"} 수는?`,say:`${a}, ${b}. ${big?"더 큰":"더 작은"} 수는?`,
    choices:shuffle([{show:String(a),ok:a===ans},{show:String(b),ok:b===ans}])}; }
function gOrdinal(){ const row=sample(EMOJI_POOL,5),n=rnd(1,5),ans=row[n-1],wrongs=sample(row.filter(e=>e!==ans),2);
  const kor=["첫","두","세","네","다섯"][n-1];
  return {rowEmojis:row,text:`왼쪽에서 ${kor} 번째는?`,say:`왼쪽에서 ${n}번째는 무엇일까요?`,choices:choiceSet(ans,wrongs,true)}; }

/* ===== Quiz area ===== */
function makeQuizArea(area,gen,lang){
  let streak=0;
  area.innerHTML=`<div class="stage"><div class="scorebar">⭐ <span class="sv">0</span></div><div class="qb"></div></div>`;
  const sv=area.querySelector(".sv"), qb=area.querySelector(".qb");
  function next(){ const p=gen();
    const row=p.rowEmojis?`<div class="q-row">${p.rowEmojis.map(e=>`<span>${e}</span>`).join("")}</div>`:"";
    qb.innerHTML=row+`<div class="q-text">${p.text}</div><div class="q-choices${p.choices.length===2?" two":""}"></div>`;
    speak(p.say,p.sayLang||lang||"ko-KR");
    const wrap=qb.querySelector(".q-choices");
    p.choices.forEach(ch=>{ const b=document.createElement("button"); b.className="opt";
      b.innerHTML=ch.emoji?`<span class="oe">${ch.show}</span>`:`<span class="ol">${ch.show}</span>`;
      b.onclick=()=>{ if(ch.ok){ b.classList.add("right"); streak++; sv.textContent=streak; speak("잘했어요!"); confetti();
          [...wrap.children].forEach(x=>x.disabled=true); setTimeout(next,1150); }
        else { b.classList.add("wrong"); b.disabled=true; speak("다시 해볼까?"); } };
      wrap.appendChild(b); });
  } next();
}

/* ===== Challenge ===== */
function renderChallenge(){
  const gens=[gAdd,gSub,gMake10,gTwo,gAntonym,gRiddle,gPattern,gCompare,gOrdinal]; const TOTAL=10; let idx=0,stars=0;
  secBody.innerHTML=`<div class="stage"><div class="progress"><div class="bar"></div></div>
    <div class="pmeta"><b class="pn">1</b> / ${TOTAL} 문제 · ⭐ <b class="pc">0</b></div><div class="qb"></div></div>`;
  const bar=secBody.querySelector(".bar"),pn=secBody.querySelector(".pn"),pc=secBody.querySelector(".pc"),qb=secBody.querySelector(".qb");
  function next(){ if(idx>=TOTAL)return finish();
    pn.textContent=idx+1; bar.style.width=(idx/TOTAL*100)+"%";
    const p=pick(gens)(); let first=true;
    const row=p.rowEmojis?`<div class="q-row">${p.rowEmojis.map(e=>`<span>${e}</span>`).join("")}</div>`:"";
    qb.innerHTML=row+`<div class="q-text">${p.text}</div><div class="q-choices${p.choices.length===2?" two":""}"></div>`;
    speak(p.say,p.sayLang||"ko-KR"); const wrap=qb.querySelector(".q-choices");
    p.choices.forEach(ch=>{ const b=document.createElement("button"); b.className="opt";
      b.innerHTML=ch.emoji?`<span class="oe">${ch.show}</span>`:`<span class="ol">${ch.show}</span>`;
      b.onclick=()=>{ if(ch.ok){ b.classList.add("right"); if(first){stars++;pc.textContent=stars;} confetti(); speak("잘했어요!");
          [...wrap.children].forEach(x=>x.disabled=true); idx++; setTimeout(next,1100); }
        else { b.classList.add("wrong"); b.disabled=true; first=false; speak("다시!"); } };
      wrap.appendChild(b); });
  }
  function finish(){ bar.style.width="100%"; pn.textContent=TOTAL;
    const msg=stars>=9?"대단해요! 최고예요! 🏆":stars>=6?"정말 잘했어요! 👏":"좋아요! 다시 도전해요! 💪";
    qb.innerHTML=`<div class="finish"><div class="big">🏆</div><div class="q-text">${TOTAL}문제 중 ⭐ ${stars}개!</div>
      <div class="hint">${msg}</div><button class="pill accent" id="againC" style="--ac:var(--quiz)">🔁 다시 도전</button></div>`;
    speak(`${TOTAL}문제 중 ${stars}개 맞았어요. ${stars>=8?"최고예요":"잘했어요"}!`); bigConfetti();
    document.getElementById("againC").onclick=()=>renderChallenge(); }
  next();
}

/* ---- math generator per day ---- */
function P(expr,a){ return {q:`${expr} = `,a:String(a)}; }
function nItems(n,fn){ const o=[],seen=new Set(); let g=0;
  while(o.length<n && g++<200){ const it=fn(); if(!seen.has(it.q)){ seen.add(it.q); o.push(it); } }
  while(o.length<n){ o.push(fn()); } return o; }
function mathDay(d){
  switch(d){
    case 0: return nItems(8,()=>{const a=rnd(1,8),b=rnd(1,9-a);return P(`${a} + ${b}`,a+b);});
    case 1: return nItems(8,()=>{const a=rnd(5,9),b=rnd(5,9);return P(`${a} + ${b}`,a+b);});
    case 2: return nItems(8,()=>{const a=rnd(3,9),b=rnd(1,a);return P(`${a} − ${b}`,a-b);});
    case 3: return nItems(8,()=>{ const x=rnd(1,9); return Math.random()<.5?{q:`${x} 과 ▢ 를 모으면 10`,a:String(10-x)}:{q:`10 은 ${x} 과 ▢`,a:String(10-x)};});
    case 4: return nItems(8,()=>{const a=rnd(11,18),b=rnd(2,9);return P(`${a} − ${b}`,a-b);});
    case 5: return nItems(8,()=>{const o=rnd(0,4),t=rnd(1,8),b=rnd(1,9-o),n=t*10+o;return P(`${n} + ${b}`,n+b);});
    case 6: return nItems(6,()=>{const t1=rnd(1,4),o1=rnd(0,4),t2=rnd(1,Math.min(4,9-t1)),o2=rnd(0,9-o1),a=t1*10+o1,b=t2*10+o2;return P(`${a} + ${b}`,a+b);});
    case 7: return nItems(8,()=>{const a=rnd(1,4),b=rnd(1,4),c=rnd(1,4);return P(`${a} + ${b} + ${c}`,a+b+c);});
    case 8: return nItems(8,()=>{let a=rnd(11,99),b=rnd(11,99); while(b===a)b=rnd(11,99); return {q:`${a} ▢ ${b}`,a:a>b?">":"<"};});
    case 9: return nItems(8,()=>{const t=rnd(0,3); if(t===0){const a=rnd(2,9),b=rnd(2,9);return P(`${a} + ${b}`,a+b);}
              if(t===1){const a=rnd(6,18),b=rnd(1,a-1);return P(`${a} − ${b}`,a-b);}
              if(t===2){const o=rnd(0,4),tt=rnd(1,8),b=rnd(1,9-o),n=tt*10+o;return P(`${n} + ${b}`,n+b);}
              const a=rnd(1,4),b=rnd(1,4),c=rnd(1,4);return P(`${a} + ${b} + ${c}`,a+b+c);});
  }
}
function mathInstr(d){ return ["빈칸에 답을 써 보세요.","10을 만들며 더해 보세요.","빈칸에 답을 써 보세요.","빈칸에 알맞은 수를 써 보세요.","빈칸에 답을 써 보세요.","일의 자리부터 더해요.","자리를 맞춰 더해요.","앞에서부터 차례로 더해요.","▢ 안에 > 또는 < 를 쓰세요.","배운 것을 떠올리며 풀어요."][d]; }

/* ---- korean generator per day ---- */
function korDay(d){
  switch(d){
    case 0: return {instr:"반대말을 빈칸에 써 보세요.",items:sample(ANTONYMS,6).map(([a,b])=>({q:`${a} ↔ `,a:b}))};
    case 1: return {instr:"수수께끼의 답을 써 보세요.",items:sample(RIDDLES,5).map(r=>({q:r.q+" → ",a:r.a}))};
    case 2: return {instr:"비슷한 말을 써 보세요.",bank:SYN.map(s=>s[1]),items:sample(SYN,5).map(([a,b])=>({q:`${a} ≈ `,a:b}))};
    case 3: return {instr:"부모님이 불러 주시면 듣고 받아써요.",dictation:SENTENCES};
    case 4: return {instr:"알맞은 흉내내는 말을 써 보세요.",bank:MIMESIS.map(m=>m[1]),items:sample(MIMESIS,5).map(([s,w])=>({q:`${s} ______ 해요. → `,a:w}))};
    case 5: return {instr:"알맞은 말(조사)을 빈칸에 써요.",bank:["은","는","이","가","을","를","와"],items:JOSA.map(([q,a])=>({q,a}))};
    case 6: return {instr:"글을 읽고 물음에 답하세요.",passage:PASSAGE};
    case 7: return {instr:"같은 종류가 아닌 것을 찾아 ○ 하세요.",items:CLASSIFY.map(([q,list,a])=>({q:`${q}: ${list} → `,a}))};
    case 8: return {instr:"낱말을 바르게 늘어놓아 문장을 만들어요.",items:MAKESENT.map(([q,a])=>({q:`[ ${q} ] → `,a}))};
    case 9: return {instr:"배운 것을 떠올리며 풀어요.",items:[...sample(ANTONYMS,2).map(([a,b])=>({q:`${a} ↔ `,a:b})),...sample(RIDDLES,2).map(r=>({q:r.q+" → ",a:r.a})),...sample(CLASSIFY,1).map(([q,list,a])=>({q:`${q}: ${list} → `,a}))]};
  }
}
/* ---- english generator per day ---- */
function engDay(d){
  if(d<=4){ const r=[[0,5],[5,10],[10,15],[15,20],[20,26]][d]; return {type:"trace",instr:"큰 소리로 읽고, 흐린 글자를 따라 써 보세요.",items:ALPHABET.slice(r[0],r[1])}; }
  if(d===5) return {type:"match",instr:"대문자를 보고 짝인 소문자를 써 보세요.",items:sample(UPLOW,6)};
  if(d===6) return {type:"fillmid",instr:"그림을 보고 가운데 빠진 소리 a 를 써 보세요.",items:PA};
  if(d===7) return {type:"fillfront",instr:"첫소리를 써 보세요. (s, m, t)",items:sample(PC,6)};
  if(d===8) return {type:"trace",instr:"소리 내어 읽고 따라 써 보세요.",items:CVC.slice(0,6)};
  return {type:"mix",instr:"배운 것을 떠올리며 읽고 써 보세요.",alpha:sample(ALPHABET,4),words:sample(CVC,3)};
}

/* ---- render worksheet ---- */
function badge(c){ return `style="background:${c}"`; }
function mathHTML(d){ const items=mathDay(d);
  const rows=items.map((it,i)=>`<div class="mitem"><span class="no">${i+1})</span>${it.q}<span class="blank"></span><span class="ans"> ${it.a}</span></div>`).join("");
  return {title:"수학 · "+DAY_INFO[d].math, instr:mathInstr(d), color:"var(--math)", body:`<div class="mgrid">${rows}</div>`, ans:items.map((it,i)=>`${i+1}) ${it.a}`).join("   ")};
}
function korHTML(d){ const k=korDay(d); let body="", ans="";
  if(k.dictation){ body=k.dictation.map(()=>`<div class="writeline"></div>`).join("");
    ans="(불러줄 문장) "+k.dictation.join("  /  "); }
  else if(k.passage){ const p=k.passage; body=`<div class="passage">${p.t}</div>`+p.q.map((q,i)=>`<div class="kitem"><span class="no">${i+1})</span>${q[0]} <span class="uline"></span><span class="ans"> ${q[1]}</span></div>`).join("");
    ans=p.q.map((q,i)=>`${i+1}) ${q[1]}`).join("   "); }
  else { const bank=k.bank?`<div class="bank">${k.bank.map(b=>`<span>${b}</span>`).join("")}</div>`:"";
    body=bank+k.items.map((it,i)=>`<div class="kitem"><span class="no">${i+1})</span>${it.q}<span class="uline"></span><span class="ans"> ${it.a}</span></div>`).join("");
    ans=k.items.map((it,i)=>`${i+1}) ${it.a}`).join("   "); }
  return {title:"국어 · "+DAY_INFO[d].kor, instr:k.instr, color:"var(--korean)", body, ans};
}
function engHTML(d){ const e=engDay(d); let body="", ans="";
  if(e.type==="trace"){ body=e.items.map(it=>{ const main=it[0], emo=it[1], sub=it[2]||"";
      const isWord=main.length>1; const trace=isWord?`${main}  ${main}`:`${main}  ${main}  ${main}`;
      const label=isWord?main:sub; const small=isWord?sub:"";
      return `<div class="erow"><span class="eL">${trace}</span><span class="eW">${label}${small?`<small>${small}</small>`:""}</span><span class="eE">${emo}</span></div>`; }).join(""); ans="따라쓰기 활동 (정답 없음)"; }
  else if(e.type==="match"){ body=e.items.map(([U,L],i)=>`<div class="efill">${U} <span style="color:#b0a99b">→</span> <span class="blank"></span><span class="ans"> ${L}</span></div>`).join(""); ans=e.items.map(([U,L])=>`${U}→${L}`).join("   "); }
  else if(e.type==="fillmid"){ body=e.items.map(([c,t,emo])=>`<div class="efill">${emo} &nbsp; ${c} <span class="blank" style="min-width:34px"></span> ${t}<span class="ans"> (a)</span></div>`).join(""); ans="가운데 소리는 모두 a"; }
  else if(e.type==="fillfront"){ body=e.items.map(([rest,emo,word,a])=>`<div class="efill">${emo} &nbsp; <span class="blank" style="min-width:34px"></span> ${rest} <span class="ans"> (${a} · ${word})</span></div>`).join(""); ans=e.items.map(([rest,emo,word,a])=>`${a}+${rest}=${word}`).join("   "); }
  else { body=`<div style="margin-bottom:10px">${e.alpha.map(a=>`<span style="font-size:26px;font-weight:800;margin-right:16px;color:#cfc7b8">${a[0]} ${a[0]}</span>`).join("")}</div>`
      +e.words.map(w=>`<div class="efill">${w[1]} &nbsp; <span style="color:#cfc7b8;font-weight:800">${w[0]} ${w[0]}</span></div>`).join(""); ans="읽기·따라쓰기 활동"; }
  return {title:"영어 · "+DAY_INFO[d].eng, instr:e.instr, color:"var(--english)", body, ans};
}
function sectionHTML(s){ return `<div class="ws-section"><div class="ws-st"><span class="badge" ${badge(s.color)}>${s.title.split(" · ")[0]}</span>${s.title.split(" · ")[1]}</div><div class="ws-instr">${s.instr}</div>${s.body}</div>`; }

function buildPaper(d){
  const g=GUIDE[d], m=mathHTML(d), k=korHTML(d), e=engHTML(d);
  const html=`<div class="paper" id="paper">
    <div class="ws-head"><div class="wl">${d+1}일차 학습지<small>우리집 유치원 · 만 4~5세</small></div>
      <div class="wr">이름 __________ &nbsp; 날짜 ___ / ___</div></div>
    <div class="ws-guide"><div class="gt">👩‍🏫 부모님 가이드 — 오늘의 개념</div>
      <div class="gc">${g.c}</div><ul>${g.t.map(x=>`<li>${x}</li>`).join("")}</ul></div>
    ${sectionHTML(m)}${sectionHTML(k)}${sectionHTML(e)}
    <div class="ansbox"><div class="at">정답 (부모용)</div><div class="al">
      <b>수학</b> ${m.ans}<br><b>국어</b> ${k.ans}<br><b>영어</b> ${e.ans}</div></div>
  </div>`;
  return html;
}

let curDay=0;
function renderBook(){
  secBody.innerHTML=`<div class="book-intro">🖨 마음에 드는 <b>일차</b>를 골라 <b>인쇄하기</b>를 누르면 A4 종이로 바로 출력돼요.
    매일 <b>수학·국어·영어</b>가 한 장에 담겨 있고, 위쪽 <b>부모님 가이드</b>에 그날 개념을 쉽게 가르치는 방법이 있어요.
    <b>새 문제</b>를 누르면 숫자가 바뀐 새 학습지가 나와요.</div>
    <div class="day-grid" id="dayGrid"></div>`;
  const grid=document.getElementById("dayGrid");
  DAY_INFO.forEach((info,i)=>{ const c=document.createElement("button"); c.className="day-card";
    c.innerHTML=`<div class="dn"><span class="num">${i+1}</span>${i+1}일차</div>
      <div class="subj"><span>➕ ${info.math}</span><span>📖 ${info.kor}</span><span>🔤 ${info.eng}</span></div>`;
    c.onclick=()=>openDay(i); grid.appendChild(c); });
}
function openDay(d){ curDay=d;
  secBody.innerHTML=`<div class="toolbar">
    <button class="pill" id="tBack">← 목록</button>
    <button class="pill accent" id="tPrint" style="--ac:var(--book)">🖨 인쇄하기</button>
    <button class="pill" id="tNew">🔄 새 문제</button>
    <button class="pill" id="tAns">✅ 정답 보기</button></div>
    <div id="paperMount"></div>`;
  document.getElementById("paperMount").innerHTML=buildPaper(d);
  document.getElementById("tBack").onclick=renderBook;
  document.getElementById("tNew").onclick=()=>{ document.getElementById("paperMount").innerHTML=buildPaper(d); };
  document.getElementById("tAns").onclick=()=>{ document.getElementById("paper").classList.toggle("show-ans"); };
  document.getElementById("tPrint").onclick=()=>{
    const paper=document.getElementById("paper");
    document.getElementById("printMount").innerHTML=`<div class="paper">${paper.innerHTML}</div>`;
    window.print();
  };
}

/* ===== Confetti ===== */
const fx=document.getElementById("fx"), ctx=fx.getContext("2d"); let parts=[], raf=null;
function sizeFx(){ fx.width=innerWidth; fx.height=innerHeight; } sizeFx(); addEventListener("resize",sizeFx);
function confetti(){ const cs=["#E0637A","#3E7CB1","#D3922E","#5E9E7E","#8B7BC0","#CE7C4E"];
  for(let i=0;i<80;i++)parts.push({x:innerWidth/2,y:innerHeight*.35,vx:(Math.random()-.5)*13,vy:Math.random()*-13-4,
    g:.5+Math.random()*.3,s:7+Math.random()*7,c:cs[i%cs.length],r:Math.random()*6,vr:(Math.random()-.5)*.5,life:0});
  if(!raf)raf=requestAnimationFrame(stepFx); }
function bigConfetti(){ confetti(); setTimeout(confetti,220); setTimeout(confetti,460); }
function stepFx(){ ctx.clearRect(0,0,fx.width,fx.height);
  parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; p.life++;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r); ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); ctx.restore(); });
  parts=parts.filter(p=>p.y<fx.height+40&&p.life<200);
  if(parts.length)raf=requestAnimationFrame(stepFx); else{ ctx.clearRect(0,0,fx.width,fx.height); raf=null; } }

/* ===== Theme ===== */
const themeBtn=document.getElementById("themeBtn");
function curTheme(){ const s=document.documentElement.getAttribute("data-theme"); return s||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"); }
function applyTheme(t){ document.documentElement.setAttribute("data-theme",t); themeBtn.textContent=t==="dark"?"☀️":"🌙"; }
applyTheme(curTheme());
themeBtn.onclick=()=>applyTheme(curTheme()==="dark"?"light":"dark");
</script>
