<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>우리집 유치원</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root{
    --bg:#F6F4EE; --surface:#FFFFFF; --surface-2:#FBFAF6;
    --ink:#1A1E27; --ink-2:#4B5162; --ink-3:#8B8F9B;
    --line:#E9E5DB; --line-2:#F1EEE5;
    --korean:#D6455D; --math:#2E63E7; --english:#E08A00; --think:#189A72; --quiz:#7A5AF8;
    --book:#A2673F; --sticker:#E7A400; --parent:#48607C;
    --ok:#189A72; --no:#D6455D;
    --sh-s:0 1px 2px rgba(26,30,39,.04), 0 4px 14px rgba(26,30,39,.05);
    --sh-m:0 2px 4px rgba(26,30,39,.05), 0 12px 32px rgba(26,30,39,.09);
    --font:"Pretendard Variable","Pretendard","Apple SD Gothic Neo","Malgun Gothic","맑은 고딕","Segoe UI",system-ui,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#141519; --surface:#1E2026; --surface-2:#181A1F; --ink:#F2F0EA; --ink-2:#B9BCC6; --ink-3:#7E828E;
      --line:#2C2E36; --line-2:#24262D; --sh-s:0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
      --sh-m:0 2px 4px rgba(0,0,0,.35), 0 12px 32px rgba(0,0,0,.4); }
  }
  :root[data-theme="light"]{ --bg:#F6F4EE; --surface:#FFFFFF; --surface-2:#FBFAF6; --ink:#1A1E27; --ink-2:#4B5162;
    --ink-3:#8B8F9B; --line:#E9E5DB; --line-2:#F1EEE5;
    --sh-s:0 1px 2px rgba(26,30,39,.04), 0 4px 14px rgba(26,30,39,.05);
    --sh-m:0 2px 4px rgba(26,30,39,.05), 0 12px 32px rgba(26,30,39,.09); }
  :root[data-theme="dark"]{ --bg:#141519; --surface:#1E2026; --surface-2:#181A1F; --ink:#F2F0EA; --ink-2:#B9BCC6;
    --ink-3:#7E828E; --line:#2C2E36; --line-2:#24262D;
    --sh-s:0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
    --sh-m:0 2px 4px rgba(0,0,0,.35), 0 12px 32px rgba(0,0,0,.4); }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{
    font-family:var(--font); color:var(--ink); background:var(--bg);
    min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden;
    font-size:16px; line-height:1.55; letter-spacing:-.01em;
  }
  .wrap{ max-width:1120px; margin:0 auto; padding:22px 22px 80px; }
  button{ font-family:inherit; }

  /* ---------- top bar ---------- */
  .topbar{ display:flex; align-items:center; gap:12px; margin:2px 0 30px; }
  .brand{ display:flex; align-items:center; gap:11px; font-weight:800; font-size:19px; letter-spacing:-.5px; cursor:pointer; }
  .brand .logo{ width:40px; height:40px; border-radius:13px; background:linear-gradient(135deg,#D6455D,#E08A00);
    display:grid; place-items:center; color:#fff; box-shadow:var(--sh-s); }
  .brand .logo svg{ width:22px; height:22px; }
  .brand small{ display:block; font-size:10.5px; font-weight:700; color:var(--ink-3); letter-spacing:1.5px; margin-top:1px; }
  .spacer{ flex:1; }
  .iconbtn{ border:1px solid var(--line); cursor:pointer; width:44px; height:44px; border-radius:13px;
    font-size:19px; background:var(--surface); color:var(--ink); box-shadow:var(--sh-s); transition:.16s; }
  .iconbtn:hover{ transform:translateY(-1px); box-shadow:var(--sh-m); }

  .pill{ display:inline-flex; align-items:center; gap:8px; border:1px solid var(--line); cursor:pointer;
    font-weight:700; font-size:15px; color:var(--ink); background:var(--surface); padding:10px 18px; border-radius:999px;
    box-shadow:var(--sh-s); transition:.16s; }
  .pill:hover{ transform:translateY(-1px); box-shadow:var(--sh-m); }
  .pill:active{ transform:translateY(1px); }
  .pill.accent{ background:var(--ac,var(--ink)); color:#fff; border-color:transparent; }
  .pill.on{ background:var(--ink); color:var(--bg); border-color:transparent; }

  /* ---------- hero ---------- */
  .hero{ display:flex; gap:22px; align-items:stretch; margin-bottom:30px; flex-wrap:wrap; }
  .hero-l{ flex:1; min-width:260px; display:flex; flex-direction:column; justify-content:center; }
  .eyebrow{ font-size:13px; font-weight:700; color:var(--ink-3); letter-spacing:.4px; margin-bottom:8px; }
  .hero h1{ font-size:clamp(27px,5.4vw,42px); font-weight:800; letter-spacing:-1.5px; margin:0 0 10px; line-height:1.22; text-wrap:balance; }
  .hero h1 mark{ background:linear-gradient(transparent 62%, color-mix(in srgb, var(--sticker) 42%, transparent) 62%);
    color:inherit; padding:0 2px; }
  .hero p{ color:var(--ink-2); font-size:clamp(14px,3vw,16.5px); font-weight:600; margin:0; }
  .today-card{ background:var(--surface); border:1px solid var(--line); border-radius:24px; padding:20px 24px;
    display:flex; align-items:center; gap:20px; box-shadow:var(--sh-m); min-width:300px; }
  .ring{ position:relative; width:92px; height:92px; }
  .ring svg{ width:92px; height:92px; transform:rotate(-90deg); }
  .ring .rv{ position:absolute; inset:0; display:grid; place-items:center; text-align:center; }
  .ring .rv b{ font-size:24px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; }
  .ring .rv span{ font-size:10.5px; font-weight:700; color:var(--ink-3); }
  .tc-stats{ display:grid; gap:9px; }
  .tc-row{ display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:700; color:var(--ink-2); }
  .tc-row b{ color:var(--ink); font-variant-numeric:tabular-nums; }
  .tc-row .ic{ width:26px; height:26px; border-radius:8px; display:grid; place-items:center; font-size:13px; }

  .setup{ background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:15px 18px; margin-bottom:22px;
    display:flex; gap:10px; flex-wrap:wrap; align-items:center; box-shadow:var(--sh-s); }
  .setup label{ font-weight:700; font-size:15px; }
  .setup input{ font-family:inherit; font-size:16px; font-weight:700; padding:10px 14px; border:1.5px solid var(--line);
    border-radius:12px; background:var(--bg); color:var(--ink); width:150px; }

  /* ---------- menu ---------- */
  .menu-label{ font-size:12px; font-weight:800; color:var(--ink-3); letter-spacing:2px; margin:0 2px 12px; }
  .menu{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
  .tile{ position:relative; border:1px solid var(--line); cursor:pointer; color:var(--ink); text-align:left;
    background:var(--surface); border-radius:22px; padding:22px; display:flex; flex-direction:column; gap:14px;
    box-shadow:var(--sh-s); transition:transform .18s, box-shadow .18s; min-height:140px; }
  .tile:hover{ transform:translateY(-4px); box-shadow:var(--sh-m); }
  .tile:hover .t-arrow{ opacity:1; transform:none; }
  .tile .chip{ width:52px; height:52px; border-radius:16px; display:grid; place-items:center;
    background:color-mix(in srgb, var(--tc) 11%, var(--surface)); color:var(--tc); }
  .tile .chip svg{ width:26px; height:26px; }
  .tile .t-title{ font-size:18.5px; font-weight:800; letter-spacing:-.4px; }
  .tile .t-en{ font-size:10.5px; font-weight:800; letter-spacing:1.8px; text-transform:uppercase; color:var(--ink-3); margin-top:-9px; }
  .tile .t-desc{ font-size:13px; font-weight:600; color:var(--ink-2); margin-top:auto; }
  .tile .t-arrow{ position:absolute; top:22px; right:20px; color:var(--tc); opacity:0; transform:translateX(-4px); transition:.18s; }

  /* ---------- screens ---------- */
  .screen{ display:none; }
  .screen.active{ display:block; animation:fade .25s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
  .sec-head{ display:flex; align-items:center; gap:14px; margin:2px 0 24px; flex-wrap:wrap; }
  .sec-title{ font-size:clamp(21px,4.6vw,28px); font-weight:800; letter-spacing:-.6px; display:flex; align-items:center; gap:11px; }
  .sec-title .sic{ width:38px; height:38px; border-radius:12px; display:grid; place-items:center;
    background:color-mix(in srgb, var(--tc) 11%, var(--surface)); color:var(--tc); }
  .sec-title .sic svg{ width:20px; height:20px; }

  .modes{ display:flex; flex-wrap:wrap; gap:9px; margin-bottom:24px; }
  .mode-btn{ border:1px solid var(--line); cursor:pointer; font-weight:700; font-size:15px;
    padding:9px 17px; border-radius:999px; background:var(--surface); color:var(--ink-2); transition:.15s; box-shadow:var(--sh-s); }
  .mode-btn:hover{ transform:translateY(-1px); color:var(--ink); }

  /* ---------- flashcards ---------- */
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:13px; }
  .card{ border:1px solid var(--line); cursor:pointer; color:var(--ink); background:var(--surface);
    border-radius:20px; padding:20px 12px; display:flex; flex-direction:column; align-items:center; gap:8px;
    box-shadow:var(--sh-s); transition:.15s; }
  .card:hover{ transform:translateY(-3px); box-shadow:var(--sh-m); }
  .card .big-emoji{ font-size:44px; line-height:1; }
  .card .big-letter{ font-weight:800; line-height:1; letter-spacing:-1px; }
  .card .label{ font-size:15px; font-weight:700; color:var(--ink-2); }
  .card.playing{ animation:pulse .45s ease; border-color:var(--english); }
  @keyframes pulse{ 0%,100%{transform:none} 40%{transform:scale(1.05)} }

  /* ---------- quiz ---------- */
  .stage{ max-width:640px; margin:0 auto; text-align:center; }
  .scorebar{ display:inline-flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line);
    padding:8px 18px; border-radius:999px; box-shadow:var(--sh-s); font-weight:800; font-size:17px; }
  .q-row{ display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:12px;
    font-size:clamp(36px,8vw,52px); margin:20px 0 4px; }
  .q-text{ font-size:clamp(25px,5.6vw,36px); font-weight:800; text-align:center; margin:20px 0 28px; letter-spacing:-.8px;
    text-wrap:balance; line-height:1.3; }
  .q-choices{ display:grid; grid-template-columns:repeat(3,1fr); gap:13px; max-width:560px; margin:0 auto; }
  .q-choices.two{ grid-template-columns:repeat(2,1fr); max-width:400px; }
  .opt{ border:1.5px solid var(--line); cursor:pointer; background:var(--surface); color:var(--ink);
    border-radius:20px; padding:22px 8px; box-shadow:var(--sh-s); transition:.14s; min-height:104px;
    display:flex; align-items:center; justify-content:center; }
  .opt:hover{ transform:translateY(-2px); box-shadow:var(--sh-m); }
  .opt:disabled{ cursor:default; }
  .opt .oe{ font-size:50px; } .opt .ol{ font-size:36px; font-weight:800; font-variant-numeric:tabular-nums; }
  .opt.right{ border-color:var(--ok); background:color-mix(in srgb,var(--ok) 10%, var(--surface)); }
  .opt.wrong{ border-color:var(--no); opacity:.45; }
  .hint{ color:var(--ink-2); font-weight:600; font-size:15.5px; margin:14px 0 4px; }

  .progress{ height:12px; background:var(--surface); border:1px solid var(--line); border-radius:999px; overflow:hidden;
    max-width:560px; margin:2px auto 10px; }
  .progress .bar{ height:100%; width:0%; background:linear-gradient(90deg,var(--quiz),#9F8AFB); transition:width .35s; }
  .pmeta{ text-align:center; font-weight:700; font-size:16px; margin-bottom:18px; color:var(--ink-3); }
  .pmeta b{ color:var(--ink); font-variant-numeric:tabular-nums; }
  .finish .big{ font-size:68px; }

  /* ---------- sticker ---------- */
  .stk-sum{ background:var(--surface); border:1px solid var(--line); border-radius:22px; padding:20px 24px; margin-bottom:20px;
    box-shadow:var(--sh-s); display:flex; align-items:center; gap:26px; flex-wrap:wrap; }
  .stk-sum .bignum{ font-size:34px; font-weight:800; font-variant-numeric:tabular-nums; }
  .stk-sum .lbl{ font-size:12.5px; font-weight:700; color:var(--ink-3); }
  .stk-next{ flex:1; min-width:200px; }
  .stk-nextbar{ height:10px; background:var(--line-2); border-radius:999px; overflow:hidden; margin-top:7px; }
  .stk-nextbar div{ height:100%; background:linear-gradient(90deg,var(--sticker),#F5C445); border-radius:999px; }
  .stk-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); gap:12px; }
  .stk{ aspect-ratio:1; border-radius:20px; background:var(--surface); border:1px solid var(--line); display:grid;
    place-items:center; font-size:38px; box-shadow:var(--sh-s); }
  .stk.locked{ opacity:.3; filter:grayscale(1); font-size:22px; }
  .stk.new{ animation:pulse .6s ease 2; border-color:var(--sticker); box-shadow:0 0 0 3px color-mix(in srgb,var(--sticker) 25%, transparent); }

  /* ---------- parent ---------- */
  .gate{ max-width:420px; margin:34px auto; text-align:center; background:var(--surface); border:1px solid var(--line);
    border-radius:24px; padding:30px 26px; box-shadow:var(--sh-m); }
  .gate .gq{ font-size:30px; font-weight:800; margin:12px 0 16px; }
  .gate input{ font-family:inherit; font-size:24px; font-weight:800; text-align:center; width:110px; padding:10px;
    border:1.5px solid var(--line); border-radius:12px; background:var(--bg); color:var(--ink); }
  .gate .hint{ font-size:13px; }
  .dash{ display:grid; gap:14px; grid-template-columns:1fr; max-width:780px; margin:0 auto; }
  @media(min-width:720px){ .dash{ grid-template-columns:1fr 1fr; } .dash .full{ grid-column:1/-1; } }
  .panelbox{ background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:20px 22px; box-shadow:var(--sh-s); }
  .panelbox h3{ margin:0 0 14px; font-size:15.5px; font-weight:800; display:flex; align-items:center; gap:8px; }
  .kpis{ display:flex; gap:26px; flex-wrap:wrap; }
  .kpi .v{ font-size:28px; font-weight:800; font-variant-numeric:tabular-nums; }
  .kpi .l{ font-size:12px; font-weight:700; color:var(--ink-3); }
  .statrow{ margin:10px 0; }
  .statrow .sr-top{ display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:4px; }
  .statrow .sr-top .pct{ color:var(--ink-3); font-variant-numeric:tabular-nums; }
  .statbar{ height:8px; background:var(--line-2); border-radius:999px; overflow:hidden; }
  .statbar div{ height:100%; border-radius:999px; }
  .weak{ background:color-mix(in srgb,var(--no) 7%, var(--surface)); border:1px solid color-mix(in srgb,var(--no) 25%, var(--line));
    border-radius:14px; padding:13px 15px; font-size:13.5px; font-weight:600; margin-top:12px; line-height:1.6; }
  .weak b{ color:var(--no); }
  .setrow{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px dashed var(--line); flex-wrap:wrap; }
  .setrow:last-child{ border-bottom:none; }
  .setrow .sl{ font-weight:700; font-size:14.5px; }
  .seg{ display:flex; gap:6px; }
  .seg button{ font-weight:700; font-size:13.5px; padding:7px 13px; border-radius:999px;
    border:1px solid var(--line); background:var(--surface); color:var(--ink-2); cursor:pointer; }
  .seg button.on{ background:var(--parent); color:#fff; border-color:transparent; }
  .danger{ color:var(--no); border-color:color-mix(in srgb,var(--no) 35%, var(--line)); }
  .dash input[type=text]{ font-family:inherit; font-size:15px; font-weight:700; padding:8px 12px; border:1.5px solid var(--line);
    border-radius:10px; background:var(--bg); color:var(--ink); width:130px; }

  /* ---------- worksheets: list ---------- */
  .book-intro{ background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:15px 18px; margin-bottom:18px;
    color:var(--ink-2); font-weight:600; font-size:14px; box-shadow:var(--sh-s); line-height:1.65; }
  .book-intro b{ color:var(--ink); }
  .unit{ background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:14px 17px; margin-bottom:12px; box-shadow:var(--sh-s); }
  .unit-h{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:11px; }
  .unit-h .un{ background:var(--book); color:#fff; font-weight:800; font-size:11.5px; padding:4px 11px; border-radius:999px; }
  .unit-h .ut{ font-weight:800; font-size:15px; letter-spacing:-.3px; }
  .unit-h .us{ font-size:12px; color:var(--ink-3); font-weight:700; }
  .unit-h .uprint{ margin-left:auto; font-size:12px; padding:6px 12px; }
  .unit-days{ display:flex; flex-wrap:wrap; gap:7px; }
  .daychip{ width:46px; height:46px; border-radius:13px; border:1px solid var(--line); background:var(--bg); color:var(--ink);
    font-weight:800; font-size:15px; cursor:pointer; box-shadow:var(--sh-s); transition:.12s; font-variant-numeric:tabular-nums; }
  .daychip:hover{ transform:translateY(-2px); background:var(--surface); box-shadow:var(--sh-m); }
  .toolbar{ display:flex; flex-wrap:wrap; gap:9px; margin-bottom:18px; }

  /* ---------- worksheets: paper ---------- */
  .paper{ background:#fff; color:#23211D; border:1px solid var(--line); border-radius:14px; max-width:800px; margin:0 auto 20px;
    padding:26px 30px 22px; box-shadow:var(--sh-m); --sc:#2E63E7; }
  .phead{ display:flex; align-items:center; gap:15px; border-bottom:2.5px solid var(--sc); padding-bottom:12px; }
  .pday{ width:58px; height:58px; border-radius:17px; background:var(--sc); color:#fff; display:grid; place-items:center;
    line-height:1.05; flex:none; }
  .pday b{ font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; }
  .pday span{ font-size:10px; font-weight:700; opacity:.9; }
  .pt{ min-width:0; }
  .pk{ font-size:11px; font-weight:800; letter-spacing:1.2px; color:var(--sc); }
  .pu{ font-size:20px; font-weight:800; letter-spacing:-.5px; }
  .pm{ margin-left:auto; text-align:right; font-size:12px; color:#6f6b62; font-weight:700; line-height:1.85; flex:none; }
  .pm b{ color:#23211D; }
  .selfstars{ letter-spacing:3px; font-size:14px; color:#C9A227; }
  .ws-guide{ background:#FBF7EE; border-left:3px solid #E0B65E; border-radius:0 10px 10px 0; padding:9px 14px; margin:12px 0 14px; }
  .ws-guide .gt{ font-weight:800; font-size:13px; color:#A5762B; letter-spacing:-.2px; }
  .ws-guide ul{ margin:4px 0 0; padding-left:16px; }
  .ws-guide li{ font-size:12.5px; color:#55503F; margin:1px 0; line-height:1.45; }
  .ws-section{ margin:15px 0; break-inside:avoid; }
  .ws-st{ display:flex; align-items:center; gap:8px; font-weight:800; font-size:15.5px; margin-bottom:2px; letter-spacing:-.3px; }
  .ws-st .sno{ width:23px; height:23px; border-radius:8px; background:var(--sc); color:#fff; display:inline-grid; place-items:center; font-size:12.5px; flex:none; }
  .ws-st::after{ content:""; flex:1; height:1px; background:#EFEBE1; margin-left:6px; }
  .ws-instr{ font-size:12.5px; color:#726c62; font-weight:600; margin:2px 0 10px; }
  .mgrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px 22px; }
  .mgrid.c3{ grid-template-columns:repeat(3,1fr); gap:10px 12px; }
  .mitem{ font-size:17px; font-weight:700; display:flex; align-items:center; gap:6px; flex-wrap:wrap; font-variant-numeric:tabular-nums; }
  .mitem .no{ color:#B3AC9E; font-size:11.5px; min-width:16px; }
  .blank{ display:inline-block; min-width:42px; height:28px; border:1.5px solid #D5CDBD; border-radius:7px; vertical-align:middle; background:#FDFCFA; }
  .kitem{ font-size:14.5px; font-weight:600; margin:9px 0; line-height:1.7; }
  .kitem .no{ color:#B3AC9E; font-size:11.5px; margin-right:5px; }
  .uline{ display:inline-block; min-width:110px; border-bottom:1.5px solid #D5CDBD; height:20px; vertical-align:bottom; margin:0 4px; }
  .writeline{ border-bottom:1.6px solid #E0D9CA; height:34px; margin:11px 0; }
  .bank{ display:flex; flex-wrap:wrap; gap:6px; margin:4px 0 10px; }
  .bank span{ font-size:12.5px; font-weight:700; padding:4px 12px; border:1.4px dashed #D5CDBD; border-radius:999px; color:#57524A; background:#FDFCF9; }
  .passage{ background:#F8F6F1; border:1px solid #EFEAE0; border-radius:11px; padding:12px 16px; font-size:14.5px; font-weight:600; line-height:1.8; margin-bottom:11px; }
  .psg-t{ font-weight:800; font-size:15px; margin-bottom:5px; color:#23211D; }
  .psg-t::before{ content:"📖 "; font-size:13px; }
  .qt{ display:inline-block; font-style:normal; font-size:10.5px; font-weight:800; padding:2px 8px; border-radius:999px;
    background:#EEF1F8; color:#4B69B8; margin-right:6px; vertical-align:1px; }
  .qt.infer{ background:#F3EEFA; color:#7A5AF8; }
  .vgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:9px; justify-items:center; }
  .vc{ display:inline-block; min-width:88px; text-align:right; font-size:21px; font-weight:800; font-variant-numeric:tabular-nums;
    padding:5px 6px; border:1px solid #EBE5D8; border-radius:10px; background:#FDFCFA; }
  .vc .vr{ padding:1px 10px; }
  .vc .vo{ border-bottom:2.5px solid #33302A; padding:1px 10px; position:relative; }
  .vc .vo .op{ position:absolute; left:8px; color:var(--sc); }
  .vc .va{ height:30px; padding:1px 10px; }
  .tenframe{ display:grid; grid-template-columns:repeat(5,25px); grid-auto-rows:25px; border:2px solid var(--sc); border-radius:6px;
    overflow:hidden; width:max-content; margin:2px 0 10px; }
  .tenframe span{ border:1px solid #E3DED2; display:grid; place-items:center; }
  .tenframe span.f::before{ content:""; width:14px; height:14px; border-radius:50%; background:var(--sc); }
  .tenframe span.h::before{ content:""; width:14px; height:14px; border-radius:50%; border:2px dashed var(--sc); }
  .tfcap{ font-size:12px; font-weight:700; color:#726c62; margin:-4px 0 10px; }
  .clockwrap{ display:grid; grid-template-columns:repeat(3,1fr); gap:11px; justify-items:center; text-align:center; }
  .clock{ width:86px; height:86px; }
  .clockwrap .cl{ font-size:13.5px; font-weight:700; }
  .coin{ display:inline-grid; place-items:center; width:32px; height:32px; border-radius:50%; border:2.5px solid #C9A227; color:#8a6d1d;
    font-weight:800; font-size:10.5px; background:#FCF3D7; margin:1px; vertical-align:middle; }
  .coin.c500{ width:38px; height:38px; font-size:11.5px; }
  .coin.c10{ border-color:#B98A5E; color:#8a5a2d; background:#F7E8D8; }
  .mrow{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:16px; font-weight:700; margin:8px 0; }
  .erow{ display:flex; align-items:center; gap:14px; padding:7px 0; }
  .erow .eW{ font-size:15.5px; font-weight:700; } .erow .eW small{ display:block; font-size:11.5px; color:#8a8578; font-weight:600; }
  .write4{ position:relative; height:56px; margin:7px 0; }
  .write4 i{ position:absolute; left:0; right:0; border-top:1.5px solid #DCE5F0; }
  .write4 i.t{ top:8px; } .write4 i.b{ top:46px; border-color:#9FB4CF; }
  .write4 i.m{ top:27px; border-top-style:dashed; border-color:#C7D4E4; }
  .write4 .tx{ position:absolute; left:8px; top:-3px; font-size:38px; line-height:58px; font-weight:800; color:#DAD4C7;
    letter-spacing:14px; white-space:nowrap; overflow:hidden; right:0; }
  .write4 .tx b{ color:#23211D; }
  .ladder{ display:grid; grid-template-columns:1fr 1fr; gap:7px 20px; font-size:19px; font-weight:800; }
  .ladder .li{ display:flex; align-items:center; gap:7px; }
  .ladder .li b{ color:var(--sc); }
  .ladder .li .fe{ font-size:24px; }
  .hunt{ display:grid; grid-template-columns:repeat(8,1fr); gap:5px; max-width:420px; }
  .hunt span{ border:1px solid #EBE5D8; border-radius:8px; text-align:center; font-size:19px; font-weight:800; padding:4px 0; color:#3a362f; background:#FDFCFA; }
  .swbox{ display:flex; gap:8px; flex-wrap:wrap; margin:4px 0 10px; }
  .swbox span{ border:2px solid var(--sc); color:var(--sc); background:#fff; border-radius:11px; font-weight:800; font-size:16px; padding:5px 15px; }
  .efill{ font-size:19px; font-weight:700; display:flex; align-items:center; gap:9px; padding:5px 0; }
  .conn{ display:grid; grid-template-columns:1fr 1fr; gap:6px 30px; font-size:14px; font-weight:700; }
  .pfoot{ display:flex; align-items:flex-end; justify-content:space-between; gap:12px; border-top:1px solid #EFEBE1;
    margin-top:16px; padding-top:11px; font-size:12.5px; font-weight:700; color:#6f6b62; flex-wrap:wrap; }
  .pfoot .mark{ font-size:11px; letter-spacing:1px; color:#B3AC9E; }
  .ans{ display:none; color:var(--ok); font-weight:800; }
  .paper.show-ans .ans{ display:inline; }
  .paper.show-ans .blank, .paper.show-ans .uline{ border-color:transparent; background:transparent; }
  .ansbox{ display:none; margin-top:14px; background:#F3F7F3; border:1px solid #DAE6DA; border-radius:10px; padding:10px 14px; }
  .paper.show-ans .ansbox{ display:block; }
  .ansbox .at{ font-weight:800; font-size:12px; color:var(--ok); margin-bottom:3px; }
  .ansbox .al{ font-size:12.5px; color:#4a463f; line-height:1.65; }

  #printMount{ display:none; }
  #fx{ position:fixed; inset:0; pointer-events:none; z-index:50; }
  footer{ text-align:center; margin-top:48px; color:var(--ink-3); font-weight:600; font-size:12.5px; letter-spacing:.3px; }

  @media (min-width:700px){
    body{ font-size:17px; }
    .menu{ grid-template-columns:repeat(4,1fr); gap:16px; }
    .tile{ min-height:158px; }
    .opt{ min-height:120px; }
    .grid{ grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); }
  }
  @media (max-width:640px){
    .today-card{ width:100%; }
    .pm{ text-align:left; margin-left:0; flex-basis:100%; }
  }
  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important; } }

  @media print{
    html,body{ background:#fff !important; }
    body.print-ws .app-root, body.print-ws #fx{ display:none !important; }
    body.print-ws #printMount{ display:block !important; }
    #printMount .paper{ box-shadow:none; border:none; max-width:none; margin:0 0 4mm; padding:0; border-radius:0; }
    #printMount .paper + .paper{ page-break-before:always; }
    .ws-guide, .pday, .ws-st .sno, .tenframe, .swbox span{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    @page{ size:A4; margin:11mm; }
  }

  /* level test */
  .lvl-intro{ max-width:560px; margin:0 auto; text-align:center; background:var(--surface); border:1px solid var(--line);
    border-radius:24px; padding:30px 26px; box-shadow:var(--sh-m); }
  .lvl-intro .big{ font-size:52px; margin-bottom:6px; }
  .lvl-intro h2{ font-size:22px; font-weight:800; margin:0 0 8px; letter-spacing:-.5px; }
  .lvl-intro p{ color:var(--ink-2); font-weight:600; font-size:14.5px; margin:0 0 18px; line-height:1.65; }
  .lvl-sub{ display:inline-flex; align-items:center; gap:7px; font-weight:800; font-size:14px; background:var(--surface);
    border:1px solid var(--line); border-radius:999px; padding:7px 16px; box-shadow:var(--sh-s); margin-bottom:6px; }
  .lvl-sub .dot{ width:10px; height:10px; border-radius:4px; }
  .lvl-res{ max-width:600px; margin:0 auto; }
  .lvl-row{ background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:16px 20px;
    box-shadow:var(--sh-s); margin-bottom:11px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .lvl-row .ln{ font-weight:800; font-size:15.5px; min-width:52px; }
  .lvl-row .lb{ flex:1; min-width:140px; height:10px; background:var(--line-2); border-radius:999px; overflow:hidden; }
  .lvl-row .lb div{ height:100%; border-radius:999px; }
  .lvl-row .lv{ font-weight:800; font-size:14.5px; font-variant-numeric:tabular-nums; }
  .lvl-reco{ background:color-mix(in srgb,var(--book) 8%, var(--surface)); border:1.5px solid color-mix(in srgb,var(--book) 35%, var(--line));
    border-radius:18px; padding:18px 20px; text-align:center; font-weight:700; font-size:15.5px; margin:16px 0; line-height:1.7; }
  .lvl-reco b{ color:var(--book); font-size:19px; }
  .daychip.reco{ border-color:var(--book); color:var(--book);
    box-shadow:0 0 0 2.5px color-mix(in srgb,var(--book) 28%, transparent); }
</style>
</head>
<body>
<div class="app-root">
<canvas id="fx"></canvas>
<div class="wrap">

  <div class="topbar">
    <div class="brand" id="brandHome">
      <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9 21v-6h6v6"/></svg></span>
      <span>우리집 유치원<small>100-DAY HOME LEARNING</small></span>
    </div>
    <div class="spacer"></div>
    <button class="iconbtn" id="soundBtn" aria-label="소리 켜기/끄기">🔊</button>
    <button class="iconbtn" id="themeBtn" aria-label="밝기 바꾸기">🌙</button>
  </div>

  <section class="screen active" id="home">
    <div class="hero">
      <div class="hero-l">
        <div class="eyebrow" id="dateLine"></div>
        <h1 id="heroTitle">오늘도 <mark>즐겁게</mark> 배워요</h1>
        <p>매일 15분 — 태블릿과 종이 학습지로 완성하는 첫 공부 습관</p>
      </div>
      <div class="today-card">
        <div class="ring">
          <svg viewBox="0 0 92 92">
            <circle cx="46" cy="46" r="40" fill="none" stroke="var(--line-2)" stroke-width="9"/>
            <circle id="ringArc" cx="46" cy="46" r="40" fill="none" stroke="var(--sticker)" stroke-width="9"
              stroke-linecap="round" stroke-dasharray="251.3" stroke-dashoffset="251.3"/>
          </svg>
          <div class="rv"><div><b id="ringVal">0</b><br><span>오늘의 별</span></div></div>
        </div>
        <div class="tc-stats">
          <div class="tc-row"><span class="ic" style="background:color-mix(in srgb,var(--think) 12%,var(--surface))">🔥</span>연속 학습 <b id="stStreak">0</b>일</div>
          <div class="tc-row"><span class="ic" style="background:color-mix(in srgb,var(--sticker) 14%,var(--surface))">⭐</span>모은 별 <b id="stStars">0</b>개</div>
          <div class="tc-row"><span class="ic" style="background:color-mix(in srgb,var(--quiz) 12%,var(--surface))">🎖️</span>스티커 <b id="stStickers">0</b>장</div>
        </div>

    <footer>우리집 유치원 · 만 4~5세 선행 커리큘럼 · 하루 15분의 약속</footer>
  </section>

  <section class="screen" id="section">
    <div class="sec-head">
      <button class="pill" id="backBtn">← 집으로</button>
      <div class="sec-title" id="secTitle"></div>
    </div>
    <div id="secBody"></div>
  </section>

</div>
</div>
<div id="printMount"></div>

<script>
/* ===== Storage ===== */
const DEFAULTS = { name:"", diff:"normal", sound:true, stars:0, days:{}, stats:{} };
let S;
try{ S = Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem("yuchiwon")||"{}")); }
catch(e){ S = Object.assign({}, DEFAULTS); }
function save(){ try{ localStorage.setItem("yuchiwon", JSON.stringify(S)); }catch(e){} }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function record(key, ok){
  if(!S.stats[key]) S.stats[key]={o:0,x:0};
  ok ? S.stats[key].o++ : S.stats[key].x++;
  const t=todayStr(); S.days[t]=(S.days[t]||0)+(ok?1:0);
  if(ok) S.stars++;
  save();
}
function streak(){
  let n=0; const d=new Date();
  for(;;){ const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    if(S.days[k]>0){ n++; d.setDate(d.getDate()-1); } else break; }
  return n;
}
function callName(n){
  if(!n) return "";
  const c=n.charCodeAt(n.length-1);
  if(c>=0xAC00&&c<=0xD7A3) return ((c-0xAC00)%28)>0 ? n+"아" : n+"야";
  return n;
}

/* ===== Speech ===== */
let voices=[];
function loadVoices(){ voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if(window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function pickVoice(l){ const w=l.slice(0,2); return voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith(w))||null; }
function speak(t,l){ if(!window.speechSynthesis||!S.sound) return; l=l||"ko-KR"; speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t); u.lang=l; const v=pickVoice(l); if(v)u.voice=v;
  u.rate=l.startsWith("en")?.8:.95; u.pitch=1.08; speechSynthesis.speak(u); }

/* ===== Utils ===== */
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(a){ return a[rnd(0,a.length-1)]; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sample(a,n){ return shuffle(a).slice(0,n); }
function pickWrong(c,cands,n=2){ const seen=new Set([c]),out=[];
  for(const x of shuffle(cands)){ if(x>=0&&!seen.has(x)){seen.add(x);out.push(x);} if(out.length>=n)break; }
  let d=1; while(out.length<n){ [c+d,c-d].forEach(x=>{ if(out.length<n&&x>=0&&!seen.has(x)){seen.add(x);out.push(x);} }); d++; } return out; }
function choiceSet(c,wrongs,emoji){ const a=[{show:String(c),ok:true,emoji:!!emoji}];
  wrongs.forEach(w=>a.push({show:String(w),ok:false,emoji:!!emoji})); return shuffle(a); }

/* ===== Menu ===== */
const IC={
  korean:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6c-2.5-1.8-5.5-1.8-8-.6V19c2.5-1.2 5.5-1.2 8 .6 2.5-1.8 5.5-1.8 8-.6V5.4c-2.5-1.2-5.5-1.2-8 .6z"/><path d="M12 6v14.2"/></svg>',
  math:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 8h6M8 5v6"/><path d="M13 17h6"/><path d="M5 17l4-4M9 17l-4-4"/><path d="M13 7h6"/></svg>',
  english:'<svg viewBox="0 0 24 24" fill="none"><text x="12" y="17" text-anchor="middle" font-size="14" font-weight="800" fill="currentColor" font-family="inherit">Aa</text></svg>',
  think:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6.5 6.5 0 0 0-4.3 11.4c.8.7 1.3 1.6 1.3 2.6h6c0-1 .5-1.9 1.3-2.6A6.5 6.5 0 0 0 12 3z"/><path d="M9.5 20h5"/></svg>',
  challenge:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10v4a5 5 0 0 1-10 0z"/><path d="M7 5H4.5a2.8 2.8 0 0 0 2.9 3.6M17 5h2.5a2.8 2.8 0 0 1-2.9 3.6"/><path d="M12 13v3.5"/><path d="M8.5 20h7M10 16.5h4c.7 0 1.5 1 1.5 3.5h-7c0-2.5.8-3.5 1.5-3.5z"/></svg>',
  sticker:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 3.5l2.6 5.3 5.9.9-4.2 4.1 1 5.8-5.3-2.8-5.3 2.8 1-5.8-4.2-4.1 5.9-.9z"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l3 3v15H6z"/><path d="M15 3v3h3"/><path d="M9 10h6M9 13.5h6M9 17h3.5"/></svg>',
  parent:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4.5 21c1-4 4-6 7.5-6s6.5 2 7.5 6"/></svg>',
  level:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 15a7 7 0 0 1 14 0"/><path d="M12 15l3.8-3.8"/><path d="M4 19h16"/></svg>',
};
const MENU=[
  {id:"korean",   title:"국어",     en:"Korean",   desc:"어휘력과 사고력을 키우는 낱말 놀이",  ac:"var(--korean)"},
  {id:"math",     title:"수학",     en:"Math",     desc:"받아올림부터 두 자리 연산까지",      ac:"var(--math)"},
  {id:"english",  title:"영어",     en:"English",  desc:"알파벳 음가와 첫 단어 익히기",       ac:"var(--english)"},
  {id:"think",    title:"사고력",   en:"Logic",    desc:"규칙 찾기 · 수 비교 · 순서 추론",    ac:"var(--think)"},
  {id:"challenge",title:"도전 퀴즈", en:"Challenge",desc:"약한 유형을 골라 내는 10문제 실전",  ac:"var(--quiz)"},
  {id:"level",    title:"레벨 테스트", en:"Level Test",desc:"수준 진단 후 맞춤 시작점 추천",   ac:"#0F87A8"},
  {id:"sticker",  title:"스티커판", en:"Reward",   desc:"별을 모아 완성하는 나만의 컬렉션",   ac:"var(--sticker)"},
  {id:"book",     title:"문제집",   en:"Workbook", desc:"100일 커리큘럼 · 하루 3장 인쇄",     ac:"var(--book)"},
  {id:"parent",   title:"부모님",   en:"Parents",  desc:"학습 리포트 · 약점 진단 · 설정",     ac:"var(--parent)"},
];
const menuEl=document.getElementById("menu");
MENU.forEach(m=>{ const b=document.createElement("button"); b.className="tile"; b.style.setProperty("--tc",m.ac);
  b.innerHTML=`<div class="chip">${IC[m.id]}</div>
    <div><div class="t-title">${m.title}</div><div class="t-en">${m.en}</div></div>
    <div class="t-desc">${m.desc}</div>
    <span class="t-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>`;
  b.onclick=()=>openSection(m); menuEl.appendChild(b); });

/* ===== Greeting + first-run setup ===== */
function refreshHero(){
  const t=document.getElementById("heroTitle");
  if(t) t.innerHTML = S.name ? `${callName(S.name)}, 오늘도 <mark>즐겁게</mark> 배워요` : `오늘도 <mark>즐겁게</mark> 배워요`;
  const dl=document.getElementById("dateLine");
  if(dl){ const n=new Date(), yo=["일","월","화","수","목","금","토"][n.getDay()];
    dl.textContent=`${n.getMonth()+1}월 ${n.getDate()}일 ${yo}요일 · ${S.name?S.name+"의 학습방":"우리 아이 학습방"}`; }
  const today=S.days[todayStr()]||0, goal=20;
  const arc=document.getElementById("ringArc");
  if(arc){ const C=251.3; arc.style.strokeDashoffset=String(C*(1-Math.min(1,today/goal))); }
  const rv=document.getElementById("ringVal"); if(rv) rv.textContent=today;
  const s1=document.getElementById("stStreak"); if(s1) s1.textContent=streak();
  const s2=document.getElementById("stStars"); if(s2) s2.textContent=S.stars;
  const s3=document.getElementById("stStickers"); if(s3) s3.textContent=Math.min(24,Math.floor(S.stars/10));
}
document.getElementById("brandHome").onclick=()=>{ location.hash="home"; };
function renderSetup(){
  const m=document.getElementById("setupMount");
  if(S.name){ m.innerHTML=""; return; }
  m.innerHTML=`<div class="setup"><label>👋 아이 이름을 알려주세요</label>
    <input type="text" id="nameInput" maxlength="6" placeholder="예: 민우" />
    <button class="pill accent" id="nameSave" style="--ac:var(--korean)">저장</button></div>`;
  document.getElementById("nameSave").onclick=()=>{
    const v=document.getElementById("nameInput").value.trim();
    if(v){ S.name=v; save(); refreshHero(); renderSetup(); speak(`${callName(v)}, 반가워요!`); }
  };
}
refreshHero(); renderSetup();

/* ===== Data ===== */
const ANTONYMS=[["크다","작다"],["높다","낮다"],["길다","짧다"],["빠르다","느리다"],["뜨겁다","차갑다"],
  ["무겁다","가볍다"],["많다","적다"],["밝다","어둡다"],["넓다","좁다"],["두껍다","얇다"],["열다","닫다"],

/* ===== Generators (difficulty-aware) ===== */
function gAdd(){
  let a,b;
  if(S.diff==="easy"){ a=rnd(1,4); b=rnd(1,5); }
  else if(S.diff==="hard"){ a=rnd(5,9); b=rnd(5,9); }
  else { a=rnd(2,9); b=rnd(2,9); }
  const s=a+b;
  return {text:`${a} + ${b} = ?`,say:`${a} 더하기 ${b}는?`,choices:choiceSet(s,pickWrong(s,[s+1,s-1,s+2,s-2]))};
}
function gSub(){
  let a,b;
  if(S.diff==="easy"){ a=rnd(3,9); b=rnd(1,a-1); }
  else if(S.diff==="hard"){ a=rnd(11,18); b=rnd(2,9); }
  else { a=rnd(6,18); b=rnd(1,a-1); }
  const s=a-b;
  return {text:`${a} − ${b} = ?`,say:`${a} 빼기 ${b}는?`,choices:choiceSet(s,pickWrong(s,[s+1,s-1,s+2,s-2]))};
}
function gMake10(){ const a=rnd(1,9),ans=10-a; return {text:`${a} + ⬜ = 10`,say:`${a} 더하기 얼마가 10일까요?`,choices:choiceSet(ans,pickWrong(ans,[ans+1,ans-1,ans+2,a]))}; }
function gTwo(){
  let a,b;
  if(S.diff==="easy"){ const t=rnd(1,8),o=rnd(0,4); a=t*10+o; b=rnd(1,9-o); }
  else if(S.diff==="hard"){ a=rnd(15,69); b=rnd(15,99-a); }
  else { const t1=rnd(1,4),o1=rnd(0,4),t2=rnd(1,Math.min(4,9-t1)),o2=rnd(0,9-o1); a=t1*10+o1; b=t2*10+o2; }
  const s=a+b;
  return {text:`${a} + ${b} = ?`,say:`${a} 더하기 ${b}는?`,choices:choiceSet(s,pickWrong(s,[s+1,s-1,s+10,s-10]))};
}
function gAntonym(){ const p=pick(ANTONYMS); const [w1,w2]=Math.random()<.5?p:[p[1],p[0]];
  const pool=ANTONYMS.flat().filter(w=>w!==w1&&w!==w2);
  return {text:`"${w1}" 의 반대말은?`,say:`${w1}. 반대말은?`,choices:choiceSet(w2,sample(pool,2))}; }
function gRiddle(){ const r=pick(RIDDLES); return {text:r.q,say:r.q,choices:choiceSet(r.a,r.d)}; }
function gPattern(){ const u=pick(PATTERNS),seq=[]; for(let i=0;i<4;i++)seq.push(u[i%u.length]);
  const ans=u[4%u.length], wrongs=sample(EMOJI_POOL.filter(e=>!u.includes(e)),2);
  return {rowEmojis:seq.concat("❔"),text:"다음에는 무엇이 올까요?",say:"다음에는 무엇이 올까요?",choices:choiceSet(ans,wrongs,true)}; }
function gCompare(){ let a=rnd(11,99),b=rnd(11,99); while(b===a)b=rnd(11,99);
  const big=Math.random()<.5, ans=big?Math.max(a,b):Math.min(a,b);
  return {text:`${a} 와 ${b} 중 ${big?"더 큰":"더 작은"} 수는?`,say:`${a}, ${b}. ${big?"더 큰":"더 작은"} 수는?`,
    choices:shuffle([{show:String(a),ok:a===ans},{show:String(b),ok:b===ans}])}; }
function gOrdinal(){ const row=sample(EMOJI_POOL,5),n=rnd(1,5),ans=row[n-1],wrongs=sample(row.filter(e=>e!==ans),2);
  const kor=["첫","두","세","네","다섯"][n-1];
  return {rowEmojis:row,text:`왼쪽에서 ${kor} 번째는?`,say:`왼쪽에서 ${n}번째는 무엇일까요?`,choices:choiceSet(ans,wrongs,true)}; }

/* ===== Challenge (weakness-weighted) ===== */
function weightedGen(){
  const ws=GENS.map(x=>{
    const st=S.stats[x.k]||{o:0,x:0}, n=st.o+st.x;
    const err=n>=3 ? st.x/n : .4;
    return {x, w:1+err*3};
  });
  const total=ws.reduce((s,v)=>s+v.w,0); let r=Math.random()*total;
  for(const v of ws){ r-=v.w; if(r<=0) return v.x; }
  return ws[ws.length-1].x;
}
function renderChallenge(){
  const TOTAL=10; let idx=0,stars=0;
  secBody.innerHTML=`<div class="stage"><div class="progress"><div class="bar"></div></div>
    <div class="pmeta"><b class="pn">1</b> / ${TOTAL} 문제 · ⭐ <b class="pc">0</b></div><div class="qb"></div></div>`;
  const bar=secBody.querySelector(".bar"),pn=secBody.querySelector(".pn"),pc=secBody.querySelector(".pc"),qb=secBody.querySelector(".qb");
  function next(){ if(idx>=TOTAL)return finish();
    pn.textContent=idx+1; bar.style.width=(idx/TOTAL*100)+"%";
    const G=weightedGen(), p=G.g(); let first=true;
    const row=p.rowEmojis?`<div class="q-row">${p.rowEmojis.map(e=>`<span>${e}</span>`).join("")}</div>`:"";
    qb.innerHTML=row+`<div class="q-text">${p.text}</div><div class="q-choices${p.choices.length===2?" two":""}"></div>`;
    speak(p.say,p.sayLang||"ko-KR"); const wrap=qb.querySelector(".q-choices");
    p.choices.forEach(ch=>{ const b=document.createElement("button"); b.className="opt";
      b.innerHTML=ch.emoji?`<span class="oe">${ch.show}</span>`:`<span class="ol">${ch.show}</span>`;
      b.onclick=()=>{ if(ch.ok){ record(G.k,first); if(first){stars++;pc.textContent=stars;}
          b.classList.add("right"); confetti(); speak("잘했어요!");
          [...wrap.children].forEach(x=>x.disabled=true); idx++; setTimeout(next,1100); }
        else { if(first) record(G.k,false); first=false; b.classList.add("wrong"); b.disabled=true; speak("다시!"); } };
      wrap.appendChild(b); });
  }
  function finish(){ bar.style.width="100%"; pn.textContent=TOTAL;
    const nm=S.name?callName(S.name)+", ":"";
    const msg=stars>=9?"대단해요! 최고예요! 🏆":stars>=6?"정말 잘했어요! 👏":"좋아요! 다시 도전해요! 💪";
    qb.innerHTML=`<div class="finish"><div class="big">🏆</div><div class="q-text">${TOTAL}문제 중 ⭐ ${stars}개!</div>

        <button class="pill accent" id="againC" style="--ac:var(--quiz)">🔁 다시 도전</button>
        <button class="pill" id="toStk">⭐ 스티커판 보기</button></div></div>`;
    speak(`${TOTAL}문제 중 ${stars}개 맞았어요. ${stars>=8?"최고예요":"잘했어요"}!`); bigConfetti();
    document.getElementById("againC").onclick=()=>renderChallenge();
    document.getElementById("toStk").onclick=()=>openSection(MENU.find(m=>m.id==="sticker")); }

/* ===== Level Test (수준 진단) ===== */
const LVL_NAMES=["도전 전","씨앗","새싹","꽃","나무","숲"];
function ltQ(text,say,choices,lang,rowEmojis){ return {text,say,choices,sayLang:lang,rowEmojis}; }
function ltMath(l){
  if(l===1){ const a=rnd(1,4),b=rnd(1,5),s=a+b;
    return ltQ(`${a} + ${b} = ?`,`${a} 더하기 ${b}는?`,choiceSet(s,pickWrong(s,[s+1,s-1,s+2]))); }
  if(l===2){ const a=rnd(5,9),b=rnd(Math.max(2,11-a),9),s=a+b;
    return ltQ(`${a} + ${b} = ?`,`${a} 더하기 ${b}는?`,choiceSet(s,pickWrong(s,[s+1,s-1,s+2,s-2]))); }
  if(l===3){ const a=rnd(11,18),b=rnd((a%10)+1,9),s=a-b;
    return ltQ(`${a} − ${b} = ?`,`${a} 빼기 ${b}는?`,choiceSet(s,pickWrong(s,[s+1,s-1,s+2,s-2]))); }
  if(l===4){ const t=rnd(2,7),o=rnd(1,4),b=rnd(1,9-o),n=t*10+o,s=n+b;
    return ltQ(`${n} + ${b} = ?`,`${n} 더하기 ${b}는?`,choiceSet(s,pickWrong(s,[s+1,s-1,s+10]))); }
  const a=rnd(24,49),b=rnd(15,Math.min(49,98-24)),s=a+b;
  return ltQ(`${a} + ${b} = ?`,`${a} 더하기 ${b}는?`,choiceSet(s,pickWrong(s,[s+1,s-1,s+10,s-10])));
}
function ltKor(l){
  if(l===1){ const p=pick(ANTONYMS.slice(0,10));
    return ltQ(`"${p[0]}" 의 반대말은?`,`${p[0]}. 반대말은?`,choiceSet(p[1],sample(ANTONYMS.flat().filter(w=>w!==p[0]&&w!==p[1]),2))); }
  if(l===2){ const [w,g]=pick(HYPER);
    return ltQ(`"${w}" 는 어느 무리일까요?`,`${w}는 어느 무리일까요?`,choiceSet(g,sample(HYPER_BANK.filter(x=>x!==g),2))); }
  if(l===3){ const [phrase,c]=pick(COUNTERS);
    return ltQ(`"${phrase} ⬜" — 알맞은 세는 말은?`,`${phrase}. 알맞은 세는 말은?`,choiceSet(c,sample(COUNTER_BANK.filter(x=>x!==c),2))); }
  if(l===4){ const [ok,no]=pick(SPELL);
    return ltQ("바르게 쓴 낱말은 어느 것일까요?","바르게 쓴 낱말을 찾아보세요",shuffle([{show:ok,ok:true},{show:no,ok:false}])); }
  const p=pick(PROVERB);
  return ltQ(`"${p[0]}" — 이 속담의 뜻은?`,`${p[0]}. 이 속담의 뜻은 무엇일까요?`,
    shuffle([{show:p[1],ok:true},...sample(PROVERB.filter(x=>x[0]!==p[0]),2).map(x=>({show:x[1],ok:false}))]));
}
function ltEng(l){
  if(l===1){ const L=pick(LSOUND.slice(0,12)), others=sample(LSOUND.filter(x=>x[0]!==L[0]),2);
    return ltQ(`알파벳 ‘${L[0]}’ 를 찾아보세요`,L[0],shuffle([{show:L[0],ok:true},...others.map(o=>({show:o[0],ok:false}))]),"en-US"); }
  if(l===2){ const L=pick(LSOUND), others=sample(LSOUND.filter(x=>x[0]!==L[0]),2);
    return ltQ(`‘${L[0]}’ 의 소문자 짝은 어느 것일까요?`,L[0],
      shuffle([{show:L[0].toLowerCase(),ok:true},...others.map(o=>({show:o[0].toLowerCase(),ok:false}))]),"en-US"); }
  if(l===3){ const L=pick(LSOUND.slice(0,20)), w=L[2], others=sample(LSOUND.filter(x=>x[0]!==L[0]),2).map(o=>({show:o[2][1],ok:false,emoji:true}));
    return ltQ(`[${L[1]}] 소리로 시작하는 그림은?`,L[0],shuffle([{show:w[1],ok:true,emoji:true},...others]),"en-US"); }

/* seeded RNG: 같은 일차는 같은 학습지, '새 문제'로 재생성 */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
let WR=Math.random;
const wrnd=(a,b)=>Math.floor(WR()*(b-a+1))+a;
const wpick=a=>a[wrnd(0,a.length-1)];
function wshuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(WR()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
const wsample=(a,n)=>wshuffle(a).slice(0,n);
function uniqN(n,fn,keyf){ const o=[],seen=new Set(); let g=0;
  while(o.length<n&&g++<500){ const it=fn(); const k=keyf?keyf(it):JSON.stringify(it); if(!seen.has(k)){seen.add(k);o.push(it);} }
  while(o.length<n)o.push(fn()); return o; }

 {c:"소리를 조합하면 처음 보는 단어도 읽을 수 있어요!",t:["아무 CVC 단어나 만들어 읽기 놀이를 해요.","쉬운 파닉스 리더스북을 시작해도 좋아요."]}];

/* ---- 수학 재료 ---- */
const NAMES=["민준","서연","하준","지우","도윤","아린","시우","하은"];
function nameJosa(n){ const c=n.charCodeAt(n.length-1);
  const bat=(c>=0xAC00&&c<=0xD7A3)&&((c-0xAC00)%28)>0; return n+(bat?"이는":"는"); }
function pickName(){ return (S.name&&WR()<.45)?S.name:wpick(NAMES); }
const ADD_T=[
 ["{N} 사탕을 {a}개 가지고 있고, 동생은 {b}개 가지고 있어요. 사탕은 모두 몇 개일까요?","개"],
 ["바구니에 사과가 {a}개 있었는데 {b}개를 더 담았어요. 사과는 모두 몇 개일까요?","개"],
 ["놀이터에 어린이가 {a}명 있었는데 {b}명이 더 왔어요. 어린이는 모두 몇 명일까요?","명"],
 ["{N} 색종이를 {a}장 접었고, 오늘 {b}장을 더 접었어요. 색종이는 모두 몇 장일까요?","장"]];
const SUB_T=[
 ["{N} 풍선 {a}개 중에서 {b}개가 날아갔어요. 남은 풍선은 몇 개일까요?","개"],
 ["접시에 쿠키가 {a}개 있었는데 {b}개를 먹었어요. 남은 쿠키는 몇 개일까요?","개"],
 ["버스에 {a}명이 타고 있다가 {b}명이 내렸어요. 버스에 남은 사람은 몇 명일까요?","명"],
 ["{N} 구슬 {a}개 중에서 {b}개를 친구에게 주었어요. 남은 구슬은 몇 개일까요?","개"]];
const CAL_Q=[["일주일은 모두 며칠일까요?","7일"],["월요일 다음 날은 무슨 요일일까요?","화요일"],
 ["토요일과 일요일을 합쳐 무엇이라고 할까요?","주말"],["1년은 모두 몇 달일까요?","12달"],
 ["금요일 다음 날은 무슨 요일일까요?","토요일"],["오늘이 수요일이면 어제는 무슨 요일이었을까요?","화요일"],
 ["6월 다음 달은 몇 월일까요?","7월"],["겨울 다음에 오는 계절은 무엇일까요?","봄"]];

function clockSVG(h,m,hands){
  let ticks=""; for(let i=1;i<=12;i++){ const an=(i*30-90)*Math.PI/180;
    ticks+=`<text x="${(50+37*Math.cos(an)).toFixed(1)}" y="${(50+37*Math.sin(an)+3.5).toFixed(1)}" font-size="10" text-anchor="middle" font-weight="700" fill="#333">${i}</text>`; }
  let hh="";
  if(hands){ const ha=(((h%12)+m/60)*30-90)*Math.PI/180, ma=(m*6-90)*Math.PI/180;
    hh=`<line x1="50" y1="50" x2="${(50+19*Math.cos(ha)).toFixed(1)}" y2="${(50+19*Math.sin(ha)).toFixed(1)}" stroke="#222" stroke-width="4.5" stroke-linecap="round"/>
<line x1="50" y1="50" x2="${(50+29*Math.cos(ma)).toFixed(1)}" y2="${(50+29*Math.sin(ma)).toFixed(1)}" stroke="#C0703A" stroke-width="3" stroke-linecap="round"/>`; }
  return `<svg viewBox="0 0 100 100" class="clock"><circle cx="50" cy="50" r="47" fill="#fff" stroke="#333" stroke-width="2.5"/>${ticks}${hh}<circle cx="50" cy="50" r="2.6" fill="#222"/></svg>`;
}
function coinRow(c500,c100,c50,c10){
  let h=""; for(let i=0;i<c500;i++)h+=`<span class="coin c500">500</span>`;
  for(let i=0;i<c100;i++)h+=`<span class="coin">100</span>`;
  for(let i=0;i<c50;i++)h+=`<span class="coin">50</span>`;
  for(let i=0;i<c10;i++)h+=`<span class="coin c10">10</span>`;
  return h;
}
function vcalc(a,b,op){ const s=op==="+"?a+b:a-b;
  return `<div class="vc"><div class="vr">${a}</div><div class="vo"><span class="op">${op}</span>${b}</div><div class="va"><span class="ans">${s}</span></div></div>`; }

function wsec(no,title,instr,body){
  return `<div class="ws-section"><div class="ws-st"><span class="sno">${no}</span>${title}</div>${instr?`<div class="ws-instr">${instr}</div>`:""}${body}</div>`; }
function mrows(items,c3){ return `<div class="mgrid${c3?" c3":""}">${items.map((it,i)=>
  `<div class="mitem"><span class="no">${i+1}</span>${it.q}<span class="blank"></span><span class="ans"> ${it.a}</span></div>`).join("")}</div>`; }
function ansline(items){ return items.map((it,i)=>`${i+1}) ${it.a}`).join("&nbsp;&nbsp; "); }

function wordProblems(n,mk){
  return uniqN(n,mk,it=>it.q).map((it,i)=>
    `<div class="kitem"><span class="no">${i+1}</span>${it.q}<br>식: <span class="uline" style="min-width:120px"></span> 답: <span class="blank"></span><span class="ans"> ${it.a}${it.u}</span></div>`);
}
function mkAddW(lo1,hi1,lo2,hi2){ return ()=>{ const [t,u]=wpick(ADD_T), a=wrnd(lo1,hi1), b=wrnd(lo2,hi2);
  return {q:t.replace("{N}",nameJosa(pickName())).replace("{a}",a).replace("{b}",b), a:a+b, u}; }; }
function mkSubW(lo1,hi1,maxSub){ return ()=>{ const [t,u]=wpick(SUB_T), a=wrnd(lo1,hi1), b=wrnd(1,Math.min(maxSub,a-1));
  return {q:t.replace("{N}",nameJosa(pickName())).replace("{a}",a).replace("{b}",b), a:a-b, u}; }; }

/* ---- 수학 페이지 ---- */
function mathPaper(d){
  const u=Math.floor(d/10), late=(d%10)>=5;
  let A="",B="",C="", ansA="",ansB="",ansC="";
  if(u===0){
    const ops=uniqN(12,()=>{ const a=wrnd(2,9),b=wrnd(2,9); return (a+b>=11)?{q:`${a} + ${b} =`,a:a+b}:null; },it=>it&&it.q).filter(Boolean);
    while(ops.length<12){ const a=wrnd(5,9),b=wrnd(11-a>2?11-a:2,9); if(!ops.some(o=>o.q===`${a} + ${b} =`)) ops.push({q:`${a} + ${b} =`,a:a+b}); }
    const tf=`<div class="tenframe">${Array.from({length:10},(_,i)=>`<span class="${i<8?"f":"h"}"></span>`).join("")}</div>
      <div class="tfcap">보기 · 8 + 5 → 8에 2를 채워 10을 만들고, 남은 3을 더하면 13!</div>`;
    A=wsec("1","받아올림이 있는 덧셈","10을 만들어 더해 보세요.",tf+mrows(ops,true)); ansA=ansline(ops);
    const bo=uniqN(6,()=>{ const n=wrnd(1,9); return WR()<.5?{q:`${n} + ▢ = 10`,a:10-n}:{q:`▢ + ${n} = 10`,a:10-n}; },it=>it.q);
    B=wsec("2","10이 되는 더하기","▢에 알맞은 수를 쓰세요.",mrows(bo)); ansB=ansline(bo);
    const w=wordProblems(2,mkAddW(5,9,4,9)); C=wsec("3","생각하며 풀기","식을 쓰고 답을 구하세요.",w.join("")); ansC="문장제: 위 정답 참고";
  }
  if(u===1){
    const ops=uniqN(12,()=>{ const a=wrnd(11,18),b=wrnd((a%10)+1,9); return {q:`${a} − ${b} =`,a:a-b}; },it=>it.q);
    A=wsec("1","받아내림이 있는 뺄셈","10에서 먼저 빼 보세요.",mrows(ops,true)); ansA=ansline(ops);
    const fam=uniqN(6,()=>{ const a=wrnd(4,9),b=wrnd(11-a>2?11-a:2,9),s=a+b;
      return {q:`${a} + ${b} = ${s} → ${s} − ${b} =`,a:a}; },it=>it.q);
    B=wsec("2","덧셈과 뺄셈은 가족","덧셈식을 보고 뺄셈을 풀어요.",mrows(fam)); ansB=ansline(fam);
    const w=wordProblems(2,mkSubW(11,18,9)); C=wsec("3","생각하며 풀기","식을 쓰고 답을 구하세요.",w.join("")); ansC="문장제: 위 정답 참고";
  }
  if(u===2){
    const ops=uniqN(8,()=>{ if(WR()<.5){ const t=wrnd(1,8),o=wrnd(0,4),b=wrnd(1,9-o),n=t*10+o; return {q:`${n} + ${b} =`,a:n+b}; }
      const t=wrnd(1,8),o=wrnd(3,9),b=wrnd(1,o),n=t*10+o; return {q:`${n} − ${b} =`,a:n-b}; },it=>it.q);
    A=wsec("1","가로셈 연습","빈칸에 답을 쓰세요.",mrows(ops,true)); ansA=ansline(ops);
    const pv=uniqN(6,()=>{ const t=wrnd(2,9),o=wrnd(1,9),n=t*10+o,f=wrnd(0,4);
      if(f===0)return {q:`10이 ${t}개, 1이 ${o}개인 수는 ▢`,a:n};
      if(f===1)return {q:`${n}은 10이 ▢개, 1이 ▢개`,a:`${t}개, ${o}개`};
      if(f===2)return {q:`${n}보다 1 큰 수는 ▢`,a:n+1};
      if(f===3)return {q:`${n}보다 10 큰 수는 ▢`,a:n+10};
      return {q:`${n}보다 1 작은 수는 ▢`,a:n-1}; },it=>it.q);
    B=wsec("2","자릿값 알기","▢에 알맞은 수를 쓰세요.",mrows(pv)); ansB=ansline(pv);
    const st=wrnd(11,60), st2=wrnd(35,45);
    const sq=[{q:`10씩 뛰어 세기: ${st}, ${st+10}, ▢, ${st+30}`,a:st+20},
              {q:`1씩 거꾸로 세기: ${st2}, ${st2-1}, ▢, ${st2-3}`,a:st2-2}];
    C=wsec("3","뛰어 세기","규칙을 찾아 ▢를 채워요.",mrows(sq)); ansC=ansline(sq);
  }
  if(u===3){
    const ops=uniqN(6,()=>{ const o=wrnd(0,4),t=wrnd(1,7),b=wrnd(1,9-o),n=t*10+o; return {q:`${n} + ${b} =`,a:n+b}; },it=>it.q);
    A=wsec("1","가로셈 몸풀기","빈칸에 답을 쓰세요.",mrows(ops,true)); ansA=ansline(ops);
    const vs=uniqN(6,()=>{ const t1=wrnd(1,5),t2=wrnd(1,8-t1);
      let o1,o2; if(late){ o1=wrnd(2,9); o2=wrnd(Math.max(0,10-o1),9); } else { o1=wrnd(0,5); o2=wrnd(0,9-o1); }
      return {a:t1*10+o1,b:t2*10+o2}; },it=>it.a+"+"+it.b);
    B=wsec("2","세로셈으로 더하기",late?"받아올림에 주의하며 풀어요.":"자리를 맞춰 더해요.",
      `<div class="vgrid">${vs.map(v=>vcalc(v.a,v.b,"+")).join("")}</div>`);
    ansB=vs.map((v,i)=>`${i+1}) ${v.a+v.b}`).join("&nbsp;&nbsp; ");
    const w=wordProblems(2,mkAddW(12,38,11,30)); C=wsec("3","생각하며 풀기","식을 쓰고 답을 구하세요.",w.join("")); ansC="문장제: 위 정답 참고";
  }
  if(u===4){
    const ops=uniqN(6,()=>{ const t=wrnd(2,8),o=wrnd(3,9),b=wrnd(1,o),n=t*10+o; return {q:`${n} − ${b} =`,a:n-b}; },it=>it.q);
    A=wsec("1","가로셈 몸풀기","빈칸에 답을 쓰세요.",mrows(ops,true)); ansA=ansline(ops);
    const vs=uniqN(6,()=>{ let a,b;
      if(late){ const t1=wrnd(3,8),o1=wrnd(0,4),t2=wrnd(1,t1-1),o2=wrnd(o1+1,9); a=t1*10+o1; b=t2*10+o2; }
      else { const t1=wrnd(3,9),o1=wrnd(4,9),t2=wrnd(1,t1-1),o2=wrnd(0,o1); a=t1*10+o1; b=t2*10+o2; }
      return {a,b}; },it=>it.a+"-"+it.b);
    B=wsec("2","세로셈으로 빼기",late?"받아내림에 주의하며 풀어요.":"자리를 맞춰 빼요.",
      `<div class="vgrid">${vs.map(v=>vcalc(v.a,v.b,"−")).join("")}</div>`);
    ansB=vs.map((v,i)=>`${i+1}) ${v.a-v.b}`).join("&nbsp;&nbsp; ");
    const w=wordProblems(2,mkSubW(25,60,20)); C=wsec("3","생각하며 풀기","식을 쓰고 답을 구하세요.",w.join("")); ansC="문장제: 위 정답 참고";
  }
  if(u===5){
    const ops=uniqN(8,()=>{ const a=wrnd(2,7),b=wrnd(2,7),c=wrnd(1,6);
      return WR()<.6?{q:`${a} + ${b} + ${c} =`,a:a+b+c}:{q:`${a} + ${b} − ${c} =`,a:a+b-c}; },it=>it.q);
    A=wsec("1","세 수 계산","앞에서부터 차례로 계산해요.",mrows(ops,true)); ansA=ansline(ops);
    const sq=uniqN(6,()=>{ const step=wpick([1,2,5,10,-1,-10]); let st=step>0?wrnd(1,40):wrnd(30,60);
      const arr=[st,st+step,st+2*step,st+3*step,st+4*step]; const bi=wrnd(1,3);
      const shown=arr.map((v,i)=>i===bi?"▢":v).join(", ");
      return {q:shown,a:arr[bi]}; },it=>it.q);
    B=wsec("2","수 규칙 찾기","규칙을 찾아 ▢에 알맞은 수를 쓰세요.",mrows(sq)); ansB=ansline(sq);
    const x=wrnd(2,8), s=wrnd(9,15), e=wrnd(2,s-2);
    const pz=[{q:`● + ● = ${2*x} 일 때, ● = ▢`,a:x},{q:`● + ▲ = ${s}, ● = ${e} 일 때, ▲ = ▢`,a:s-e}];
    C=wsec("3","모양 수 퍼즐","같은 모양은 같은 수예요.",mrows(pz)); ansC=ansline(pz);
  }
  if(u===6){
    const times=uniqN(6,()=>({h:wrnd(1,12),m:late?wpick([0,30]):0}),t=>t.h+":"+t.m);
    A=wsec("1","시계 읽기","시계를 보고 몇 시인지 쓰세요.",
      `<div class="clockwrap">${times.map(t=>`<div>${clockSVG(t.h,t.m,true)}<div class="cl">▢시${t.m?` ▢분`:""}
        <span class="ans">${t.h}시${t.m?" 30분":""}</span></div></div>`).join("")}</div>`);
    ansA=times.map((t,i)=>`${i+1}) ${t.h}시${t.m?" 30분":""}`).join("&nbsp;&nbsp; ");
    const dt=uniqN(2,()=>({h:wrnd(1,12),m:late?30:0}),t=>t.h+":"+t.m);
    B=wsec("2","시곗바늘 그리기","시각에 맞게 바늘을 그려 보세요.",
      `<div class="clockwrap">${dt.map(t=>`<div>${clockSVG(0,0,false)}<div class="cl">${t.h}시${t.m?" 30분":""}</div></div>`).join("")}</div>`);
    ansB="바늘 그리기 (짧은바늘=시, 긴바늘=분)";
    const cq=wsample(CAL_Q,4).map(([q,a])=>({q,a}));
    C=wsec("3","달력 상식","물음에 답하세요.",mrows(cq)); ansC=ansline(cq);
  }
  if(u===7){
    const gp=uniqN(6,()=>{ const g=wpick([2,5,10]),c=wrnd(2,5);
      return WR()<.5?{q:`${g}씩 ${c}묶음은 모두 ▢`,a:g*c}

function vocabSection(d,u){
  const tier=u<3?0:(u<7?1:2);

  const circle=(items)=>items.map((it,i)=>`<div class="kitem"><span class="no">${i+1}</span>${it.q}<span class="ans"> → ${it.a}</span></div>`).join("");
  if(type==="ant"){ title="반대말"; instr="반대말을 빈칸에 쓰세요.";
    const its=wsample(ANTONYMS,5).map(([a,b])=>WR()<.5?{q:`${a} ↔ `,a:b}:{q:`${b} ↔ `,a:a}); body=fill(its); ans=ansline(its); }
  else if(type==="ant2"){ title="반대말 (고급)"; instr="반대말을 빈칸에 쓰세요.";
    const its=wsample(ANT2,5).map(([a,b])=>WR()<.5?{q:`${a} ↔ `,a:b}:{q:`${b} ↔ `,a:a}); body=fill(its); ans=ansline(its); }
  else if(type==="syn"){ title="비슷한 말"; instr="뜻이 비슷한 말을 골라 쓰세요.";
    const its=wsample(SYN2,5).map(([a,b])=>({q:`${a} ≈ `,a:b}));
    bank=`<div class="bank">${wshuffle(its.map(i=>i.a)).map(b=>`<span>${b}</span>`).join("")}</div>`; body=bank+fill(its); ans=ansline(its); }
  else if(type==="hyper"){ title="무리 짓기"; instr="어느 무리에 속하는지 쓰세요.";
    const its=wsample(HYPER,5).map(([a,b])=>({q:`${a} → `,a:b}));
    bank=`<div class="bank">${HYPER_BANK.map(b=>`<span>${b}</span>`).join("")}</div>`; body=bank+fill(its); ans=ansline(its); }
  else if(type==="counter"){ title="세는 말"; instr="알맞은 세는 말을 쓰세요.";
    const its=wsample(COUNTERS,5).map(([a,b])=>({q:`${a} `,a:b}));
    bank=`<div class="bank">${COUNTER_BANK.map(b=>`<span>${b}</span>`).join("")}</div>`; body=bank+fill(its); ans=ansline(its); }
  else if(type==="mime"){ title="흉내 내는 말"; instr="알맞은 흉내 내는 말을 쓰세요.";
    const its=wsample(MIME2,5).map(([s,w])=>({q:`${s} `,a:w}));
    bank=`<div class="bank">${wshuffle(its.map(i=>i.a)).map(b=>`<span>${b}</span>`).join("")}</div>`; body=bank+fill(its); ans=ansline(its); }
  else if(type==="modif"){ title="꾸며 주는 말"; instr="어울리는 말에 ○ 하세요.";
    const its=wsample(MODIF,5).map(([n,g,b])=>{ const first=WR()<.5;
      return {q:`( ${first?g:b} / ${first?b:g} ) ${n}`,a:g}; }); body=circle(its); ans=ansline(its); }
  else if(type==="josa"){ title="알맞은 말 넣기"; instr="▢에 알맞은 말(조사)을 쓰세요.";
    const its=wsample(JOSA2,5).map(([q,a])=>({q,a}));
    bank=`<div class="bank">${["은","는","이","가","을","를","와"].map(b=>`<span>${b}</span>`).join("")}</div>`; body=bank+fill(its); ans=ansline(its); }
  else if(type==="spell"){ title="바른 글자 찾기"; instr="바르게 쓴 낱말에 ○ 하세요.";
    const its=wsample(SPELL,5).map(([ok,no])=>{ const first=WR()<.5;
      return {q:`( ${first?ok:no} / ${first?no:ok} )`,a:ok}; }); body=circle(its); ans=ansline(its); }
  else { title="속담 놀이"; instr="속담과 뜻을 선으로 이으세요.";
    const its=wsample(PROVERB,3); const right=wshuffle(its.map(p=>p[1]));
    body=`<div class="conn"><div>${its.map(p=>`<div style="border:none;padding:4px 0">· ${p[0]}</div>`).join("")}</div>
      <div>${right.map(m=>`<div style="border:none;padding:4px 0">${m} ·</div>`).join("")}</div></div>`;
    ans=its.map((p,i)=>`${i+1}) ${p[0]} = ${p[1]}`).join("<br>"); }
  return {html:wsec("1",title,instr,body), ans};
}
const PSG_T1=["병아리","여름 수박","고마운 소방관","달팽이","이 닦기","겨울잠"];
const PSG_T2=["무지개","힘센 개미","도서관 예절","씨앗의 여행","펭귄 가족","신호등 약속"];
const PSG_T3=["흥부와 제비","토끼와 거북이","우리의 김치","그림자의 비밀","곰돌이의 편지","분리배출 이야기"];
function readingSection(d,u){
  const tier=u<3?0:(u<7?1:2);
  const pool=[PSG1,PSG2,PSG3][tier], titles=[PSG_T1,PSG_T2,PSG_T3][tier];
  const idx=(d*7+u)%pool.length, p=pool[idx];
  const body=`<div class="passage"><div class="psg-t">${titles[idx]}</div>${p.t}</div>`+p.q.map((q,i)=>{
    const infer=(tier===2&&i===2);
    return `<div class="kitem"><span class="no">${i+1}</span><em class="qt${infer?" infer":""}">${infer?"추론":"사실"}</em>${q[0]} <span class="uline"></span><span class="ans"> ${q[1]}</span></div>`;
  }).join("");
  return {html:wsec("2","글을 읽고 답해요","소리 내어 읽고 물음에 답하세요.",body),
    ans:p.q.map((q,i)=>`${i+1}) ${q[1]}`).join("&nbsp;&nbsp; ")};
}
function writingSection(d,u){
  let title,instr,body,ans="자유롭게 쓴 글 (정답 없음)";
  if(u<3){ const s=TRACE_SENT[(d+u)%TRACE_SENT.length]; title="따라 쓰기"; instr="문장을 소리 내어 읽고 두 번 따라 쓰세요.";
    body=`<div class="passage" style="text-align:center;font-size:16px">${s}</div><div class="writeline"></div><div class="writeline"></div>`; }
  else if(u<6){ const fr=COMPLETE_FR[(d+u)%COMPLETE_FR.length]; title="문장 완성하기"; instr="빈칸을 채워 나만의 문장을 완성하세요.";
    body=fr.map(f=>`<div class="kitem">${f}</div><div class="writeline"></div>`).join(""); }
  else if(u<8){ const pp=PIC_PAIRS[(d+u)%PIC_PAIRS.length]; title="그림 보고 문장 만들기"; instr="두 그림을 보고 문장을 만들어 쓰세요.";
    body=`<div style="font-size:44px;text-align:center;margin:6px 0">${pp[0]} &nbsp; ➕ &nbsp; ${pp[1]}</div><div class="writeline"></div><div class="writeline"></div>`; }

    body=`<div class="writeline"></div><div class="writeline"></div><div class="writeline"></div>`; }
  return {html:wsec("3",title,instr,body), ans};
}

    10일마다 단원이 올라가요. 일차를 누르면 미리 보고 <b>🖨 인쇄</b>할 수 있어요.
    같은 일차는 항상 같은 문제가 나오고, <b>새 문제</b>를 누르면 숫자만 바뀐 복습용 학습지가 나와요.${reco}
    <br><span style="font-size:12.5px">※ 인쇄는 <b>홈페이지 주소</b>로 연 브라우저에서 눌러 주세요. 미리보기 창 안에서는 인쇄가 막힐 수 있어요.</span></div>
    <div id="unitList"></div>`;
  const list=document.getElementById("unitList");
  for(let u=0;u<10;u++){
    const div=document.createElement("div"); div.className="unit";
    div.innerHTML=`<div class="unit-h"><span class="un">${u+1}단원</span>
      <span class="ut">➕ ${MU[u]}</span><span class="us">📖 ${KU[u]} · 🔤 ${EU[u]}</span>
      <button class="pill uprint" data-u="${u}">🖨 단원 인쇄(30장)</button></div>
      <div class="unit-days">${Array.from({length:10},(_,i)=>{ const dd=u*10+i;
        const rc=S.level&&S.level.rec===dd+1?" reco":"";
        return `<button class="daychip${rc}" data-d="${dd}">${dd+1}</button>`; }).join("")}</div>`;
    list.appendChild(div);
  }
  list.querySelectorAll(".daychip").forEach(b=>b.onclick=()=>openDay(Number(b.dataset.d)));
  list.querySelectorAll(".uprint").forEach(b=>b.onclick=()=>{
    const u=Number(b.dataset.u); let html="";
    for(let i=0;i<10;i++) html+=dayPapers(u*10+i).join("");
    document.body.classList.add("print-ws");
    document.getElementById("printMount").innerHTML=html; window.print();
  });
}
function openDay(d){ if(location.hash==="#day/"+d) route(); else location.hash="day/"+d; }
function openDayView(d){
  secBody.innerHTML=`<div class="toolbar">
    <button class="pill" id="tBack">← 목록</button>
    <button class="pill accent" id="tPrint" style="--ac:var(--book)">🖨 오늘 3장 인쇄</button>
    <button class="pill" id="tNew">🔄 새 문제</button>
    <button class="pill" id="tAns">✅ 정답 보기</button></div>
    <div id="paperMount"></div>`;
  const mount=document.getElementById("paperMount");
  const draw=()=>{ mount.innerHTML=dayPapers(d).join(""); };
  draw();
  document.getElementById("tBack").onclick=()=>{ location.hash="sec/book"; };
  document.getElementById("tNew").onclick=()=>{ REROLL[d]=(REROLL[d]||0)+1; draw(); };
  document.getElementById("tAns").onclick=()=>{ mount.querySelectorAll(".paper").forEach(p=>p.classList.toggle("show-ans")); };
  document.getElementById("tPrint").onclick=()=>{
    document.body.classList.add("print-ws");
    document.getElementById("printMount").innerHTML=dayPapers(d).join(""); window.print(); };
}
/* ===== Confetti ===== */
const fx=document.getElementById("fx"), ctx=fx.getContext("2d"); let parts=[], raf=null;
function sizeFx(){ fx.width=innerWidth; fx.height=innerHeight; } sizeFx(); addEventListener("resize",sizeFx);
function confetti(){ const cs=["#E0637A","#3E7CB1","#D3922E","#5E9E7E","#8B7BC0","#CE7C4E"];
  for(let i=0;i<80;i++)parts.push({x:innerWidth/2,y:innerHeight*.35,vx:(Math.random()-.5)*13,vy:Math.random()*-13-4,
    g:.5+Math.random()*.3,s:7+Math.random()*7,c:cs[i%cs.length],r:Math.random()*6,vr:(Math.random()-.5)*.5,life:0});
  if(!raf)raf=requestAnimationFrame(stepFx); }
function bigConfetti(){ confetti(); setTimeout(confetti,220); setTimeout(confetti,460); }
function stepFx(){ ctx.clearRect(0,0,fx.width,fx.height);
  parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; p.life++;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r); ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); ctx.restore(); });
  parts=parts.filter(p=>p.y<fx.height+40&&p.life<200);
  if(parts.length)raf=requestAnimationFrame(stepFx); else{ ctx.clearRect(0,0,fx.width,fx.height); raf=null; } }

/* ===== Theme & sound buttons ===== */
const themeBtn=document.getElementById("themeBtn"), soundBtn=document.getElementById("soundBtn");
function curTheme(){ const s=document.documentElement.getAttribute("data-theme"); return s||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"); }
function applyTheme(t){ document.documentElement.setAttribute("data-theme",t); themeBtn.textContent=t==="dark"?"☀️":"🌙"; }
applyTheme(curTheme());
themeBtn.onclick=()=>applyTheme(curTheme()==="dark"?"light":"dark");
function refreshSoundBtn(){ soundBtn.textContent=S.sound?"🔊":"🔇"; }
refreshSoundBtn();
soundBtn.onclick=()=>{ S.sound=!S.sound; save(); refreshSoundBtn(); if(!S.sound&&window.speechSynthesis)speechSynthesis.cancel(); };

/* ===== 인쇄 안전장치: Ctrl+P로 직접 인쇄해도 학습지가 나오도록 ===== */
window.addEventListener("beforeprint",()=>{
  const pm=document.getElementById("printMount");
  if(!pm.innerHTML.trim()){
    const papers=document.querySelectorAll("#paperMount .paper");
    if(papers.length) pm.innerHTML=[...papers].map(p=>p.outerHTML).join("");
  }
  document.body.classList.toggle("print-ws", !!pm.innerHTML.trim());
});
window.addEventListener("afterprint",()=>{
  document.getElementById("printMount").innerHTML="";
  document.body.classList.remove("print-ws");
});

/* ===== 시작: 현재 주소(#해시)의 화면 복원 ===== */
route();
</script>
